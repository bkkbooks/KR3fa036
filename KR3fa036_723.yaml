body:
  text: 距春分三百一十三度一十五分四十三秒減三象限得距春分二百二十六度四十四分一十七秒又設赤緯北六十三度二十二分十一秒黃緯北四十五度中數亦得一一二一七二八求得赤經餘弦七二八二二八一減象限得距春分四十六度四十四分一十七秒加象限得距春分一百三十三度一十五分四十三秒又設赤緯北二十度黃緯北五度法以赤緯加大距為總弧四十三度二十九分正弦六八八一四三五赤緯減大距為較弧三度二十九分正弦六七五八二兩正弦相加七四八九一七折半為甲數三七四四五八五黃緯正弦八七一五五七甲數轉減總弧正弦為乙數三一三六九二六五乙數大于黃緯正弦以黃緯正弦轉減乙數為中數二二六五三六九五乃以甲數除中數進七位得赤經餘弦六
