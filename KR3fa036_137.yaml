body:
  text: 開方得七丈為句股較假如弦三十五丈句股和四十九丈求句股較句股和實二千四百一丈減弦實一千二百二十五丈餘一千一百七十六丈又於弦實內減去一千一百七十六丈餘四十九丈開方得七丈為句股較假如弦三十五丈句股較七丈求句股和求句求股弦實一千二百二十五丈減句股較實四十九丈餘一千一百七十六丈復加弦實一千二百二十五丈得二千四百一丈開方得四十九丈為句股和加句股較七丈得五十六丈折半得二十八丈為股股減句股較七丈餘二十一丈為句減句股較七丈餘四十二丈折半得二十一丈為句句加句股較七丈得二十八丈為股假如句股積二百九十四丈弦較較二十八丈求弦較和求弦求句股較句股積四因得一千一百七十六丈為實弦較較二十八丈除之得四十二丈為弦較和加弦較較二十八丈得七十丈折半得三十五丈為弦減弦較較二十八丈餘十四丈折半得七丈為句股
