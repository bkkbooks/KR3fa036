body:
  text: 所對照者天市垣之西偏天市垣之照中國者三千八百十九年耳今去周末差四十度約至千年之後分野當更蓋中國正在立夏線上下以立夏線對照之星定中國之分野則所謂不可信而可信者也曾子地圓之説大戴禮記曾子答單居離之言曰如誠天圓而地方則是四角之不掩也四角不掩之説最妙又曰𡮢聞之夫子曰天道曰圓地道曰方蓋方者其道而圓者其形也邵子謂天地自相依附程子謂地無適而不為中俱與曾子所言之理若合符節今西人言水地合一圓球而四面居人其地度經緯正對者兩處之人以足版相抵而立以渾天之理徵之則地之正圓無疑也是故南行二百里則南星多見一度而北極低一度北行二百里則北極髙一度而南星少見一度若地非正圓何以能然所疑者地既渾圓則人居地上不能平立也然自京師而觀瓊海相去二十度之遙其人立處皆當傾跌而人皆平立者地圓故也蓋輕清而上者為天天皆上也重濁而下者為地地皆下也凡人首戴皆天無非親上足履皆地無非親下即南行而過赤道之表北逰而至戴極之下而親
