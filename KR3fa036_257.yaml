body:
  text: 角丙角乙丙邊可求乙丁邊丁丙邊丁乙丙分角次乙丁甲形有乙丁邊丁正角丁乙甲分角可求乙甲邊甲角甲丁邊末以甲丁并丁丙得甲丙邊或於丙角作垂線亦同若角一鈍一銳即破銳角作垂線其法並同設甲乙丙形有丙甲二角乙甲邊求乙角餘邊法於乙角作垂弧分兩形一乙丁甲形有丁正角甲角乙甲邊可求甲丁邊乙丁邊丁乙甲分角次丁乙丙形有丁正角乙丁邊丙角可求乙丙邊丁丙邊丁乙丙分角末并甲丁丁丙成甲丙邊并兩分角成乙角設乙甲丙形有三邊而內有乙甲乙丙二邊相同求三角法作乙角作垂弧至不同之丙甲一邊分兩正角形其形必相等甲丙線必兩平分可求丙角乙分角倍之成乙角而甲角即同丙角第二法垂弧在形外𥙷成正角設甲乙丙形有丙鋭角有夾角之兩邊乙丙甲丙求乙甲邊及餘角法自乙角作垂弧乙丁於形外引丙甲邊至丁𥙷成正角形二先算丙乙丁半虛半實形有
