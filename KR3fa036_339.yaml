body:
  text: 周天三百六十度兩分之為半周天四分之為象限平置象限作經度立置象限作緯度上加闚筩或通光耳可測各曜經緯度數而於象限內作半圓則象限之度與圓周相割者即為半周平分經度是又以一度當兩度用也或反用之以圓周之兩度當象限之一度亦同於象限內作斜弦為半圓徑線則象限之度與徑線相交者即為圓周全使緯度是又以經度當緯度用也舊法求緯度從右邊酉中或左邊𫑗中向對邊各度作直線其貫於子午線者為緯度今直用象限切線以得圓周全徑緯度較為簡㨗切線尺赤道北緯九十度南緯亦九十度自北極向赤道緯圈由密而疎過赤道向南極緯圈由疎而密疎密之度必以切線分之作切線法簡切線表尺寸識之或即用象限度作切線用法以半徑為本線四十五度
  hash: sha256:0d5eaa003fe16336a28bf381a89bb58d7c012c678911a8001de5c398160314fd
