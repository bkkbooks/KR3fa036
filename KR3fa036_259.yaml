body:
  text: 乙丙邊丙角丁正角可求丙乙丁角半虛半實乙丁邊形外垂弧丁丙邊丙甲引長邊次甲乙丁虛形有丁正角乙丁邊甲丁邊可求乙甲邊甲角及甲乙丁虛角末以甲角减半周得原設甲角以甲乙丁虛角减丙乙丁角得原設丙乙甲角設乙甲丙形有甲鈍角有角旁之丙甲乙甲二邊求乙丙邊及餘角法於乙角作垂弧乙丁引丙甲至丁𥙷成正角先算乙丁甲虛形有丁正角甲外角乙甲邊可求甲丁邊乙丁邊丁乙甲虛角次丁乙丙形有乙丁邊丁丙邊丁正角可求乙丙邊丙角丙乙丁角末於丙乙丁內减丁乙甲虛角得原設乙角或從丙作垂弧至戊引乙甲邊至戊𥙷成正角亦同設乙甲丙形有丙鋭角有角旁之乙丙邊有對角之乙甲邊求丙甲邊及餘二角法從乙角作垂弧至丁成正角先算丙乙丁形有丁正角丙角乙丙邊可求乙丁邊丁丙邊丙乙丁角次丁乙甲虛形有丁正角乙丁乙甲二邊可求乙甲丁角甲乙丁角甲丁邊末以所得虛形甲角减半周得原設甲鈍角於丙乙丁內减虛乙角得原設乙
