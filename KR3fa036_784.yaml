body:
  text: 步水星假如道光癸已距根六十日求水星經緯諸年根水星距冬至一十五分一十四秒二十一𢕄最髙一十一宫七度二十五分一十四秒三十九𢕄伏見五宫二十度五十三分一十六秒四十一𢕄諸日數水星一宫二十九度八分一十九秒五十𢕄最髙一十七秒一十七𢕄伏見六宫六度二十四分七秒諸平行年根日數相加得水星平行一宫二十九度二十三分三十四秒一十一𢕄最髙平行一十一宫七度二十五分三十一秒五十六𢕄伏見平行十一宫二十七度一十七分二十三秒四十一𢕄引數置水星平行減最髙平行得二宫二十一度五十八分二秒一十五𢕄初均以引數宫度分察所對之初均得三度二分四十五秒其號為減中分又察所對之中分三十六分五十八秒初實行置水星平行依號減初均數得一宫二十六度二十一分四十九秒一十一𢕄伏見實行置伏見平行反號加初均數得初宫二十分八秒四十一𢕄次均以伏見實行宫度分察所對之次均得五分一十八秒其號為加較分又察所對之較分得二十七秒加差以三千六百秒為一率較分化秒原係二十七秒為二率中分化秒一千九百一十八秒為三率求得四率一十四秒為加差實次均以加差與次均相加得五分三十二秒
