body:
  text: 查黃赤經緯互推表距緯度分察緯度定南北察經度加距日經度定時刻若用指南針又可自知日𨇠月離經緯度分也地平蒙氣差圖地中遊氣上騰能升卑為髙映小為大地平上最大蒙氣差三十二分一十九秒蒙氣之厚為地半徑千萬分之六千零九十五日月星照乎蒙氣之外人在地面為蒙氣所映必能視之使髙而日月星之光線入乎蒙氣之中必反折之使下故光線與視線在蒙氣之內則合而為一蒙氣之外則歧而為二如圖甲為地心乙為地面乙甲為地半徑一千萬丙乙為蒙氣之厚六千零九十五丁為丁為日或月星照于蒙氣之戊人自地面乙視之則見日於戊者當本天之已己戊乙為視線下戊乙為光線是視線常髙光線常卑視線常直光線常折故日未出而見日者非日也蒙氣中所映之影也譬猶置錢盂中離盂既遠錢不可見矣而注之以水則見即此理也
