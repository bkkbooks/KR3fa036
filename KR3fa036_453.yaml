body:
  text: 星加一十三秒三十六𢕄火星加五十二秒五十七𢕄金星加一分二十二秒五十七𢕄水星加一分四十五秒二十四𢕄上三星𡻕輪上軌迹繞日成圓象圖五星本天並以地為心與日月同至若𡻕輪即遲留逆伏之叚目惟金水繞太陽左右而行直以太陽為𡻕輪心亦以二星之平行與太陽同度也土木火三
