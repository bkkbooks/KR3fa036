body:
  text: 又正弦餘割正切餘切互求本弧之正弦餘割相乘他弧之正切相乘得數並同以乘得之數為實任以一線除之可以互求設三十度五十度兩弧以三十度之餘弦正割與五十度互求三十度之餘弦八六六二五四正割一一五四七五五十度之餘弦六四二七八七六正割一五五五七二三八正弦七六六四四四餘割一三五四七三餘切八三九九九六正切一一九一七五三六以本弧之兩線相乘則他弧之兩線可以互求以他弧之兩線相乘則本弧之兩線亦可以互求也
