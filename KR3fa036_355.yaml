body:
  text: 經緯度之濶狹疏密在天有一定之象其在渾圓經度近極者狹遠極者濶而緯度遠近悉同其在平圓經度濶狹與渾圓同而緯度疏密逈異平圓形止得渾圓之半其經度近北極則極狹漸遠漸濶至赤道而極濶過赤道向南極則又以漸以狹至南極而極狹緯度近北極則極密漸遠漸疏至赤道而極疏過赤道向南極則又以漸而密至南極而極密西人剖赤道南北為兩圖四乎天象之自然也而又通其法於蓋天將赤道南亦用切線分其經緯經愈南而愈濶緯愈南而愈疏取七政緯度所及而割之位置星曜之體備載諸輪之度即不啻用渾天之全圓推步既易測量尤便以平寫渾之法莫善於斯矣黃赤全規圖
