body:
  text: 圓徑二周六二八三一竒積三一四一五九二六五凡徑倍者周亦倍而其積為倍數之自乘亦謂之再加比例也同周較積較徑凡方圓同周則圓積大方積小徑亦如之其比例若四與三一四一五九二六五方周一徑二五積六二五圓周一徑三一八三九八八積七九五七七四七方周四徑一積一圓周四徑一二七三二三九五四積一二七三二三九五四周四則徑與積同數但其位皆升皆視周數之位今用百萬為周則積升六位成萬億故似同而實懸絶也理分中末線理分中末線西人謂之神分線而不知其出於河圖也河圖中宫十數為股五數為句句自乘二十五股自乘一百合冪一百二十五開方求弦得一萬一千一百八十三三九以句五加弦為句弦和一萬六千一百八十三三九以句五減弦為句弦較六千
