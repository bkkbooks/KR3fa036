body:
  text: 以星土辨九州之地鄭康成曰九州分星其書己亡堪輿雖有郡國所入度非古數也今其存可言者十二次之分也星紀吳越也元枵齊也娵訾衛也降婁魯也大梁趙也實沈晋也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也康成謂其書已亡為得其實術家之言不足信也史紀天官書謂角亢氐兖州房心豫州尾箕幽州斗江湖牽女婺女揚州虛危青州營室東壁并州奎婁胃徐州昴畢兾州觜觽參益州東井輿鬼雍州柳七星張三河翼軫荆州淮南子晋隋諸志互有異同一行又為雲漢升沈山河兩戒之說陳發又謂地正畢九度居子中為分野之方位諸家皆以十二次二十八舍分野為說又有繫之北斗者又有繫之五緯星者又有繫之南斗者又有繫之五車者又有繫之牛女下十二國者以地則囿於中國分配無餘以時則昧於歲差泥古不變其並出臆說可知今法中國去赤道二十度至四十度在穀雨立夏小滿三節氣上天市垣與中國對照為中國之分野天市垣總占五十七度不出𫑗寅丑三宫氐房心尾箕五宿古時三節所對照者天市垣之東偏今時三節
