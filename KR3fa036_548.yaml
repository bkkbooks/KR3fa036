body:
  text: 地平經緯之上加赤道經緯用切線寫之其度中密外疏法從地平上數本地北極出地之度又下數本地南極入地之度得南北二極之軸軸過地心即𫑗正酉正從軸過地心之處作十字線得赤道分之得赤道經度又從赤道之南北數其緯度作十字線得赤道緯度與地平之經緯互推之而有赤道可以知地平有地平亦可以知赤道矣地平赤道旁視外面圖北極為赤道之極天頂為地平之極在鹽城則相差五十七度而經緯之差悉由此生以赤道加於地平
  hash: sha256:2a085bb13d3129fa54f0b4dc434b86aea720185c28dba934b4d24d655dc3841c
