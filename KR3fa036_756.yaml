body:
  text: 用平行二平行十一宫一十三度二十四分三十九秒四十九𢕄內減併均四分七秒一十九𢕄餘為用平行十一宫一十三度二十分三十二秒三十𢕄最髙實均用日距月最髙七宫二十六度八分五十九秒六𢕄查得最髙實均一十二度六分一十六秒號加本天心距地用日距月最髙宫度查得本天心距地五一七三六六其數小於中數兩心差則與最小兩心差四三三一九相減餘八四一七六為距地較最髙實行用最髙五宫六度四十八分一十四秒二十五𢕄加最髙實均一十二度六分一十六秒得最實行五宫十八度五十四分三十秒二十五𢕄月引數用平行十一宫一十三度二十分三十二秒三十𢕄減最髙實行五宫十八度五十四分三十秒二十五𢕄得月引數五宫二十四度二十六分二秒五𢕄初均數用月引五宫二十四度二十六分二秒五𢕄及本天心距地五一七三六六查表本天心距地在中數兩心差與最小兩心差之間應用中均小均二數查小均五宫二十四度二十分所對之數為三十一分五秒三十分所對之數為三十分一十秒用中比例求得三三二之小均數為初均本位又查中均五宫二十四度二十分所對之數為四十分七秒三十分所對之數為三十八分五十六秒用中比例求得三九二五之中均數為加均次位乃以最小兩心差與申數兩心差相減餘一一七三一五為一率距地較八四一七六為二率中均小均兩數相減餘八分五十三秒化作五百三十三秒為三率求得四率三十八秒與本位初均三十分三十二秒相加得三十一分一十秒為所求之初均其號為減
