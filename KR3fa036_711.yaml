body:
  text: 餘數六九四六七六七用中比例算之得赤南緯四十四度零五秒一十二𢕄二十四纎此係乙數跨赤道故乙數內兼有赤緯及四率之數而以四率轉减亦得赤緯若星在秋分後春分前黃經亦在南則赤緯亦在南法當用加求得四率中數以加乙數為赤緯正弦又或星在秋分後而黃緯在北為緯北而經南法當用减以四率中數轉减乙數餘為赤緯正弦用中比例求得赤北緯度分秒也
