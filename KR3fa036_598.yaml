body:
  text: 緯度之數較為真確月晷舊法用指南針又月出以三五八十换時不問緯度南北不問朔望遲早並不問本地之出入地平在何度分是以有差不若合用經緯定時時既真確且可合日月為一晷其經緯度從北極而分實由天頂而定緯南北各三十度內二十三度二十九分為日影所到各加五度一十七分二十秒為月影所到晷用三十度舉整數也經度以一度作時之四分十五度為一小時測日查七政時憲書日𨇠度分查黃赤距度表距緯度分察緯度定南北察經度定時刻測月查七政時憲書月離度分
