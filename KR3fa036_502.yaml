body:
  text: 自朝至夕不拘何時何刻但記左右兩處即得東西直線就東西直線上作十字線即南北真線也如圖虛圖線為赤道斜倚於天頂之南中為直立之表上對天頂斜弦為太陽下照之影平橫線為影之所至不拘橫線何處但作相交之十字線即得南北向也各節氣朝夕測南北真線圖春秋分之日出日入時刻方位合一天下所同其餘節氣則時刻與方位不合以赤道斜倚不與地平同度也故不能以時刻定方位而可以方位求方位其法用儀器測得日出之處識之測得日入之處又識
