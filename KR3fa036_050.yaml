body:
  text: 二孔王肅陳祥道諸家皆不知歴家有𡻕差之法故所觧中星多謬𡻕差者太𡻕每𡻕與恒星相距之分也西法謂之恒星東行每𡻕所行定為五十一秒至七十年竒則差一度此中星之所以不同也堯時春分日𨇠在昴初昏中星為鶉鳥夏至日𨇠在星初昏中星為大火秋分日𨇠在房初昏中星為虛冬至日𨇠在虛初昏中星為昴古籍存者惟夏小正與堯典合周初列星東移己及一次至今日則更移一次矣今測道光甲申春分日𨇠室八度五十八分順天日入酉初四刻加𣋡影六刻五分至戌初二刻五分為昏刻其時中星則南河第三星正中江南加𣋡影五刻至戌初一刻為昏刻其時中星則北河第二星偏東一度二十九分夏至日𨇠参七度四十五分順天日入戌初一刻十一分加𣋡影八刻十二分至亥初二刻八分為昏刻其時中星則貫索第一星偏西二度十分江南日入戌初初刻三分加𣋡影六刻十三分至戌正三刻一分為昏刻其時中星則氐宿第一星偏西三度十分秋分日𨇠翼八度四十分順天日入酉正初刻加𣋡影六刻五分至戌初二刻五分為昏刻其時中星則河鼓第二星偏東二度二十九分
