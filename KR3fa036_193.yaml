body:
  text: 九九九九九四九六三二折半得一二四九九九九九四八一五一為十五度之句股積又如十五度求弧內三角積法以十五度之弧線二六一七九九三與半徑一相乘得二六一七九九三折半得一三八九九六為十五度弧內之積割圓求周求積古率徑一周三夫人而知其太疏也劉𡽪割圓術定為徑一尺周三尺一寸四分有竒其率最適於用而未備也惟祖冲之定為徑一周三一四一五九二六五趙友欽定為徑一周三一四一五九二為徑周之密率嘗試推之古人所謂徑一周三者蓋用六邊之弦線一以三乘之而止得三之一位也至十二邊之弦線五一七六三八以六乘之得三一五八二八二十四邊之弦線二六一五二四以一二乘之得三一三二六二八八四十八邊之弦線一三八六二以二四乘之得三一三九三四八八所得之三一為確數而以下未真至九十六邊之弦線六五四三八二以四八乘之得三一四一二三六所得之三一四一為確數而以下未真至一百九十二
