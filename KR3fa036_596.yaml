body:
  text: 赤經之方位加距日度變時即得太陽所臨赤經之時刻矣太隂距日時刻表月距日平行十二度十一分二十七秒變時得三刻平行朔朔後一日二日三日四日五日六日七日上弦弦後一日二日三日四日五日六日七日望加距日平行望弦後一日二日三日四日五日六日七日下弦弦後一日二日三日四日五日六日七日晦加距日三分四十四秒四十八𢕄遲厯行十一度一分六秒變時得二刻十四分四秒二十四𢕄疾厯行十三度二十一分三十八秒變時得三刻八分二十六秒二十四𢕄今用平行時刻列表遲厯疾厯宜加減消息用之用法測得太隂髙弧以求太隂所臨經度借作時刻加距日時刻即得時刻與加距日度變時所得相同而法稍捷日月合晷圖日晷緯線分節氣分候分日本用天周不用歲周本用實行不用平行而用者最易誤認不若明列南北
