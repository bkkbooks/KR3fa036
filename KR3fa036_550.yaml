body:
  text: 則地平正而赤道斜亦如黃赤之交加也赤道地平可以互求亦如黃赤之可以互求也用正弦寫其外面其度中疏外密而測量尤便假如在鹽城測得太陽地平經度在𫑗南三十度緯度髙二十度便知赤道經度在辰宫十三度緯度在赤南十一度也簡平節氣時刻照臨地平圖簡平本法用二𥂟下𥂟一極線二赤道線三周天圈四節氣線五黃道圈六時刻線上𥂟一地平線二天
