body:
  text: 何承天始知以景長為冬至而小餘又强其後祖冲之始分天自為天歲自為歲而歲差之法出焉又詳測前後日景折算取中以定冬至其小餘二四二八一四八一竒則小餘又弱而庶近于真矣然四十五六年即差一度為數過促又日景長短之變時刻相距亦有不同其時最卑在冬至約十二度折算取中者仍不免後天數刻乃其時北齊張子信始覺日行有入氣之差而立損益之率趙道嚴復凖晷景長短定日行進退更造盈縮以求𧇊食隋劉焯始用定氣蓋髙卑之理雖未明而盈縮則己見矣宋楊忠輔之統天厯以六十七年差一度以周天三百六十度每度六十分每分六十秒約之得每年差五十二秒半其小餘則為二四二五元郭守敬之授時厯因之較諸家為密但小餘則又失之過弱耳自西法入中國而厯法乃精一曰天度分周天為三百六十整度不用竒零度分秒𢕄纎忽芒塵皆遞析以六十設度于此而以日月五星之盈縮進退其間是為以整御零之善法一曰恆星行度以為恆星能出入赤道而循黃道以東行第谷定為每年五十一秒閲七十年有竒而行一度此二者即古之天周若其所論歲周者
