body:
  text: 平分通弦作十字線過𥂟心至邊即兩極之軸數其度得出地度假如鹽城立冬後十四日測得日髙十五度方位在正𫑗南三十四度半先作髙度橫線次作距等圈取方位直線兩線相交之照為日次用本日距緯二十度為半徑作緯圈如法求之即得北極出地三十三度也不知節候求北極出地圖隨時隨地求北極出地不知節候惟測一恆星計其其出地平至正午所厯刻數及正午髙度即可得之假如測得恆星自出地平至正午厯二十七刻九分
  hash: sha256:0ca686436f433cb793cac80ecef9659a7c0b567c79b5fb1561be55ec36a23b4a
