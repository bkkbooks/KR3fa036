body:
  text: 置本年首朔太隂交周加交周望䇿再以交周朔䇿逓加之得逐月望太隂交周自十一宫一十四度五十一分至初宫一十五度九分自五宫一十四度五十一分至六宫一十五度九分皆為太隂入交再以實望實時用推日𨇠月離法各求其黃道實行乃視本時月距正交自十一宫一十七度四十三分至初宫一十二度一十七分自五宫一十七度四十三分至六宫一十二度一十七分皆入食限為有食以太隂全徑化秒為一率十分化作六百秒為二率併徑內减食甚實緯餘化秒為三率求得四率為秒以分收之得食分若食甚實緯大於併徑則不食即不必算月體蔽日圖太陽最大視半徑一十六分二十二秒三十𢕄太隂
