body:
  text: 反之可求黃道有赤道距緯求黃道一率半徑二率赤道正弦三率距緯餘弦四率黃道正弦更之可求赤道反之可求距緯盈縮定氣表太陽行天每𡻕一周萬古不忒宜每日平行而無盈縮乃徵之實測則春分至秋分行天半周而厯日多秋分至春分行天半周而厯日少其在本天所行之度原均而人居地上所見時日不同今求其故則本天髙卑之説盡之一為不同心天以地為心一為本輪不以地為心因有兩心之差而髙卑判焉行度自地心立算不以太陽本天心立算遂有髙卑盈縮之異盈縮之度皆從中距立算而以推時刻往往不合以今之春分秋分不正當中距故也所以又用均輪
