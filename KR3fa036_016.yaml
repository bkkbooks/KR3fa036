body:
  text: 輪行曰交行曰最髙行曰距日行曰距交行刻白爾創為撱圓之法則有一平均二平均最髙均三平均四者皆昔日之所無又有初均二均三均末均正交均末均為昔日之所無其餘亦名同而數異至於黃白交角日在交㸃交角大前後皆小朔望尤小日在大距交角小前後皆大兩弦尤大計其行度一平均用日引度二平均最髙均用日距月最髙之倍度三平均正交均用日交正交之倍度初均仍用自行度二均仍用月距日倍度三均末均用月距日兼月髙距日髙度交角用日距正交兼月距日度而要不離乎本天髙卑中距四限與朔望兩弦前後參互比較而得之五星行度有平行有自行有距日行大概與太隂同五星之行各相似而細較亦有不同者以平行言之土木火各有平行為一類而金水即以太陽之平行為平行是為一類以自行言之土木火金之次輪心皆行倍引數為一類而水星之次輪心則行三倍引數是獨為一類以次輪之大小言之土木金水之次輪半徑皆有定數為一類而火星之次輪在本天最髙則大最卑則小又視太陽在最髙則大最卑則小是獨為一類以次輪之行度言之土木火皆
