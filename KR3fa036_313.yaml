body:
  text: 以六除之得四一八八七九二為渾圓體積盖立方體與渾圓體若六與三一四竒也渾圓立方相容渾圓內容立方立方內又容渾圓如此逓互相容則外圓徑上冪與內圓徑上冪為三倍之比例外立方與內立方之徑冪亦然立方面上斜徑之冪為方冪之倍而此兩對角斜徑即渾圓之徑內小圓徑又在立方體內即以方徑為徑其徑之冪即立方面也故曰三倍比例也若求其徑則外徑大於內徑若一十七有竒與一十內徑之冪百開方得一十為徑則外徑之冪三百開方得一十七又三十五之一十一為徑若有幾層互容皆以此比例逓加即得若求其體積則為五倍有竒之比例若有多層亦以此比例逓加假如內容立方積一千則外大立積五千一百九十四有竒蓋立積一千則其徑冪一百而外大立積之徑冪三百又以徑一十七又三十五之一十一乘之則五千一百九十四又七之二也又㨗法渾圓徑冪一萬五千則內容立方面之斜徑冪一萬為渾圓徑冪三之二若設渾圓徑一百其冪一萬則內容立
