body:
  text: 句股釋例一數為六藝之一句股又為九數之一亦儒者所兼及也而推歩測量尤所必需不知句股則推歩測量不可得而學也古謂句股以御髙深廣遠盖句股可以測地亦可以窺天其理至精其用至博凡方圓三角諸形皆依句股立算雖渾圓弧曲亦必以句股直線算之虛空中絕無句股之迹亦可尋出句股算之日月星辰之髙下行度之遲疾交食之淺深皆以句股御之而分秒莫遁也作句股釋例句股出於洛書洛書為萬數之原加减乘除無不備具而尤為句股所自出中五為弦冪二十五而東之三東南之四二冪適得二十五是句股弦得整數者自句三股四弦五始句股之機括見於此矣啟䝉附論始作洛書四句股圖皆以三倍迭加之本合為一圖今更推之不止三方合為一句股也八位中五和五較皆具每易一句股則其方位皆如第一圖之次以推移依次分為四圖並詳註於其下使知天地自然之數之妙有
