body:
  text: 若乙辛與辛甲也又平分辛角作辛壬線與壬戊辛甲皆等則成甲辛壬三角形與辛戊甲相似則乙辛與辛甲若辛甲與壬甲也如此遞半則其角比例並同一乙甲二乙辛即戊辛戊甲三辛甲即辛壬戊壬四辛癸即壬癸壬甲五癸甲即癸子壬子六癸丑即丑子子甲七丑甲即丑寅寅子八丑邜即𫑗寅寅甲九𫑗甲若能知其數則以大分遞乘全數除之得細數甲乙線十數求作理分中末線先依甲乙線作甲乙丁丙正方形四面皆十數次任用一面平分之如甲丙平分于壬甲乙之半數也次自壬向乙角作乙壬斜線其數一十一一八三三九次用甲壬度自壬截乙壬于癸其餘癸乙即大分其數六一八三三九末以癸乙度截甲乙於戊則乙戊為大分戊甲為小分其數三八一九六六簡法作句股形令甲壬句如甲乙股之半乃以壬為心甲為界作圓
