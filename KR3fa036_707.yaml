body:
  text: 赤以乙數加之得三五五四八二為赤緯正弦檢表用中比例求之得赤北緯二十度四十九分二十二秒一十九𢕄又設黃道距春分三十度黃緯南十度甲數乙數並同四率黃弦距赤亦同但以乙數减黃弦距赤得三六九四八二為赤緯正弦檢表用中比例求之得赤北緯二度七分二秒四十八𢕄此以經度皆在夏至前後兩象限中故所得赤緯皆在北惟黃南緯星又近二分則有四率小於乙數者轉以四率减乙數而變為南緯黃北緯星之變北緯亦然亦有無四率者其星必在黃道二分經度視星在南北即以乙數命為南北緯度之正弦
