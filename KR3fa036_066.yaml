body:
  text: 也古謂日有中道中道者即黃道也日循黃道而行歷二十四節氣而一周黃道之分宫分度别有其心是為黃道之南北極而與赤道之極相距二十三度二十九分故黃赤大距亦二十三度二十九分春秋分時正當二道斜交之點分之前後各有距緯至冬至則在赤道之南二十三度二十九分是為外衡至夏至則在赤道之北二十三度二十九分是為內衡法與古同但距緯較古為少耳月不行黃道而欲求月行之出入必以黃道為宗蓋月道又斜交於黃道而出其內外者也古謂月有九行以黃道內為隂厯外為陽厯冬入隂厯夏入陽歷月行青道冬入陽厯夏入隂厯月行白道春入陽厯秋入隂歷月行朱道春入隂厯秋入陽厯月行黑道四序離為八節至隂陽之所交皆與黃道相會今法總名白道白道之分宫分度别有其心是為白道之南北極與黃極恆相距五度大則五度十七分二十秒小則四度五十九分三十五秒其經度則歲歲遷動至滿二百四十九交交點一周天而經度又復其始約其數則十九年有竒白極隨交點而移交點逆行白極亦逆行先求交點在黃道度分離一象限為半交與白極相應半
