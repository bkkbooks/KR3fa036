body:
  text: 北極髙三十三度求昏旦時刻設如北極出地三十三度赤道北緯十五度求昏旦時刻法以北極緯七十五度北極距天頂五十七度相加為總弧相减為較弧而各取其餘弦以相加减兩弧一過象弧則加俱過俱不過則减此宜相加而半之為中數即為一率又以日距天頂一百八度餘弦加半徑得大矢又以較弧餘弦减半徑得正矢乃以日距天頂大矢與較弧正矢相减餘數為矢較為二率半徑為三率求得四率為北極鈍角大矢大矢內减半徑餘為北極鈍角餘弦檢表得度化時與午正相减得寅初二刻十四分四十三秒二十𢕄為旦刻與午正相加得戌正一刻一十六秒四十𢕄為昏刻
