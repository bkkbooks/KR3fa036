body:
  text: 土星平行年根日數相加得八宫一十八度三十八分四十八秒二十五𢕄最髙平行年根日數相加得初宫一度四十五分三十三秒二十五𢕄正交平行年根日數相加得六宮二十三度五分七秒一十一𢕄引數置土星平行減最髙平行得八宫一十六度五十三分一十五秒初均數以引數宮度分察所對之初均數得六度三十二分二十六秒其號為加中分又察所對之中分得二十三分二十三秒三十𢕄初實行置土星平行依號加初均數得八宫二十五度一十一分一十四秒二十五𢕄本日太陽實行二宫二十度五十三分二十七秒二十一𢕄星距日次引置太陽實行減初實行得五宫二十五度四十二分一十二秒五十六𢕄次均數以星距日次引宫度分察所尉之次均數得二十八分一十三秒其號為加較分又察所對之較分得三分四十九秒實次均以三千六百秒為一率較分化秒得二百二十九秒為二率中分化秒得一千四百三秒半為三率求得四率為八十九秒二十八𢕄以分收之為一分二十九秒二十八𢕄為加差與次均相加得二十九分四十二秒二十八𢕄為實次均本道實行置初實行加實次均得八宫二十五度四十分五十六秒五十三𢕄距交實行置初實行減正交平行得二宫二度六分七秒一十四𢕄升度差以距交實行宫度察所對之升度差得一分二十三秒其號為減黃道實行置本道實行依號減升度差得八宫二十五度三十九分三十三秒五十三𢕄星距黃道線以距交實行宫度所對之星距黃道數得三八七七二其號為北星距地心線以星距日次引宫度察所對之星距地得八九六零七三六
