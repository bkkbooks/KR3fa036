body:
  text: 之數所算較真第按西人舊説謂宗動天去地六萬四千七百三十三萬八千六百九十餘里恆星天去地三萬二千二百七十六萬九千八百四十五里零土星天去地二萬零五百七十七萬零五百六十四里零木星天去地一萬二千六百七十六萬九千五百八十四里零火星天去地二千七百四十一萬二千一百里零日天去地一千六百零五萬五千六百九十里零金星天去地心二百四十萬零六百八十一里零水星天去地心九十一萬八千七百五十里零月天去地心四十八萬二千五百二十二里零後因測驗不合另有新術推得月去地心八十四萬四千六百九十一里一百四十四步日去地心二萬九千一百四十四萬五千三百八十餘里水星金星略與日同火星較日髙一倍半木星較日髙五倍土星較日髙十倍恆星較日髙九千倍恆星亦以火木土三星行天之遲速比擬得之若恆星以上之天太虛無迹則仍非智識之可推矣此説為世所宗厲寶青又推宗動天去地心數一百一十五億亦𦕬以算法求之耳不足為定論也其謂去地心者須減去地半徑之數一萬四千三百三十三里零一十八丈餘為
  hash: sha256:84899ad05c7143ddc809f15cf3298db836aff7cb131cfe3d716f6bb31a34f36e
