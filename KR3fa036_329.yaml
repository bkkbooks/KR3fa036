body:
  text: 天象圖說言天象者始於璿璣渾儀即其遺制蓋天體渾圓惟渾儀為能恰肖也然欲詳求其測算之事必寫記於平面故渾天不可圖也圖之則變渾為平矣然其象雖平而其度則渾以正切線寫之變坳為平如身在天中測渾天之內面以正弦線寫之抑𦊅為平如置身天外測渾天之外面渾圓如望像平圓如畫像其為周天之度不異也至渾圓分而為三角增而為小輪變而為撱圓非必實有是象而要皆深思造𢕄剖立巧法以求合天者也合此數法以求天象而黃赤經緯之差日月交食之故五星遲疾順逆伏見之由悉可按圖得也於是以所得者録而存之亦可為管窺之一𦔳云爾作天象圖說渾象斜視圖渾天不可圖矣圖渾於平不得己而為側睨遙望之形以曲狀其變如圖上為北極下為南極中為渾圓
