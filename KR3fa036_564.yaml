body:
  text: 春分一三二四三二四三五二二四七六二六四四六五七秋分清明三一一四二一四一五三五七八五五一八五三六五九三二六白露穀雨六一一四三一四三五四八二一八三七五七六二六三四九八一處暑立夏八五二一三四四一五一六三七二一三三七六六八六八四三四立秋小滿一五二一三四三三四五四八八六二七三七一六一一七三大暑芒種一二六二一三三四一六三七一七四四二六八九二一九三三九一小暑夏至一三二三三一二三四六七四三六九四二四七四八三三六二夏至度分度分度分度分度分度分度分度分戌初酉正酉初申正申初未正未初午正地三十三度推算各節氣各時刻之髙弧列表節氣直推時刻橫推其縱橫相遇之數即為節氣時刻相應之度分也作髙弧晷按表中度分㸃之或止用象限儀測得髙弧度分查表即得節氣時刻也
