body:
  text: 黃白距度有大小之異表中左列距度分秒是最小距度之數右列較分秒是最大距度多於最小距度之數其在大小之間者用中比例法求之太隂距交在上六宫用順度在下六宫用逆度以距交之宫對距交之度其縱橫相遇之數即為所求之距度也表只列整度其分秒亦用中比例法求之朔望策表太陽每日平行五十九分八秒一十九𢕄四十四纎四十三忽二十二芒與太隂每日平行一十三度
