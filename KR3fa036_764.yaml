body:
  text: 步土星假如道光癸已距根八十日求土星經緯法先求太陽實行年根距冬至一十三分三秒一𢕄最卑一十度三分二秒六𢕄日數八十日平行二宫一十八度五十一分六秒二十𢕄最卑行一十三秒四十八𢕄平行太陽平行年根日數相加得二宫一十九度四分九秒二十一𢕄最卑平行年根日數相加得一十度三分一十五秒五十四𢕄引數置平行减最卑平行得二宫九度五十三秒二十七𢕄均數以引數宫度分察所對之均數得一度四十九分一十八秒其號為加實行置平行依號加均數得二宫二十度五十三分二十七秒二十一𢕄次求土星年根距冬至八宫一十六度二十八分一十五𢕄减三十分改作一十五度五十八分一十五𢕄最髙行初宫一度四十五分一十五秒五十一𢕄正交行六宫二十三度四分五十八秒一𢕄日數八十日平行二度四十分四十八秒一十𢕄最髙行一十七秒三十四𢕄正交行九秒一十𢕄
