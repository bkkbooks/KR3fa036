body:
  text: 步木星假如道光壬辰距根二百四十七日求木星經緯法先求太陽實行太陽年根距冬至二十七分二十二秒五十四𢕄最卑年根十度一分五十九秒九𢕄太陽日數八宫三度二十七分一十七秒一十七𢕄最卑日數四十二秒三十六𢕄太陽平行年根日數相加得八宫三度五十四分四十秒一十三𢕄最卑平行十度二分四十一秒四十五𢕄引數置平行减最卑平行得七宫二十三度五十一分五十八秒二十八𢕄均數以引數宫度分察均數表所對之數得一度三十二分四十秒二十𢕄其號為减實行置平行依號减均數得八宫二度二十一分五十九秒五十三𢕄為太陽實行次求木星木星年根距冬至二宫二度三十九分一十九秒一十一𢕄最髙年根九宫一十二度一十四分四十三秒四十四𢕄正交年根六宫七度五十五分二十二秒二十三𢕄木星日數二十度三十二分三秒二十八𢕄最髙日數三十九秒八𢕄正交日數九秒一十二𢕄木星平行年根日數相加得二宫二十三度一十一分二十二秒三十九𢕄
