body:
  text: 如圖戊已甲乙半渾圓以戊丙甲己丙乙兩半周線分為弧三角形四一戊丙乙二巳丙戊三己丙甲並大四乙丙甲為最小今可𥁞易為小形一戊丙乙形易為乙甲丙形戊丙減半周餘丙甲又戊乙減半周餘乙甲而乙丙為同用之弧則三邊之正弦同也乙丙甲角為戊丙乙外角甲乙丙角為戊乙丙外角戊角又同甲角則三角之正弦同也故算甲丙乙即得戊丙乙二己丙戊形易為乙甲丙形乙甲巳及甲已戊並半周內各減己甲則乙甲同已戊而乙丙于己丙及甲丙于戊丙皆半周之餘又甲戊並正角丙為交角而乙角又為己角之外角故算乙丙甲得己丙戊三己丙甲形易為乙丙甲形乙甲為已甲減半周之餘乙丙為丙己減半周之餘而同用甲丙又次形丙角為原形之外角乙角同己角甲同為正角故算乙丙甲得已丙甲凡正弧三角內有大邊及鈍角者皆以次形立算但於得數後以次形之邊與角減半周即得元形之大邊及鈍角斜弧同其元形內原有小邊及鋭角與次
