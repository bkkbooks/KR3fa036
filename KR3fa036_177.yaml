body:
  text: 半則成正剖之半方形矣其他鋭角鈍角或有直無橫有橫無直必以法求之使成句股然後可算故句股者三角法所依以立也鋭角形求積假如甲乙邊二百三十二尺甲丙邊三百四十尺乙丙邊四百六十八尺求積先求垂線任以乙丙邊為底以甲丙甲乙為兩弦兩弦之較數一百零八尺總數五百七十二尺相乘六萬一千七百七十六尺為實以乙丙底為法除之得數一百三十二尺轉減乙丙餘數三百三十六尺半之得乙丁一百六十八尺依句股法以乙丁自乘二萬八千二百二十四尺與甲乙自乘五萬三千八百二十四尺相減餘數二萬五千六百尺平方開之得甲丁垂線一百六十尺以甲丁垂線折半乘乙丙底得積凡求得鋭角形積三萬七千四百四十尺假如鈍角形求積甲乙邊五十八步甲丙邊八十五步乙丙邊三十三步求垂線立于形外以乙丙為底甲乙甲丙為兩弦總數一百四十三步較數二十七步相乘三千八百六十一步為實乙丙底為法除之
