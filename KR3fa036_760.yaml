body:
  text: 三均用相距縂數九宮十八度十六分四十七秒四十七𢕄查得二分一十八秒為三均號减三實行二實行十一宮一十六度一十六分二十秒三十六𢕄减二分一十八秒餘十一宫一十二度一十四分二秒三十六𢕄為三實行末均用日月最髙相距十一宫八度五十七分四十秒四十二𢕄及實月距日十宫九度一十九分七秒五𢕄查得五十二秒為末均號加白道實行三實行十一宮一十二度一十四分二秒三十六𢕄加末均五十二秒得十一宫一十二度一十四分五十四秒三十六𢕄為白道實行正交實均用日距正交二宮九度四十八分三秒五十六𢕄查得五十九分八秒為正交實均號加正交實行用正交十宫二十三度五分二十九秒三十五𢕄加實均五十九分八秒得十宫二十四度四分三十七秒三十𢕄為正交實行月距正交白道實行十一宫一十二度一十四分五十四秒三十六𢕄减正交實行十宮二十四度四分三十七秒三十五𢕄得月距正交一十八度一十分一十七秒一𢕄距交加分用日距正交二宫九度四十八分三秒五十六𢕄查得距交加分二分七秒距交加差距日加差用日距正交宫度又查得距交加差二分二十四秒用實月距日十宫九度一十九分七秒五𢕄查得距日加差一分三十八秒距日加分以最大兩弦加分二分四十三秒化作一百六十三秒為一率距交加差二分
