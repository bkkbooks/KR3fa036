body:
  text: 三五五七所用丁角正弦即六十度半正弦以鈍角度减半周用之凡鈍角並同三乙丁邊四乙丙邊七十九丈一寸三分次求丁丙邊以丙角正弦比乙角正弦若乙丁邊與丁丙邊一丙角正弦二乙角二十四度正弦四六七三六六三乙丁邊四丁丙邊三十六丈九尺二寸四分鈍角形有一角兩邊求餘角餘邊假如乙丁丙鈍角形有乙丁邊一千八十尺乙丙邊一千五百八十二尺乙角二十四度角在兩邊之中不與邊對從不知之丙角作虛垂線於形外如丙戊亦引乙丁線於形外如丁戊兩虛線遇於戊成正方角乃求丙戊𡸁線以半俓比乙角正弦若乙丙邊與丙戊一半徑二乙角二十四度正弦四六七三六六三乙丙邊四丙戊邊即虛垂線六百四十三尺又以半俓比乙角之餘弦若乙丙邊與乙戊一半徑二乙角餘弦九一三五四五五三乙丙邊四乙戊邊即乙丁引長線一千四百四十五尺以原邊乙丁與引長乙戊邊相减得丁戊三百六十五尺為形外所作虛句股形之句則先得丙戊垂線為股而原邊丁丙為之弦求丁丙邊依
