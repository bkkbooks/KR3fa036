body:
  text: 再乘象限經弧一五七七九六三得五二三五八四一然後用二十四乘之得穹積一二五六六三與周徑相乘之數合地球面積古里法在天一度在地二百五十里今里法在天一度在地二百里天度大而地度小地在天中如小圓在大圓中大圓分三百六十度小圓亦分三百六十度度有大小而無多寡其照臨之相應者如此也用周徑密率求得半徑一萬一千四百五十九里小餘一五倍之得二萬二千九百一十八里強為全徑以全徑自乘得五二五二四以比平圓面積四一二四八又四因之得一十六萬四九九二為地球之皮面積得方萬里者十六方半今之中國蓋得大地一十六分之一也逐度求皮面積平圓面積求逐度法以逐度之弧線與半徑相乘得數折半得逐度之面積今求渾圓其所謂一度者是從北極至南極為一度之長所謂桞葉度形也法以逐度之弧線與象限弧線相乘得數即為渾面一度之積假如渾天球徑二千萬半徑一千萬求一度面
