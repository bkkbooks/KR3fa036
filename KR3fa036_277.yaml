body:
  text: 求己甲邊法為己角之餘弦即庚丁正弦若丙角之正弦若己丙之餘弦即庚丙正弦與己甲之餘弦即丁角正弦其弧壬甲右三角求邊又如有己甲己丙兩大邊求丙甲邊法為己甲餘弦即丁角正弦與己丙餘弦即庚丙正弦若半徑與丙甲餘弦即丁丙正弦或有己甲丙甲兩邊求己丙大邊法為半徑與丙甲餘弦即丁丙正弦若己甲餘弦即丁角上弦與己丙餘弦即庚丙正弦得數减半周為已丙下同或有丙甲己丙二邊求己甲大邊法為丙甲餘弦與半徑若己丙餘弦與已甲餘弦即上法之反理右二邊求一邊以上己丙甲形用次形之法本形有兩大邊一鈍角次形則邊小角鋭而且以本形之邊易為次形之角本形之角易為次形之邊後二形並同二己丙戊形戊正已鈍丙鋭己丙戊丙並大易為丁丙庚次形法曰以象限截己丙於庚其餘庚丙截戊丙於丁其餘丁丙為次形之二邊作丁庚弧其度為已角之餘已鈍角與外鋭角同以壬庚二度取正弦其餘丁庚為已外角之餘亦即為己鈍角之餘角易邊也次形又為
