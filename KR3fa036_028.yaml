body:
  text: 去地面之數也又按各重天去地心數隨時不同設以天半徑為一千萬全數而依數立率推之日天黃道最髙則一千零一十六萬九千最卑則九百八十三萬一千月天最髙則一千零六十六萬七千八百二十最卑則九百三十三萬二千一百八十土星最髙則一千零五十六萬九千一百七十四最卑則八百九十五萬七千四百木星最髙則一千一百九十二萬九千四百八十最卑則八百零七萬零五百二十火星最髙則一千七百九十萬九千二百五十最卑則二百五十八萬四千二百五十金星最髙一千七百三十六萬七千九百六十最卑二百七十三萬一千八百六十水星最髙一千四百五十三萬二千一百五十五最卑五百六十九萬七千一百零九又當隨時加减以得實數不得僅以中距為率也千歲之日至步厯者必始于冬至周髀之法日日行一度無盈縮又即以歲周為天周不分恆星宗動二天其小餘四分之一歲實又失之太强執是以求是以冬至後於天而日𨇠西改耳靈帝時始悟四分於天疏濶而减小餘為二四六一七九九六竒然小餘猶强木合至
