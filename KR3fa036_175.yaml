body:
  text: 減所得句總餘數四百五十九尺四寸半之得數二百二十九尺七寸為小形之句甲丙以甲丙加丁丙較三百尺得數五百二十九尺七寸為大形之句甲丁求丁角用乙甲丁大形以乙丁弦比丁甲句若半徑與丁角之餘弦一乙丁弦六百七尺二甲丁句五百二十九尺七寸三半徑四丁角餘弦八七二六五二三得丁角二十九度一十三分五十四秒求丙角用乙甲丙小形以甲丙句比乙丙弦若半徑與丙角之割線一甲丙句二百二十九尺七寸二乙丙弦三百七十五尺三半徑四丙角割線一六四一二七一得丙角五十二度二十七分四十四秒為本形之丙外角以減半周得丙鈍角一百二十七度三十二分一十六秒求乙角併丁丙二角所得度分共一百五十六度四十六分一十秒以減半周得餘二十三度一十三分五十秒為乙角三角求積句股形求積以句股相乘折半得積或以句折半乘股亦得積或以股折半乘句亦得積凡求平積皆謂之冪其形如網目又似窗櫺之空皆以橫直相交如十字故句股是其正法句股者方形斜剖之半也折
