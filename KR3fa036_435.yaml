body:
  text: 作撱圓周法圖作撱圓周法如圖寅甲為兩心差甲已為倍差寅丑寅已為大半徑一千萬以寅為心與已丑作十字線又取寅丑之度從甲截橫線於午使午甲午已與寅丑半徑等乃以甲已兩點各為心午為界各用一針釘之圍以絲線末以鉛筆代午針引而旋轉即成丑午已未撱圓形又法以甲為心以二千萬為半徑作圓如壬自已出線至圓周壬折半至癸作垂線所抵圓徑之點辛即撱圓界依法逐度作點連之即成撱圓周五星天撱圓圖刻白爾用撱圓法推算日月而未及五星今按五星各有其本天之兩心差亦可作撱圓圖算之土星次輪心在最髙距地心一五六九一七四次輪心在
