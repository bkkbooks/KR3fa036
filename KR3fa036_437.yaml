body:
  text: 最卑距地心九四三八二六次輪心在中距土星行次輪周最髙距地心一一四二六最卑距地心八九五七四與半徑相減得一四二六為兩心差木星次輪心距地心最髙一四五七三四最卑九五四二六六木星行次輪周距地心最髙一一九二九四八最卑八七五二與半徑相減得一九二九四八為兩心差火星次輪心距地心最髙一一一一三最卑八八八七次輪半徑在最髙則大在最卑則小又太陽在最卑時則小其本數最髙六五六一二五最卑六三二七五其太陽髙卑差數最髙差二三五用次輪心最髙一一一一三與本數六五六一二五相加又與太陽髙卑差數二
