body:
  text: 相減餘三千五百一十八丈折半得一千七百五十五丈為長方積以弦較較二十八丈與兩弦一句共數相加得一百五丈為長濶和用𢃄縱和數法開之先求半較用一百五丈折半作五十二丈五尺自乘得二千七百五十六丈二十五尺與積相減餘一千一丈二十五尺為啇實初啇三減積九百餘一百一丈二十五尺為次啇實次倍初啇用六籌加平方籌上次啇一減積六十一丈餘四十丈二十五尺為三啇實次倍初啇次啇用六二兩籌加平方籌上三啇五減積三十一丈二十五尺餘九丈未盡約開整數三十一丈五尺與半和相減餘二十一丈為句句與句股和相減餘二十八丈為股以句股較七丈加弦較較得三十五丈為弦假如句弦和五十六丈股弦和六十三丈求句股弦兩和相乘得三千五百二十八丈倍之得七千五十六丈開方得八十四丈為弦和和以股弦和六十三丈減之餘二十一丈為句以句弦和五十六丈減之餘二十八丈為股以句股和四十九丈減之餘三十五丈為弦
