body:
  text: 赤道者也故以赤道為宗白道又出入於黃道者也故不以赤道為宗而以黃道為宗其實七政皆以黃道為宗也夫既以黃道為宗則第分黃道之宫度可矣而又於白道規上細分其宫度者測距限推交食必用白道宫度也加白道規法與赤道上加黃道規同但彼用黃赤大距求規樞此用黃白距限求規樞耳既得規樞運之成白道規又求白道全體規樞求白道地心横線用切線以分白道宫度並與分黃道宫度法同赤道上加黃白二規圖白道出入於黃道即因以出入於赤道故由黃白之距緯以生赤白之距緯第黃白之距緯有定而赤白
