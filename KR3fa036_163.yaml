body:
  text: 鋭角形有兩角一邊求餘角餘邊假如乙丙丁鋭角形有丙角六十度丁角五十度丙丁邊一百二十尺先求乙角以丙角丁角併之得一百一十度减半周得乙角七十度次求乙丁邊以乙角正弦比丙丁邊若丙角正弦與乙丁邊一率乙角正弦九三九六九二六二率丙丁邊三率丙角正弦八六六二五四四率乙丁邊一百一十四尺九寸二分次求乙丙邊以乙角正弦比丙丁邊若丁角正弦與乙丙邊一率乙角正弦二率丙丁邊三率丁角正弦七六六四四四四率乙丙邊九十七尺八寸二分鋭角形有一角兩邊求餘角餘邊假如甲乙丙鋭角形有甲丙邊四百尺乙丙邊二百六十一尺八分丙角六十度角在兩邊之中不與邊對求甲乙邊先求中長線分為兩句股形以半徑比丙角正弦若甲丙邊與甲丁中長線
