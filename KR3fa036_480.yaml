body:
  text: 宿經度然後與各時正中之度相减餘為各時星偏東西度分也中星儀圖中星儀用動靜二𥂟外𥂟為靜𥂟𥂟周分列十二時九十六刻以象天常赤道內𥂟為動𥂟𥂟中位置星宿𥂟周分列三百六十度以象逰旋赤道用法先察日𨇠黃道經度變為赤道經度次測某星正中即將內𥂟某星對外𥂟之午次察赤道經度對於外𥂟何時何刻即得時刻或先有時刻將赤道經度對於外𥂟時刻次察外𥂟之午對於內𥂟何星即得中星歲久有差則重推度分另置星𥂟用之赤道歲差表
