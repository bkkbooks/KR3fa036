body:
  text: 陽循撱圓周行惟所當之面積相等而角不等其角度與積度之較即平行實行之差月天撱圓圖大隂兩心差隨時不同日當月天最髙或當月天最卑則最大遲疾差為七度三十九分三十三秒兩心差為六六七八二日當月天中距則最大遲疾差為四度五十七分五十大秒兩心差為四三三一九日厯月天髙卑而後兩心差漸小中距而後兩心差漸大日距月天髙卑前後四十五度兩心差適中為五五五五兩心差不等而撱圓之面積與太隂之平行亦因之不等兹用最大兩心差作撱圓以見例若求其全湏按逐宫逐度之兩心差為之
