body:
  text: 太陽𣋡影限圖以周天三百六十度均分之晝夜各得一百八十度而晝分恆嬴于夜分晝分得二百一十六度夜分得一百四十四度則以昏旦各得一十八度為太陽之𣋡影限也太陽未出在地平之下一十八度而天已旦矣太陽既入在地平之下一十八度而天始焉所謂一十八度者以地平之緯度言之非以赤道之經度言之也故一十八度則同而各處時刻不同一處之各節氣時刻亦不同兹用鹽城地平緯度推之而各節氣𣋡影之時刻皆可按圖而得矣太隂隱見界圖月之初三為哉生明而亦有初二見月者甚有初一見月者又有晦日之晨見月者前人以為變而占之而不知其為常事也月在地平之上距地平十二度
  hash: sha256:1c152bba1adaf4ac8126302502b296cc1187f66d0b3271aef7c46e1acdc441ea
