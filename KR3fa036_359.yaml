body:
  text: 黃道赤道之度一平分一不平分而差率生焉黃道寅丑申未四宫約以二十八度當赤道之三十度子午𫑗酉四宫約以三十度當赤道之三十度亥戌已辰四宫約以三十二度當赤道之三十度今用三宫立表即六宫十二宫可推用表法有同推度如一七同位則同推黃道一宫五度為赤道之一宫七度二十一分三十四秒黃道七宫五度亦為赤道之七宫七度二十一分三十四秒此同推度也有順逆異推度如四十逆字逆推與一七順字順推者不同逆推之法用餘度與順推用正度直數者不同所謂用餘度者黃道以二十九度為一度以二十八度為二度赤道以二十九度一十三分一十六秒為初度四十六分四十四秒以二十八度一十五分二十六秒為一度四十四分三十四秒知此順逆異同之法則三宫升度表足為六宫之用並足為十二宫之用也用黃經求赤緯圖黃經赤緯原有可以互求之法第必用推算而得之今法只用黃道規運旋於天常赤道之上其黃道運
