body:
  text: 之底定尺逐度向徑線識之即得全徑緯度運而圓之即得各距等圈又切線可以測太陽髙弧定時刻可以求北極出地度分其用甚廣渾象平視圖渾天周圍皆圓無平面也其經度緯度皆弧線無直線也以平寫渾則渾圓既變而平即弧線亦或變而直非復渾天之本象矣今用立置渾儀之形使北極居上南極居下而從子午規之中平視之其分度法用切線作規於形外以得周天經緯其經度惟子午規變為直線而左右仍皆弧線其緯度惟赤道圈變為直線而上下亦皆弧線弧線之濶狹悉由切線之遠近而分雖不能恰肖渾圓而本象庶幾不失前人謂剖渾體如𠂢瓣此象近之或赤道正當天頂之處
