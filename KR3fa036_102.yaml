body:
  text: 時而卑於日度則知其在陽厯也此賈疏增言圓望之義也測黃赤大距法於冬至日午正測太陽在赤道南若干度分夏至日午正測太陽在赤道北若干度分若冬至夏至皆在午正則所測日距赤道南北之緯度即黃赤大距度若冬至夏至不正當午正則又用測太陽赤道經度法測得太陽距冬夏至前後若干度分用有太陽赤道緯緯度求黃赤交角之法求得黃赤交角即黃赤大距度也蓋用弧線三角形法測得逐日之距緯皆可以推大距然春秋分前後黃道斜而緯差大以推大距其理隱而難知冬夏至前後黃道橫而緯差𢕄以推大距其象顯而易見故冬夏致日古今之通義也測黃白距限法於春分日上弦秋分日下弦月距交九十度時測得月距赤道北若干度分春分日下弦秋分日上弦月距交九十度時測得月距赤道南若干度分與黃赤大距相减餘為二白二道最大之距限又於冬至日望月距交九十度時測得月距赤道北若干度分夏至日望月距交九十度時測得月距赤道南若干度分與黃赤大距相减餘為黃白二道最小之距限蓋白道與黃道斜交月距交九十度則距黃道最遠故測黃白大
