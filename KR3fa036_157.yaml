body:
  text: 內减去正矢餘謂之大矢所用之弧度為正弧以正弧减象限為餘弧正弧所對為正角餘弧所對為餘角有正弧正角即有正弦有正矢亦即有餘弦有餘矢每一弧一角各有正弦餘弦正矢餘矢己成四線於平圓內古人用句股割員即此法也盖此四線己成倒順二句股再引半徑透于平員之外與切員直線相遇為割線切線而各有正餘復成四線正割正切餘割餘切復成倒順二句股平員內外共為八線凡用一角即對一弧即有八線弧亦然凡一弧之八線即成倒順四句股角亦然凡三角形併三角之度皆成兩象限共一百八十度句股形有一角即知餘角其形原有正方角九十度則餘兩角共九十度三角形有兩角即知餘角併兩角以减半周一百八十度得之鈍角不立正弦以鈍角减半周得外角即以外角之正弦為正弦亦即以外角之餘弦為餘弦鈍角之弧為過弧其弧越象限弧而過之也矢為大矢其矢得大半圓之徑也鈍角與外角同用正弦餘弦所不同者惟矢鈍角用大矢外角用正矢也八線起初度一分至八十九度五十九分並有正弦而九十度無正弦非無正弦也即以半徑全數為正弦也故
