body:
  text: 求日至假如上推前明洪武元年戊申天正冬至積年癸𫑗厯元上距洪武元年戊申共三百五十六年減一年得積年三百五十五中積分以積年二五五與歲實三六五二四二三三四四二相乘得中積一十二萬九千六百六十一萬二八七一九一通積分上推用減氣應三二一二二五四得通積一十二萬九千六百二十八萬九六一七九一下推則用加氣應得通積冬至日分通積分滿紀法六十去之餘二十八萬九六一七九一上推用轉減法與紀法六十相減餘三十一萬九三八二九下推即以餘數為冬至日分不用轉減紀日時冬至日分自初日起算得甲午日丑時正一刻一十二秒積日中積分減氣應分一二二五四加本年天正冬至分八七七四六共得一十二萬九千六百二十九日七八三六三九一為積日此上推法也下推則加氣應減本年天正冬至分通朔積日加朔應一十五日一二六三三得一二九六四四日九九九六九一為通朔下推用減積朔通朔以朔策二十九日五三五九五三除之得四千三百九十朔為積朔下推加一朔首朔朔䇿除餘五日七一七五四二四為冬至後丑月首朔下推以餘數與朔䇿相減為首朔紀日數以首朔減朔䇿得其年十一月小其月二十四日丑時正一刻一十二秒交冬至年根以冬至分三十一萬九三八二九與周日一萬分相減餘九六一七九一與太陽平行三千五百四十八秒三二九八九七相乘得三三二九七三六八六九一八三四七三以一萬分除之得三三二九七三六八六九一以分收之得年根丑宫五十五分二十九秒四𢕄一十二纎
