body:
  text: 啇二作四為𤎉法用四籌加平方籌上為𤎉隅共法次啇一减積恰盡開得方根二十一丈為句假如股弦和六十三丈股弦較七丈求句和較相乘得句實四百四十一丈開方得二十一丈為句假如句弦和五十六丈句弦較十四丈求股和較相乘得股實七百八十四丈開方得二十八丈為股假如句二十一丈股弦較七丈求股弦和以股弦較七丈為法以句自乘得四百四十一丈為實求得六十三丈為股弦和假如句二十一丈股弦和六十三丈求股弦較以股弦和六十三丈為法以句自乘得四百四十一丈為實求得七丈為股弦較假如股二十八丈句弦較十四丈求句弦和以股實七百八十四丈為實以句弦較十四丈除之得五十六丈為句弦和假如股二十八丈句弦和五十六丈求句弦較以股實七百八十四丈為實以句弦和五十六丈除之得十四丈為句弦較
