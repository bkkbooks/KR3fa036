body:
  text: 各宫北極出地列表自北極出地五度至北極出地五十六度備列於前而以各宫之北極髙度分列於後求樞運規者按表橫推即得假如鹽城北極出地三十三度橫推三九五十一宫北極出地一十七度五十八分二八六十二宫北極出地二十九度二十一分依數求各宫之樞以運各宫之規可也橫偃宫度割圓圖地平橫偃宫度即得各宫之規亦用割圓法割至一百二十三度以備黃道出入安命及㸃定諸曜之用其法以黃道規上本日𨇠度興時刻相對乃察黃道
