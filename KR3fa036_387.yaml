body:
  text: 立三面攅凑之角為渾圓心底上弧赤道同升度也赤道各線俱在平面為底面上弧黃道度也黃道各線俱在斜面立面弧黃赤距緯也距緯各線俱在立面外立面為黃赤兩切線之界法從二分起算以兩弧求一弧斜面比例為半徑與赤道餘弦若黃道割線與距度割線又為半俓與距度割線若黃道餘弦與赤道餘弦立面比例為半徑與赤道割線若距度割線與黃道割線又為半徑與距度餘弦若赤道餘弦與黃道餘弦平面比例為半徑與黃道餘弦若赤道割線與距弧餘弦又為半徑與距度餘弦若赤道餘弦與黃道餘弦句股方錐求黃赤道度圖句股方錐因諸線成各句股形為方錐之面其銳尖皆會于渾圓心又成方直形以為之底斜平面有黃道弧諸線又有相應之赤道諸線平面有赤道弧諸線又有相應之黃道諸線立面有大距弧諸線又有相對之距緯諸線斜立面有黃赤距度諸線又有相對之大距度諸線四面各具四句股並為相似之形
