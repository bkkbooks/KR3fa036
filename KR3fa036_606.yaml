body:
  text: 日當天頂又正當子午圈而月之實緯即日月兩心視相距外此則日影心之所在隨時隨地不同若日影心與月影心同點則必見日全食若日影心與月影心之相距大於併徑則不見食故先以食甚用時求其兩心視相距復設一時限西向後設限東向前設亦求其兩心視相距以此兩視距線及所夾之角求其對邊為視行自日影心至視行作乘線與視行成直角是為兩心相距最近之處月影心臨此直角之點即為食甚真時因垂線不與實緯合故不曰視緯而曰兩心視相距然後以所得真時復考其兩心視相距果與所求垂線合則食甚真時即為定真時不然則又作垂線求之蓋太隂視差時時不同其視行之道既不與白道平行又不能自成直線其兩心
