body:
  text: 開方得七丈為句股較假如弦三十五丈句股較七丈求句股弦實一千二百二十五丈減句股較實四十九丈餘一千一百七十六丈折半得兩句股積五百八十八丈為句股相乘長方以句股較七丈為縱用開𢃄縱較數法開之以較七丈折半作三丈五尺自乘得一十二丈二十五尺與兩句股積相加得六百丈二十五尺為啇實初啇二減積四百餘二百丈二十五尺為次啇實次倍初啇二作四為𤎉法用四籌加平方籌上為𤎉隅共法次啇四減積一百七十六丈餘二十四丈二十五尺為三啇實次倍初啇二三啇四共作四八為𤎉法用四八兩籌加平方籌上為𤎉隅共法三啇五減積恰盡開得二十四丈五尺加半較三丈五尺得二十八丈為股減半較三丈五尺得二十一丈為勾假如句股和四十九丈句股積二百九十四丈求句股較句股和自乘得和實二千四百一丈減八句股積二千三百五十二丈餘四十九丈為實
