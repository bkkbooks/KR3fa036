body:
  text: 垂線心庚得數一十八步合計三邊而半之一百三十步為半周以半周乘中垂線得積二千三百四十步又術如前取中垂心庚為濶半周為長如乙癸及丁壬别作一長方形如乙壬丁癸即與甲乙丙鈍角形等積分角術假如有甲角欲平分之則以甲角為心作虛半規截得辛壬二點各用為心作弧線相遇於癸作癸甲線即分此角為兩平分三角求心術如上分角術于甲角平分之乙角又平分之兩平分之線必相遇成一點此一點即三角形之心三角容員以弦與句股求容員徑凡句股相併為和以和與弦併為弦和和以和與弦相減為弦和較弦和較即容員徑也又術以周與積求容員徑句股相乘得數為實併句股弦數為法除之得數倍之為容員徑是以弦和和除句股倍積得容員半徑也又或以句股弦數之半周除句股積得容員半徑又或以弦和和除
