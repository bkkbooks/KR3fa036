body:
  text: 二乙角二十三度二九餘弦九一七一七六丁庚六十六度三一正弦在次形三半徑九十度全數一甲角正弦半徑橫道夏至全數與角正弦四甲丙一十六度二一五七餘弦九五九四八七七丁丙七十三度三八三正弦右以三角求邊也若三邊求角反此用之若先有乙丙邊乙甲邊而求甲丙邊則為乙甲餘弦即次形丁角正弦與乙丙餘弦即庚丙正弦若半徑甲角即次形庚角與甲丙餘弦即丁丙正弦一乙甲四十二度三一三五餘弦七三六九五二九丁角一百三三度三一三三正弦二乙丙四十五度餘弦七七一六八庚丙四十五度正弦在次形三半徑全數一庚角九十度正弦四甲丙一十六度二一五七餘弦九五九四八七七丁丙七十三度三八三正弦或先有乙丙邊甲丙邊而求乙甲邊則為甲丙餘弦即丁丙正弦與乙丙餘弦即庚丙正弦若半徑甲角即庚角與乙甲餘弦即丁角正弦或先有乙甲邊甲丙邊而求乙丙邊則為半徑甲角即庚角與甲丙餘弦即丁丙正弦若乙甲餘弦即丁角正弦與乙丙餘弦即庚丙正弦右皆以兩弧求一弧而不用角也以上為乙甲丙形用次形之法本形三邊皆小一正角偕兩鋭角次形亦然所以必用次形者為三角求邊之用也
