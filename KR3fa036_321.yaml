body:
  text: 之比例皆同於撱圓之小半徑與平圓半徑之比例馬太隂五星並用撱圓之法今且即太陽天推之撱圓形如圖甲為地心乙丙丁戊為黃道己為不同心天之心庚辛壬癸為不同心天乙庚為本輪半徑與甲己兩心差等丑乙為均輪之卑於本天己丁為均輪之髙於本天止及甲己之半與甲寅等因以寅為不同心天之心與己丑作十字線又取寅丑之度從甲截橫線於午使午甲午己皆與寅丑半徑等仍以甲己兩㸃各為心午為界各用一針釘之圍以絲線未以鉛筆代午針引而旋轉即成丑午己未撱圓形寅丑寅己為撱圓大半徑寅午寅未為撱圓小半徑又將撱圓面積以甲為心均分積度為太陽平行而在最卑則角度𡩖為行盈在最髙則角度狹為行縮角度與積度之較即平行實行之差也求撱圓度正弦
