body:
  text: 徑八位弧線亦只用八位自乘得一三八六二二六為屢乘數又以二三四五六七之六數相挨兩兩相乘為除數二三相乘得六為第一除數四五相乘得二十為第二除數六七相乘得四十二為第三除數即用設弧共分為第一得數復為實以屢乘數乘之第一除數六除之得八六一一為第二得數又為實以屢乘數乘之第二除數二十除之得五九五九為第三得數又為實以屢乘數乘之第三除數四十二除之得一九為第四得數乃以第一得數與第三得數相併又以第二得數與第四得數相併末以後併數減先併數餘三六三七五二五四截去末一位即所求之正弦也
