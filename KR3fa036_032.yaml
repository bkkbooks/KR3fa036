body:
  text: 一曰平𡻕實舊立𡻕實三百六十五日二四八一八七五用為平率以均度加减之為諸定氣厥後奈端酌定為三百六十五日二四二三三四四二零一四一五零八三三得三百六十五日五時三刻三分五十七秒四十一𢕄三十八纎二忽二十六芒五十六塵每日平行十分度之九分八五六四六九六九三五一二八二二五得五十九分零八秒一十九𢕄四十四纎四十三忽二十二芒零三塵一曰髙卑行度日之行其本天本無盈縮特其髙卑升降成撱圓形而撱圓之心又與地心不合髙則離地遠而視行遲卑則離地近而視行疾最髙為盈末縮初之端最卑為縮末盈初之始今法定最卑行每年一分二秒五十九𢕄五十一纎零八忽每日平行一十𢕄二十纎五十七忽求冬至者以平𡻕實為之根再以最卑之遠近求其均數變時以加减之則千𡻕之日至固可坐而致矣一曰兩心差舊測三十五萬八千四百一十六載進賢减為三十三萬八千日天均輪之半徑古大今小莫測端倪正如黃赤距度之古濶今狹同為司天者所不能預定也求冬至者又宜以此消息之自來造厯諸家必推厯元未免牽合故乆而多差
