body:
  text: 黃道節氣旁視圖立置渾儀而從二分交角視之則赤道黃道俱變直線黃道運旋之跡亦俱變直線法于夏至作斜線過二分至冬至即成黃道以黃道半徑為九十度之底定尺每十五度正弦取底移至黃道半徑上于二分上下各識之即各節氣日𨇠黃道上度也或用節氣線尺即以黃道半徑為二十三度二十九分之底定尺向黃道半徑上識之亦同乃自黃道上各㸃作直線並與赤道平行即得各節氣疏密線是為黃道運旋之跡也
  hash: sha256:bdf5a52ff6c4828ae016da7d625318b763640e467cb3170a26c3bd77d38d39ea
