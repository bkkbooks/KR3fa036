body:
  text: 行距日度為一類而金水自有行度又為一類以緯行言之土木火皆有本天與黃道相交以生緯度次輪斜交本天其面又與黃道平行能加減其緯度為一類而金水之本天即為黃道本無緯度因次輪斜交黃道以生緯度又為一類以伏見言之土木火皆有合有沖為一類而金水則有合有退合而無沖是又為一類也五星沖伏俱在次輪而有留退者其本輪小而次輪甚大五星之平行甚遲每日不足一度而次均之大者至五十餘度當其在輪之上弧則見其順在輪之下弧則見其退在輪之左右則見其留也恆星行即古歲差古人謂黃道西移今謂恆星東行蓋使黃道西移則恆星之黃道經緯度宜每歲不同而赤道經緯度宜終古不變今測恆星之黃道經度每歲東行而緯度不變至於赤道經度則逐歲不同而緯度尤甚故知為恆星之東行而非黃道之西移也道並行而不相悖古謂日有中道月有九行中道者黃道也與赤道斜交而出入於其內外者也赤道者天之腰黃道者日天之腰也赤道正而黃道斜以黃道言之日所行者
