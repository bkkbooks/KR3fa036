body:
  text: 各依大圈以剖渾圓即各成平面圓是亦渾圓內相應之面也二平圓相割成瓣三平圓相割成錐依八線横剖之即成塹堵是渾圓體內相應之分體也雖不可以目視而可以算得也弧三角八線弧三角非圖不明然圓弧線於平面必用視法變渾為平如圖甲丙乙丁半渾圓以甲戊乙弧界之則其弧面分兩角為一銳一鈍以視法移此弧度于相應之平面亦一銳一鈍即分圓徑為大小二矢而戊丙正矢為戊甲丙銳角之度戊乙丙亦同戊丁大矢為戊甲丁鈍角之度戊乙丁亦同故得矢即得角又如前圖丙戊弧為甲銳角之度與丙庚等則丙戊之在平面者變為直線即為甲銳角之矢而戊已為角之餘弦戊庚為角之正弦丙辛為角之切綫已辛為角之割線皆與平面丙庚弧之八綫等丁巳戊過弧為甲鈍角之度與丁乙庚過弧等則丁戊在平面者變為鈍角之大矢而戊巳餘弦戊庚正弦丙辛切綫己辛割綫並與銳角同平面鈍角之八線與
