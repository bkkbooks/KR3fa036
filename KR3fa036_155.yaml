body:
  text: 於正方角凡鈍角必大於正方角正方角止一鋭角鈍角則有多種角無丈尺可言必量之以對角之弧法以角之端為圓心用規作圓圓周分三百六十度乃視本角所對之弧于全圓三百六十度中得幾何度分其弧分所對正得九十度者為正方角若所對弧分不滿九十度者為鋭角自八十九度以至一度並鋭角也所對弧分在九十度以上者為鈍角自九十一度至百七十九度並鈍角也三角八線角之度生於割圓弧矢者古人割圓之法也所割圓分如弓之曲謂之弧背以弧背半之則為半弧背割圓直線如弓之弦謂之通弦通弦半之謂之半弧弦今曰正弦正弦以十字截半徑成矢謂之正矢全徑
