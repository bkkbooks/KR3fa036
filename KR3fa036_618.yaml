body:
  text: 緯線從緯線上作距等圈分經度作經線位置既定乃依地平上下作緯線得地平緯度亦從緯線上作距等圈分經度作經線得地平經度兹用角宿第一星推之以見例其星現距赤道南十度九分四十秒四十八𢕄經度九宫一十八度五十五分九秒三十六𢕄依法推之得地平緯度為地平上十五度二十分地平經度為辰宫二十一度一十五分也列宿地平經緯表列宿地平經緯與黃赤經緯不同不獨度分有多寡之殊而星宿且有先後之異兹用道光丁亥年度推定列宿各第一星鹽城地平之經緯列表斯為本地之量天真尺其序為角亢房氐心箕斗牛女虛危室壁奎婁胃昴畢井觜參鬼柳星張翌軫尾今堪與家
