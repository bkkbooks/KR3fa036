body:
  text: 分月體十分日食最多不過十分暗虛二十六分五十二秒大於月者一十六分五十二秒是以月食最多則有一十八分二十六秒日月星辰繫焉太陽為日太隂為月五緯為星二十八宿為辰日月星辰各有一重天其行度各有本輪均輪而皆宗動天挈之以行故曰繫所以謂二十八宿為辰者左傳云日月所會是謂辰而日月所會必以宿度為紀宿亦名舍日所舍也言辰者二十八宿分十二辰也亦曰十二次日所次也日之次舍空虛而無所紀故以經星紀之因謂之辰因謂之宿邵子云無星處為辰無星之處即是天也何所為繫按太陽之行有盈縮由於本天有髙卑春分至秋分行最髙半周故行縮而歷日多秋分至春分行最卑半周故行盈而歷日少其說一為不同心天一為本輪而不同心天之兩心差即本輪之半徑刻白爾以來屢加精測盈縮之最大差止有一度五十六分一十二秒乃設本天為撱圓均分撱圓面積為逐日平行之度而角度不同則撱圓差之所生而與平圓之所以别也太隂行度有九種曰平行曰自行曰均輪行曰次輪行曰次均
