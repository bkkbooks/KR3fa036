body:
  text: 作平儀及日晷必分節氣各線其法用正弦度識於黃道之上或直用距度識於子午規之上並得節氣各線今作節氣線尺尤為簡便作節氣線法查距度表從樞心逐節識之或用均輪疏密之線量取亦得用法以二十三度二十九分為本線之底定尺逐節向子午規識之即得節氣各線其尺分六分得節氣分十八分得七十二候分九十分得周歲逐日度分各隨儀器之大小用之黃道節氣斜視圖
