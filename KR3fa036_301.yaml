body:
  text: 矢相較得三率求得次形癸角之大矢為四率即以癸角一百八度三十分為酉乙邊求乙丙邊亦與前條同法因丙乙兩內角之正弦及差度並與兩外角同而酉角又同甲角也垂弧㨗法次形雙法設亥甲丁形有甲亥邊亥丁邊亥角求甲丁邊本法作垂弧分兩形先求甲己邊次求亥己邊分丁己邊再用丁己甲己二邊求甲丁邊今㨗法不求甲己邊但求亥己邊分丁己邊即用兩分形之兩次形以徑得甲丁如圖引甲亥邊至丙引甲丁邊至庚引甲己垂弧至乙皆滿象限又引分形邊亥已至戊引丁己至辛亦滿象限末作辛庚乙丙戊半周與亥己遇于戊與丁己遇于辛成亥丙戊次形與甲巳亥分形相當丁庚辛次形與甲已丁分形相當而此兩次形又自相當辛丁己亥戊如黃道半周辛庚乙丙戊如赤道半周甲如北極辛如春分戊如秋分己乙如黃赤大距即夏至之緯乃二分同用之角度即戊角辛角之度亥丙及丁庚皆赤緯甲亥及甲丁皆距北極之度即赤緯之餘
