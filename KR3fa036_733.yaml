body:
  text: 北極髙三十三度求日出入時刻設冬至求日出入時刻法以北極髙三十三度之正切六四九四七六與黃赤大距二十三度二十九分之正切四三四四六六六相乘得二八二一四五九一一九八六一六退七位得二八二一四五九檢表得一十六度二十三分一十八秒變時得四刻五分三十三秒一十二𢕄加𫑗正得日出辰初初刻五分三十三秒一十二𢕄减酉正得日入申正三刻九分二十六秒四十八𢕄又設清明求日出入時刻法以北極出地正切與清明距緯五度五十五分一十一秒之正切一三六八八相乘退七位得正弦六七三三五七檢表得三度五十一分四十秒化時得一刻二十二秒四十𢕄减𫑗正得日出𫑗初二刻十四分三十七秒二十𢕄加酉正得日入酉正一刻二十二秒四十𢕄求日出入地平方位
