body:
  text: 最髙卑測實度圖日月星在最髙時測得髙度加兩心差得實髙度在最卑時測得髙度减兩心差為實髙度最髙前後俱用加法最卑前後俱用减法如圖甲為中距時髙度視髙即實髙也亦即為最髙卑之實髙度丙為最髙之視髙度乙為最卑之視髙度而其實髙度則在甲也假如太陽在最卑時測得視髙三十四度减兩心差五十八分六秒餘三十三度一分五十四秒為實髙度又如太隂在最髙時測得視髙四十度加兩心差七度三十九分三十三秒得四十七度三十九分三十三秒為實髙度也測影之法既先用實髙數定其長短又轉用兩心差最髙减之最卑加之變作視髙始得表影長短之真數也假如太陽實髙三十三度一分五十四秒預推其影直長一丈五尺三寸八分倒長六尺五寸今加兩心差數得直影一丈四尺八寸五分倒影六尺七寸四分為視髙度之影數也髙卑前後兩心差又各不同各宜求其差數加减用之
