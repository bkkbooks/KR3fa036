body:
  text: 一八三五二以餘切除之得正切六六一八八五六三十三度三十分餘弦正割餘切正切互求三十三度三十分正切六六一八八五六餘切一五一八三五二兩線相乘以餘弦八三三八八五八除之得一一九九二四九為正割以正割一一九九二四九除之得八三三八八五八為餘弦又以正割餘弦兩線相乘以餘切除之得正切以正切除之亦得餘切也三十三度三十分弦割互求三十三度三十分餘弦八三三八八五八正割一一九九二四九相乘得一正弦五五一九三七餘割一八一一八一相乘亦得一
