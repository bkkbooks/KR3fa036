body:
  text: 二十一分三十秒一十四𢕄實去北辰五度三十八分二十九秒四十六𢕄是則今日之實測也然則朱注之誤奈何曰朱注固不誤也北極星非北極乃紐星也所謂近極小星强名極也所謂北極者即北辰也今法推測北極出地之髙下者亦以北極言之俱指北辰非謂紐星也北極天樞正指北極之在宗動天者其言原無可議特以後人誤解直以北極星為北極耳至於邢氏疏中以北辰為北斗北斗運旋環繞亦同在衆星之列耳又安能居所而不動哉此又異說之不足辨者也衆星漢書天文志中外官凡百一十八名積數七百八十三晋書天文志張衡云中外之官常明者百有二十四可名者三百二十為星二千五百𢕄星之數蓋萬有一千五百二十後武帝時太史令陳卓總甘石巫咸三家所著星圖大凡二百八十三官二千四百六十四星以為定紀隋書天文志總有二百五十四官一千二百八十三星并二十八宿及輔官附坐一百八十二星總二百八十三官一千五百六十五星大西儒測算凡可見可狀之星一千二十二若𢕄小者
