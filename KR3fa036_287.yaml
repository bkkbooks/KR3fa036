body:
  text: 丙外角之弧午申與次形寅丑邊等是元形有三角即次形有三邊也又甲乙邊之度易為癸外角甲丙邊易為寅角乙丙邊易為丑角是元形有三邊即次形有三角也既以三角為次形之三邊則三角可以求邊再用三邊求角法求得次形三角即反為元形之三邊又丙未酉形及丙未乙形丙酉甲形並可易為甲乙丙則又皆以癸丑寅為又次形二未丙酉形三角俱鈍易為丑癸寅形一鈍二鋭引酉未弧作圓又引兩邊至圜周乙甲乃以未為心作丁辛癸寅辰弧以酉為心作戊丑癸壬已弧以丙為心作庚子丑寅午申弧亦引丙甲出圓外會于申三弧相交成丑癸寅形與元形相當而角𥁞易為弧弧𥁞易為角未外角之弧丁辛成次形癸寅弧酉外角之弧壬己成次形丑癸弧丙外角之弧申午成次形寅丑弧是三角𥁞易為邊也酉未邊成癸外角未丙邊减半周其餘甲丙成寅角酉丙邊减半周其餘乙丙成丑角是三
