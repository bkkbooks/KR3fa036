body:
  text: 平儀上直線皆緯度也而線有大小者則經度也是故直線為緯度而即能載經度其距等圈線所載之經度皆與赤道大圈線所載之經度等即近極最小之緯圈線亦然第赤道大圈線之徑與平圓全徑等故其所載之經度一一與外周相應若距等圈線之徑濶狹不等不能與大圈為比例即不能與外周相應然則將何法以分之曰以距等之半徑為心即以距等之半徑為度而運規於大圓之外復作距等半圓於半圓上勻分半周天度即距等所載之經度一
