body:
  text: 一識於午線之左右然後自北極向赤道上時刻點一一作斜直線得本地之時刻次用節氣線之赤道線合於天頂距赤道之割線察赤道南北緯線臨於午正線上者識之得午正節氣點北極點永不移動但移赤道線合於天頂距赤道午正左右各時刻之割線察赤道南北緯線臨於各時刻線上者又遞識之得各時刻節氣點循其節氣點而一一聨之成曲線得本地之節氣用法立表于地心上指天頂北則斜對北極南則斜對赤道察表端之影所到之節氣線定本地之南北方向察表端之影所到之時刻線定本地之時刻兹用鹽城度數為之以見其例其餘各處悉倣此法以得各處時刻也旁面日晷圖旁面日晷作兩立面東面向東西面向西作法于近南作直線上指天頂下指地心近上作橫線與地平相應兩線相交之處為表位即二分𫑗正之點於兩線問作象限弧自下起數至本地北極出地度止自此向𫑗正點作斜直線以分弧度此線即為赤道任用橫表之長為切線四十五度之底定尺遞取十五度切線向赤道線纍加之作識定時細分每刻則遞
  hash: sha256:c6ffa89e52945b448fc57cc9ce993e1c71e2fe52e84a1dbd22b4f10ca25be199
