body:
  text: 赤道之角經緯相交必過其極則其交必成十字而常為正角也蓋渾員上有垜壘諸線從旁側睨之庶幾可見然實多借象而不能按度肖形其在天之實度非算不知算法一率半徑二率大距正弦三率黃經正弦四率距緯正弦一率大距正弦二率半徑三率距緯正弦四率黃經正弦一率半徑二率大距餘弦三率黃經切線四率赤經切線一率半徑二率大距割線三率赤經切線四率黃經切線知此則黃赤經緯可以互求矣平圓正視圖
