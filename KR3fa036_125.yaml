body:
  text: 和弦較和除之亦得弦較較句股和方內减弦積餘為四句股積即弦和較乘弦和和之積以弦和較除之得弦和和弦和和除之亦得弦和較又弦和和積减四因積餘數折半弦和和除之得弦弦和較積减四因積餘數折半弦和較除之得弦句股和股弦和相乘倍之開方得弦和和句股較股弦較相乘倍之開方得弦和較又句股和弦較較相加自乘句股和自乘兩數相减折半求長濶和用帶縱和數法開之得句股弦又句弦和股弦和相乘倍之開方以和减之得句股弦又以句股併弦和和弦較較弦較和求
