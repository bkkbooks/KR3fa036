body:
  text: 地平橫偃經度以地平子午之㸃為心天頂為上地底為下天頂規即為𫑗酉規中直線為子午規中東之間為丑寅辰已規中西之間為未申戌亥規中橫線為地平規此地平經度之本象也若以加於赤道之上則以橫線上之曲線為地平規而日月星之升降俱以此為出入之界焉赤道上加地平緯度圖北極至赤道分九十緯度天頂至地平亦分九十緯度法用天頂南北之緯度從天頂南北各數九十度折半為樞運之得地平初規為初出地平之度南北
