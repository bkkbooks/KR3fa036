body:
  text: 甲距北極亥甲距天頂也此弧三角之理所以隨處可施也渾圓面積渾圓求面積法先用渾圓徑求渾圓周圓徑圓周相乘得數為渾圓面積蓋得平圓面積之四倍假如渾天球全徑定為二求得圓周六二八三一八五三以二乘之得一二五六六三七六再乘圓周八位下之小餘七一七九五八六又得其零數一四三五九一七二是球皮之穹積共為一二五六六三七六一四三五九一七較之平圓面積三一四一五九二六其數為四倍也凡求平圓面積者或以周徑相乘得數而四歸之為平圓面積今求渾圓則以周徑相乘得數即為渾圓面積又求平圓面積者或以半周半徑相乘得數為面積此則得數之後增加四倍乃為渾圓面積是四歸渾面之積而得平面之積四因平面之積而得渾面之積也又試將八線表內各正弦層層積算相和折半得五七二九四三三用九十歸之得六三六六二三六是為和半徑以乘每宫緯弧九二三五九得三三三三三
  hash: sha256:62d3b57a51ca95f96c059adc097b10ba9b489ab74850cd1ed72aa5a9d168724c
