body:
  text: 二己丙甲形甲正角餘二角丙鋭己鋭丙甲邊小餘二邊並大易為丁丙庚次形法曰截己甲於壬截已丙於庚使己壬己庚皆滿九十度作壬庚丁象限弧又引丙甲邊至丁亦滿象限而成丁丙庚次形此形有丁丙邊為丙甲之餘有庚丙邊為己丙之餘凡過弧內去象限其餘度正弦即遇弧之餘弦故已丙內减已庚而庚丙為其餘弧有庚丁邊為己角之餘乃角易為邊也庚與壬皆象限即庚壬為己角之度而丁庚為其餘又有丙鋭角為元形丙鈍角之外角有庚正角與元形甲角等壬庚既為己角之弧則壬與庚必皆正角有丁角為己甲邊之餘乃邊易為角也假如有甲正角已鋭角丙鈍角而求丙甲邊法為丙鈍角之正弦即次形丙鋭角正弦蓋外角內角正弦同用也與己角之餘弦即次形丁庚邊之正弦若半徑即次形庚正角之正弦與丙甲之餘弦即次形丁丙邊之正弦既得丙甲可求己丙邊法為半徑與丙角餘弦若甲丙餘切次形為丁丙正切與己丙餘切次形為庚丙正切得數以减半周為已丙下同凡以八線取弧角度者若係大邊鈍角皆以得數與半周相减命度
