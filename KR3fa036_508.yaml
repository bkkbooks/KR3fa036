body:
  text: 其髙度又於將近正午處測其漸益髙度連測而連識之測至髙處漸减則知己過正午而其間極髙之處為正午也於極髙之處從線即南北真線也測日𨇠求東西偏度圖測日𨇠之度以定東西偏度先檢七政時憲書視第二日子正日𨇠何宫何度何分察其對冲之某宫度分識之次候某宫度分之恆星臨正午時察定時儀值何時刻如已過子正則是日𨇠之度不及時憲書之度而其地為偏東如未及子正則是日𨇠之度多於時憲書之度而其地為偏西以時刻變日𨇠度時差四秒則日𨇠差一分時差四𢕄則日𨇠差一秒以日𨇠度變東西偏度日𨇠差九秒五十一𢕄則東西
