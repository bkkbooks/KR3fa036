body:
  text: 度若欲分距等疏密之線則以𫑗酉規線半徑為本線九十度之底定尺而取其正弦于𫑗酉規線作識亦即成全儀緯度又三角形以邊求角以角求邊俱可用正弦求之矢線尺古人以弧矢測渾圓法最簡易凡求對角之弧並以角之矢為比例凡三邊求角並以兩矢較為比例平儀緯度必用矢線分之作矢線法查八線表得餘弦數以餘弦數减半徑數得正矢數從樞心至各度分之或用量法作弧矢形以割圓通弦截取矢線用法以𫑗酉規線半徑為本線九十度之底定尺而於逐度距極之數取其矢線于𫑗酉規線作識即成全儀緯度緯度與外周之度一一相應其度皆實度也故渾圓之度並可以弧矢之法測之距等圈分度圖
