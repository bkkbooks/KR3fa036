body:
  text: 南行晷每度之限亦與南緯異南行北緯最遠者距二十度四十分行十五度則距二十度半次距十八度太次距十六度弱次距十一度半次距六度太次距二度少為北緯最近又行十五度過赤道南則其南緯最近者距三度太次距八度太次距十三度少次距十北行晷七度次距十九度少次為南緯最遠距二十度四十分北行南緯由遠而近北緯由近而遠其多寡之序亦如之而南行北行之南緯分為兩種南行北行之北緯亦分兩種故經度雖對冲而影之長短則異與太陽之節氣相對者不同此所以分為二晷也
