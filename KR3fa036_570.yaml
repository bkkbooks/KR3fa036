body:
  text: 為時刻距表最遠者為午正午正前後以次漸短用法按節氣置表取太陽影正對直線察直線上曲線之界即得現在時刻或作柱晷用圓柱柱心置横表以柱外之長為表度随柱旋轉圓柱上既分十三直線又於每一直線中分十五度為周天直線線上再畫時刻曲線柱表每日遷移表影亦每日長短不同此法可得周𡻕日日不同之影惟分前分後相同實以半周得全周耳太陽勾晷表𫑗初𫑗正辰初辰正已初已正午初午正冬至一六九三四五五七六一七六六一四三六五三四三一九二一八四六七三冬至小寒一七九三五八五一八六三七六八二六二八一五一八三五八七三五八一大雪
