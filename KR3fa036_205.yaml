body:
  text: 一百八十三三九其餘為三千八百一十九六六一是股十中减去句股較之積也句弦和為全線股倍句為大分句弦較為小分句弦和與倍句若倍句與句弦較首尾相乘與中間相乘皆一百也又以倍句為全線句弦較為大分分餘線三八一九六六一為小分其積亦皆三八一九六六一也半徑用全數如十則句弦較即十邊之通弦又以全數為股十邊之通弦為句求得弦即五邊之通弦也甲乙線求作理分中末線法以甲乙全線折半於庚乃作垂線於甲端為丙甲如半線甲庚之度為句全線為股次作丙乙線為弦次引丙甲線至丁令丙丁如丙乙度末為甲為心丁為界作丁戊巳圈分則甲己為理分中末之大分已乙為小分其比例為甲乙與甲巳若甲己與己乙也遞加法以乙為心甲為界運規截丁己圈分於戊自戊作線向甲成甲戊線與甲丁等乃自戊作戊乙線與乙甲等成甲戊乙三角形此形甲戊兩角悉倍于乙角即右圖展大乃平分戊角作戊辛線此線與甲戊等亦與乙辛等成辛戊甲相似三角形則甲乙與辛乙即戊辛
