body:
  text: 月徑與日徑相等而月在日下故日食有見有不見暗虛掩月而大於月故月食各處同見而所居有東西則見食有先後偏東則見食遲偏西則見食早偏東一度則遲時之四分偏西一度則早時之四分驗月食之遲早而東西之偏度可知矣假如京師月食亥初二刻十三分初虧亥正三刻食既夜子初二刻八分食甚子正二刻一分生光丑初二刻三分復圓在江南省城測之則亥初三刻六分十二秒初虧亥正三刻八分十二秒食既子正二刻九分十二秒生光丑初二刻十一分十二秒復圓遲於京師者八分十二秒則知江南偏東二度十八分在鹽城測之則亥初三刻十二分四十秒初虧亥正三刻十四分四十秒食既子正三刻零四十秒生光丑初三刻二分四十秒復圓遲於京師者十四分四十秒則知鹽城偏東三度四十分其各處偏西之度亦依此法推之用緯度求經度里差圖凡人向南行二百里則北極低一度向北行二百里則北極髙一度是南北緯度固以二百里為差率矣若夫東西經度則有不二百里而差一度者蓋地體本圓惟正當赤道之下其度最大漸遠漸小近北極
