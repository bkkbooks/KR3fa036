body:
  text: 形同者徑用得數命之不必復減半周正弧三角形弧角相易用次形一乙甲丙形易為丁丙庚次形解曰丁如北極戊己壬甲如赤道圈己庚乙如黃道半周辛丁壬如極至交圈壬如夏至辛如冬至戊丁甲如所設過極經圈乙如春分己如秋分並以庚壬大距為其度丙如所設某星黃道度丙乙如黃道距春分度其餘丙庚即黃道距夏至為次形之一邊丙甲如黃赤距度其餘丙丁即丙在黃道距北極度為次形又一邊庚丁如夏至黃道距北極而為乙角餘度是角易為邊也壬庚為乙角度其餘庚丁是為次形之三邊又丙交角如黃道上交角庚正角如黃道夏至甲乙如赤道同升度其餘壬甲如赤道距夏至即丁角之弧是邊易為角也則次形又有三角假如有丙交角乙春分角而求諸數是三角求邊也乙丙兩角並甲正角而三法為丙角之正弦與乙角之餘弦若半徑與丙甲之餘弦得丙甲邊可求餘邊一丙角七十二度五五二一正弦九五五九八七丙角七十二度五五二一正弦
