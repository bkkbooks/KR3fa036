body:
  text: 為金星天又外一層為日天金水二天與日天相近日天去地心二萬九千一百四十四萬五三八餘里又外一層為火星天較日髙一倍半又外一層為木星天較日髙五倍又外一層為土星天較日髙十倍至於恆星天較日髙九千倍圖隘未能繪入宗動天太虛無蹤其髙非人所能測也故亦缺之土木火金四天交角圖土星本天與黃道相交之角為二度三十一分木星本天與黃道相交之角為一度一十九分四十秒火
