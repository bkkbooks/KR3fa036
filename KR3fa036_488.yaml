  text: 度相减得赤道距天頂之度亦即北極出地之度假如𥂁城立冬後十四日測得日髙三十七度加南緯二十度得赤道髙五十七度以减九十度得三十三度為赤道距天頂之度亦即北極出地之度也或先以日髙减九十度得日距天頂然後加减緯度在北用加在南用减得北極髙度亦同節氣距緯表節節距緯定數驚蟄寒露南緯清明白露北緯各距五度五十五分雨水霜降南緯穀雨處暑北緯各距十一度三十分立春立冬南緯立夏立秋北緯各距
