body:
  text: 乘仍得一為第一乘數三自乘得九為第二乘數以至二十三自乘得五百二十九為第十二乘數又將二三四五六七八九等數以挨次兩位相乘又以四乘之為屢次除數如二三相乘得六以四乘之得二十四為第一除數四五相乘得二十以四乘之得八十為第二除數以至二十四與二十五相乘得六百以四乘之得二千四百為第十二除數設徑二十億求周法以徑二十億三因之得六十億即圓內六邊形為第一數為實以第一乘數乘之一乘其數不變第一除數二十四除之得二五為第二數又為實以第二乘數九乘之第二除數八十除之得二八一二五為第三數纍次乘除至所得二六數祗一位為止乃併二五二八一二五之得六二八三一八四一八五二六七七一二七六五二九九即所求徑
  hash: sha256:0ab20eee2f090b553013d3d77bd7e59e3331f3289272beb6955c4c4eb02f280d
