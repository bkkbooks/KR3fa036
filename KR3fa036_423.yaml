body:
  text: 最大視半徑一十六分四十八秒相併得三十三分一十秒三十𢕄以此數當距緯用最小黃白交角四度五十九分三十五秒求得距交白道經度六度二十二分為黃道南實朔可食之限又以最大太陽太隂兩半徑相併之數與最大髙下差一度一分二十七秒相加得一度三十四分三十七秒三十𢕄以此數當距緯用最小黃白交角求得距交白道經度一十八度二十六分為黃道北實朔可食之限各加實朔距平朔之行度二度五十二分黃道南得九度一十四分黃道北得二十一度一十八分為平朔可食之限置本年首朔太隂交周以太隂交周朔䇿逓加之得逐月朔太隂交周自十一宫二十度四十六分至初宫二十一度一十八分自五宫八度四十二分至六宫九度一十四分皆為入交再以實朔實時用推日𨇠月離法各求其黃道實行乃視本時月距正交自十一宫二十三度三十八分至初宫一十八度二十六分自五宫一十一度三十四分至六宫六度二十二分皆入食限為有食以太隂實半徑倍之得
