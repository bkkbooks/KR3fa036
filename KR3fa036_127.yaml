body:
  text: 之並得諸數假如句二十一丈股二十八丈求弦句自乘得句實四百四十一丈股自乘得股實七百八十四丈併之得弦實一千二百二十五丈為啇實開方初啇三减積九百餘三百二十五丈為次啇實倍初啇三作六為𤎉法用六籌加平方籌上為𤎉隅共法次啇五减積恰𥁞開得方根三十五丈為弦假如句二十一丈弦三十五丈求股句自乘得句實四百四十一丈弦自乘得弦實一千二百二十五丈弦實內减句實餘為股實七百八十四丈為啇實開方初啇二减積四百餘三百八十四丈為次啇實倍初啇二作四為𤎉法用四籌加平方籌上為𤎉隅共法次啇八减積恰盡開得方根二十八丈為股假如股二十八丈弦三十五丈求句股自乘得股實七百八十四丈弦自乘得弦實一千二百二十五丈弦實內减股實餘為句實四百四十一丈為啇實開方初啇二减積四百餘四十一丈為次啇實倍初
