body:
  text: 取三度四十五分即二分日影所到也次于時刻㸃各作橫斜線與赤道十字相交乃于元定尺上取二十三度半之切線為度于左右截之為界又取每十五度之黃赤距緯切線于界內作識得各節氣𫑗正日影次以表長為割線初㸃之底定尺而取十五度之割線為二分辰初之影弦就以辰初影弦割線為切線四十五度之底而取二十三度半之切線又遞取每十五度之黃赤距緯切線為各節氣界自此而辰正以至午初並同乃於節氣界作線聨之即成向東日晷向西作法並同用法立橫表于表位表端所
