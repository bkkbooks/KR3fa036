body:
  text: 六年而一大周與賈疏數懸遠又按太𡻕十二年一周木星行天亦十二年一周有似太𡻕故名𡻕星是𡻕星因太𡻕而得名而太𡻕實無與於𡻕星也此節掌十有二𡻕尃属太𡻕保章氏以十二𡻕之相尃言𡻕星注疏未免牽混盖在天有𡻕星在地有太𡻕𡻕星右行太𡻕左行左行者自東而南而西而北右行者自北而西而南而東天道左旋而經星從之日體右轉而𡻕星從之二十有八星之位二十八星東方角亢氐房心尾箕北方斗牛女虛危室壁西方奎婁胃昴畢觜参南方井鬼柳星張翼軫今法角宿二星黃道赤道俱在辰宫亢宿四星黃道在𫑗宫赤道在𫑗辰宫氐宿四星黃道赤道俱在𫑗宫房宿四星黃道赤宫俱在𫑗宫心宿三星黃道赤道俱在寅宫尾宿九星黃道赤道俱在寅宫箕宿四星黃道赤道俱在丑寅宫斗宿六星黃道赤道俱在丑寅宫牛宿六星黃道赤道俱在子丑宫女宿四星黃道赤道俱在子宫虛宿二星黃道赤道俱在子宫危宿三星黃道在亥子宫赤道在子宫室宿二星黃道赤道俱在亥宫壁宿二星黃道在戌宫赤道在戌
