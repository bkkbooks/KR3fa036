body:
  text: 餘度矢四三四一七三三為四率檢表得餘度五十五度三十二分以減半周得一百二十四度二十八分為乙丙邊此所用次形之三邊三角皆本形減半周之餘度故所得四率為角之大小矢者皆必減半周而後可以命度若他形則不𥁞然必須詳審如甲未丙形甲角六十度丙角九十五度未角一百一十度易丑寅癸次形則其角易為邊惟未角弧壬戊一百一十度其半周餘度己壬七十度易次形丑癸邊為用餘度當減半周其邊易為角惟甲丙邊一百一十六度三十三分其餘度酉丙六十三度二十七分與辛子等成次形寅角亦用餘度當減半周其他各邊各角皆用本度非概用餘度算次形也又如乙丙酉形乙角七丙角九五酉角一二用癸寅丑次形求丙酉邊以丙酉兩角正弦相乘去末七位得數為一率半徑為二率以酉外角丙角相差三十五度矢與乙角矢相較得數為三率求得正矢為四率得寅角六十三度二十七分即丙酉邊求酉乙邊以乙角酉角正弦相乘退七位為一率半徑為二率酉外角乙角相差十度之矢與丙角九十五度之
