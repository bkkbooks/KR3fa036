body:
  text: 邊𥁞易為角也三角减半周得次形三邊算得次形三角减半周得原設三邊若所設為乙未丙形則未角易為次形癸寅邊乙外角為丑癸邊丙角為丑寅邊若所設為甲酉丙形則酉角易為丑癸邊甲外角為寅癸邊丙角為丑寅邊三甲乙丙形一鈍兩鋭易為丑癸寅形引甲乙邊全圓引餘二邊各滿半周又以甲為心作丁壬癸丑辰半周以乙為心作戊庚辛癸寅弧以丙為心作己午子丑寅𫑗弧三弧線相交成丑癸寅次形易甲角為次形丑癸邊乙外角為次形癸寅邊丙角為次形丑寅邊則角𥁞為邊又甲乙邊為癸角乙丙邊成寅角甲丙邊為丑外角則邊盡為角若所設為甲丙酉形三角俱鈍而有兩大邊則以甲外角為次形丑癸邊酉外角為癸寅邊丙外角為丑寅邊又以三邊為次形三外角若所設為丙未酉形乙未丙形並一鈍二鋭而有兩大邊皆依上法可徑易為丑癸寅次形斜弧正弧以弧角互易
