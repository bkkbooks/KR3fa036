body:
  text: 修德月食修刑遇其變加警惕焉是占驗固不可廢也第占驗家每多妄言或以推步不精求其説不得而附會之故日月之遇交則食以實會視會為斷有常度也而古有當食不食不當食而食之占日之食必於朔也而古用平朔於是有食在晦二之占月之行有遲疾日之行有盈縮皆有一定之數而古惟平度于是占家曰晦而月見西方謂之朓朔而月見東方謂之仄慝月道出入於黃道之南北五度有竒而占家曰房中央曰天街月由天街則天下和平由陽道則主喪由隂道則主水月與黃道同升有正有斜而占家曰月始生正西仰天下有兵又曰月初生而偃有兵兵罷無兵兵起月于黃道有南北一因也正升斜降二因也盈縮遲疾三因也人所居南北有里差四因也故月之初見有二日三日之殊極其變則有朔日四日之異而古有當見不見不當見而見之占食日者月也食月者暗虛也而占家曰未食之前數日日己有謫月巳無魄日大月小日髙月卑又各有最髙卑而影徑為之異故日有金環食而占者以金環食為陽德盛五星有遲疾逆留而古法惟知順行于是占者以逆行為災又曰未當居而居當去不
