body:
  text: 惟元授時直以至元辛巳截算為元一憑實測而無假借今則以雍正癸𫑗為元其天正平冬至距甲子日子正初刻之日分應三十二日一二二五四為丙申日丑正三刻十一分有竒距角宿值日子正初刻之日分應二十七日一二二五四為軫宿值日丑正三刻十一分有竒平冬至次日子正初刻最卑過冬至之度分應八度七分三十二秒二十二𢕄推法自雍正癸𫑗距所求之年共若干年減一年得積年以積年與歲實三百六十五日二四二三三四四二相乘得中積分置中積分加氣應三十二日一二二五四得通積分上考往古則置中積分減氣應得通積分置通積分其日滿紀法六十去之餘為天正冬至日分上考往古則以所餘轉與紀法六十相減餘為天正冬至日分自初日甲子起算得天正冬至干支以一千四百四十分通其小餘得天正冬至時分秒置中積分加宿應二十七日一二二五四為通積宿其日滿宿法二十八去之外加一日為值宿日分上考往古則置中積分減宿應為通積宿其日滿宿法二十八去之餘數轉與宿法二十八相減外加一日為值宿日分自初日角宿起算得值宿以積年與最
