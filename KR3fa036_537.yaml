body:
  text: 赤道之度以北極為心地平之度以天頂為心天頂猶北極也地平猶赤道也而以地平經緯加於赤道則如兩重羅網相加而疏密各異焉自天頂分地平周其南北兩半圓各得一百八十經度而從赤道剖分兩圖則天頂在北極之南遂使北半圓周兼得三百六十經度其南一百八十經度過赤道至南地平而止自天頂至地平分九十緯度而從赤道剖分兩圖則惟天頂北之緯度全在北半圓中而天頂南之緯度則亦自北至南而𥁞測量地平經緯者用之地平赤道經緯割圓圖
  hash: sha256:27ac41b348a91b7a6a7c7d072b29b2fdd898b15f39416960c50893eb71affe92
