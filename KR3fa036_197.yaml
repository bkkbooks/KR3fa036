body:
  text: 七五為積率有徑數周數求積者但以七八五三九八一六三三七五乘徑數得之展方求斜徑古率橫五斜七夫人而知其太疏也近時有用八線表中四十五度弦入七一六八為密率者可以為確數矣然末位究係趕進之數是其尾數亦未真也試用五千萬丈為句為股各自乘相併得五億為實開方初啇七減積餘一次啇空三啇七減積餘一五一四啇一減積餘九五九五啇空六啇六減積餘一一四七六四七啇七減積餘一一四八一五一一八啇八減積餘一六七八三九啇一減積餘二六三八一六十啇一減積餘一二二三九四六十一啇八減積餘九二五七五二十二啇六減積餘七七二二四十三啇五減積餘六五一三十四啇四減積餘八五六十五啇六共開至十五位得弦七千七十一萬六百七十八丈一寸八分六釐五毫四秒六忽斯為至確之數有平方積二十五者徑五展之得徑七七一六七八一一八六五四六即得倍積五十再展得徑一十即又得倍積一百再展得徑一四一四二一三五六二三七三九二又得倍積
