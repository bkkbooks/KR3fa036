body:
  text: 弦實求餘弦同上法八線互求用開方假如三十度之正弦五求餘弦以正弦自乘又以半徑自乘兩實相減餘七五為餘弦實開方得八六六二五一為餘弦又如二十三度二十九分之正割一九三三二求正切以正割自乘又以半徑自乘兩實相減餘一八八七六一六七九三二四為正切實開方得四三四四六六六為正切又如四十五度之餘割一四一四二一三六求餘切餘割半徑各自乘相減餘一六四二四九六為餘切實開方得一為餘切以上求各線法俱用兩實相減之餘為實開方得各線數又如三十度之餘弦八六六二五四求正弦亦用兩實相減之餘為實開方得正弦並同前法惟正切求正割餘切求餘割則不然假如二十三度二十九分之正切四三四四六六六求正割則以正切實與半徑實相加為正割實開方得正割又如四十五度之餘切一求餘割亦以餘切實與半徑實相加為餘割實開方得餘割二者俱用兩
