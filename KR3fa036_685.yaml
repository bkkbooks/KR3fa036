body:
  text: 實相加之數開方得各線數所以異者正弦與半徑求餘弦是以句弦求股正弦為句半徑為弦餘弦為股也正割與半徑求正切是以股弦求句正割為弦半徑為股正切為句也餘割與半徑求餘切是以弦句求股餘弦與半徑求正弦是以股弦求句實則句股皆為直線可以互名不必細分也惟弦為斜線另立一法切求割為以句股求弦則必以句股積數相加開方而得弦也
