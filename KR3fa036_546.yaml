body:
  text: 規出東地平之度為第一宫初界入西地平之度為第七宫初界上當天頂之度為第十宫初界下當地底之度為第四宫初界此四宫者為樞舍又為角舍著效盛於他宫又察黃道規所當各宫之度得各宫初界二八五十一為隨舍三九六十二為倒舍六八兩宫為最劣之舍每宫初界又名為頂十二宫度既定再用諸曜經緯點於黃道規之內外而諸曜入宫宛然一當時之天象而窮理之家借以觀變于未然恃有此也地平赤道旁視內面圖
