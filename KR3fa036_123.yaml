body:
  text: 减股實得句實開方得句股弦較乘股弦和為句實故句自乘以股弦較除之得股弦和以股弦和除之得股弦較句弦較乘句弦和為股實故股自乘以句弦較除之得句弦和以句弦和除之得句弦較股弦較除句實為股弦和以加股弦較折半得弦弦內减股弦較得股句弦和除股實為句弦較以加句弦和折半得弦弦內减句弦較得句又句自乘股弦較自乘相减倍較除餘實得股股自乘句弦較自乘相减倍較除餘實得句又股弦和自乘并句實倍和為法除之得弦句弦和自乘并股實倍和為法除之得弦股弦和自乘以句實减之倍和除之得股句弦和自乘以股實减之倍和除之得句又弦自乘减四句股積餘數開方得句股較弦實减句股較實餘數折半以較為縱用帶縱較數法開之得句股句股和自乘减八因積餘數開方得句股較弦實與句股和實相减再相减餘為句股較實開方得句股較弦實减句股較實復加弦實為句股和實開方得句股和加較折半得股股减較得句倍弦實减句股和實得句股較實若减較實亦得和實弦去句股較為弦較較弦方减去句股較方即四因積以弦較較除之得弦較
