body:
  text: 有黃緯赤緯求赤經設黃緯北六十度赤緯北六十三度二十二分十一秒求赤經法以赤緯六十三度二十二分十一秒與黃赤大距相加為總弧八十六度五十一分十一秒正弦九九八四九二相减為較弧三十九度五十三分十一秒正弦六四一二六七三兩正弦相减餘三五七二二四七半之得一七八六一二三五為甲數甲數轉减總弧正弦餘八一九八七九六五為乙數於黃緯正弦八六六二五四內减去乙數八一九八七九六餘四六一四五八為中數法為甲數與中數若半徑與赤經餘弦用四率求得餘弦二五八三五一五檢表加三象限得距春分赤經三百四十五度一分四十秒减三象限得距春分赤經一百九十四度五十八分二十秒又設黃緯南六十度赤緯南六十三度二十二分十一秒求赤經諸數並同但以所得餘弦二五八三五一五檢表减象限得距春分赤經十四度五十八分二十秒加象限得距春分一百六十五度一分四十秒又設黃緯南六十度赤
