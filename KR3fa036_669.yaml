body:
  text: 以一為實以正弦除之得餘割以餘割除之得正弦以餘弦除之得正割以正割除之得餘弦蓋兩線相乘為矩則其邊為互相視之邊故相與為比例皆等兩弧八線互求八線之中正弦與餘割相乘餘弦與正割相乘正切與餘切相乘皆與半徑自乘之數同故本弧可以互求兩弧亦可以互求也互求之法皆用四率斷比例不用半徑而其目有九一曰此弧正弦與他弧正弦若他弧餘割與此弧餘割二曰此弧正弦與他弧餘弦若他弧正割與此弧餘割三曰此弧正弧與他弧正切若他弧餘切與此弧餘割四曰此弧餘弦與他弧餘弦若他弧正割與此弧正割五曰此弧餘弦與他弧正弦若他弧餘割與此弧正割六曰此弧餘弦與他弦餘切若他弧正切與此弧正割七曰此弧正切與他弧正切若他弧餘切與此弧餘切八曰此弧正切與他弧正弦若他弧餘割與此弧餘切九曰此弧正切與他弧餘弦若他弧正割與此弧餘切
