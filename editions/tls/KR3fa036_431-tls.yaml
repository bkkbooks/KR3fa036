body:
  text: 日天撱圓圖太陽最髙距地心一一六九最卑距地心九八三一與半徑一相减得一六九為兩心差倍之得三三八為盈縮差刻白爾用兩心差作撱圓均分撱圓面為三百六十分每分之積皆為一度每一度為六十分太陽每日右旋當每一度積之五十九分八一九四四四三二二三是為平行在最卑半周地心至撱圓界之線短則角度必𡩖是為行盈在最髙半周地心至撱圓界之線長則角度必狹是為行縮故太
