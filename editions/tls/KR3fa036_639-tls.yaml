body:
  text: 一三一八六二五四一八二十億之周率也凡五一一三一五七乘除俱至單位止今二二三四七設十位之徑湏乘除一二十二次始至單位若六二八三一八五二九九位數多則所用乘除之數必湏按位增加也求弧線置全周密率為實以三百六十度除之得每度之弧線屢加之至十度又置一度之弧線為實以六十分除之得一分之弧線屢加之至十分
