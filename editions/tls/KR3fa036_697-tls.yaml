body:
  text: 用郭氏法從二至起算有大距有黃道求距緯法為半徑與大距正弦若黃道餘弦與距緯正弦有黃道有距緯求大距法為黃道餘弦與距緯正弦若半徑與大距正弦有大距有距緯求黃道法為大距正弦與半徑若距緯正弦與黃道餘弦有赤道有距緯求黃道法為半徑與赤道正弦若距緯餘弦與黃道正弦有距緯有黃道求赤道法為距緯餘弦與黃道正弦若半徑與赤道正弦有赤道有黃道求距緯法為赤道正弦與半徑若黃道正弦與距緯餘弦今設以黃道距至三十度與赤道距緯互求以明之用正弦餘弦者圓內句股形也若用切線求諸圓外亦可得之設黃道距至三十度赤道距至三十二度十一分二十四秒為四率互求之
