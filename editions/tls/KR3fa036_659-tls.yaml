body:
  text: 弦三九八四八二三以正切除正弦得數亦進七位而得餘弦九一七一七六又以正弦餘切求餘弦以餘弦正切求正弦將已知之二線任以一為法一為實相乘得數各退七位亦即得之退七位者即以一率除之之法與用四率者無異也八線互求八線互求分為三種一種用三率連比例以半徑為中率其目有三一曰正弦與半徑若半徑與餘割二曰餘弦與半徑若半徑與正割三曰正切與半徑若半徑與餘切一種用四率斷比例四率之內有一率為半徑其目有六一曰正弦與餘弦若半徑與餘切二曰餘弦與正弦若半徑與正切三曰正割與正切若半徑與正弦四曰餘割與餘切若半徑與餘弦五曰正割與餘割若半徑與餘切六曰餘割與正割若半徑與正切一種用四率斷比例不用半徑其目有三一曰正弦與正切若餘切與餘割二曰餘弦與餘切若正切與正割三曰正弦與餘弦若正割與餘割互求之法凡十有二除前所推數法外今又各舉其例以明之設弧三十三度有正切求餘切
