body:
  text: 五十七度則將此晷斜𠋣使横直線之中心斜對赤道南去二百里則斜低一度北去二百里則斜髙一度俱對赤道測之具表法用三小時之長並同平面日晷圖平面日晷作法先作子午直線上為北極下為南極又作𫑗酉横線二線相交之䖏為赤道北極赤道之間作九十度按本地北極距天頂赤道距天頂之數用切線分之得天頂下對之地心為表位任取天頂至地心之數為表長表端即天頂又以天頂距赤道之割線作半徑用其切線作時刻㸃於赤道之上一
