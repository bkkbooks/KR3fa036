body:
  text: 心非三角形之心其心或在形內或在形外而能以十字線剖各邊為兩平分此分邊求心之法所由以立盖即三㸃串員之法也有甲乙丙三㸃求串員任以甲為心作虛員分用元度以丙為心亦作虛員分兩員交相交於戊於辛作戊辛直線又任以乙為心以丙為心各作同度之虛圓分相交于庚于壬作庚壬直線兩直線相遇于丁以丁為心作圓則三㸃並圓周圓周有三㸃不知其心亦用此法割圓求句股割平圓為十二分成宫為二十四分成小時為九十六分成刻為三百六十分成度為二萬一千六百分成分莫不成為句股之形其正弦內之句股常以正弦為句半徑為弦半徑减正矢數即餘弦數為股正弦外又為小句股以正弦為小股正矢為小句又求得逓得之正弦為小弦若求諸弧線外則又以正切為句半徑為股正割為弦若又求其餘角則又以餘
