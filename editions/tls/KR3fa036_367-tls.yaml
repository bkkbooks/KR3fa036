body:
  text: 本極而成一㸃此經緯之度兩道同法也然而兩道之相差二十三度二十九分故其極亦相差二十三度二十九分而兩道緯圈之差數如之矣若其經度則兩道之相同者惟丑未之初度初分聮而為一圈其餘則皆有相差之度而其差又不等此其勢如以兩重罾網冐於圓球則網目交加縱横錯午而各循其頂以求之條理井然至賾而不可亂此所以即顯見隐舉一知三可以經度求緯亦可以緯度求經可以黃之經求赤之經亦可以黃之緯求赤之經可以黃之緯求赤之緯亦可以黃之經求赤之緯用赤求黃亦皆復然宛轉相求而莫不脗合也用正弦求距緯圖
