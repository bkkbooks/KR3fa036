body:
  text: 為赤道半徑與赤道正弦若距緯餘弦與黃道正弦又為赤道半徑與赤道切線若大距餘弦與黃道切線立面比例為黃道半徑與大距正弦若黃道餘弦與距緯正弦又為赤道半徑與大距切線若赤道餘弦與距緯切線斜立面比例為黃道半徑與距緯正弦若黃道割線與大距正弦又為赤道半徑與距緯切線若赤道割線與大距切線方直形比例為黃道正弦與距緯正弦若赤道切線與大距切線又為赤道正弦與距緯切線若黃道切線與大距正弦方塹堵儀求黃赤道度圖
