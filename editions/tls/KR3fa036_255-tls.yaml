body:
  text: 第一法垂弧在形內成兩正角設甲乙丙形有丙銳角有角旁相聨之乙丙甲丙二邊求對邊及餘兩角法於乙角不知之角作垂弧乙丁至甲丙邊分甲丙邊為兩即分本形為兩而皆正角一乙丁丙形有丁正角丙角乙丙邊為兩角一邊可求丁丙邊乙丁邊及丁乙丙分角乙分角次乙丁甲形有丁正角甲丁邊乙丁邊為一角兩邊可求乙甲邊甲角及乙丁甲分角末以兩乙角併之成乙角或如上圖于甲角端作垂弧至乙丙邊分乙丙為兩亦同設甲乙丙形有丙銳角有角旁相連之丙乙邊及與角相對之乙甲邊求餘兩角一邊法於不知之乙角作乙丁垂弧分兩正角形一乙丙丁形有丁正角丙角乙丙邊可求乙丁分線及所分丁丙邊及丁乙丙分角次乙甲丁形有丁正角乙丁邊乙甲邊可求甲角及丁乙甲分角丁甲邊末以兩分角并之成乙角以兩分邊并之成甲丙邊設甲乙丙形有乙丙二角有乙丙邊求甲角及餘邊法於乙角作垂弧分兩形一乙丙丁形有丁正
