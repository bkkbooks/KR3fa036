body:
  text: 五六一以餘弦八二九三七六除之得餘割一七八八二九一六先除後乘亦同有弦割求切法以正弦正割相乘得六七四五八五退七位為正切以餘弦餘割相乘得一四八二五六一退七位為餘切退七位即以半徑除之與進七位即以半徑乘之者同一法也設弧三十四度割切相求設弧三十四度有割線求切線以正割除餘割得一七八八二九一六進七位為餘切以餘割除正割得六七四五八五進七位為正切又如有餘切餘割求正割以餘切除餘割得一二六二一八進七位為正割有正切餘割求正割以正切餘割相乘得一二六二一八退七位
