body:
  text: 較假如句股積二百九十四丈弦和和八十四丈求弦和較求句股和求弦句股四因積一千一百七十六丈為實弦和和八十四丈除之得十四丈為弦和較加弦和和八十四丈得九十八丈折半得四十九丈為句股和又以弦和較减句股和餘三十五丈為弦又法弦和和八十四丈自乘得七千五十六丈减四因勾股積一千一百七十六丈餘五千八百八十丈折半得二千九百四十丈為實以弦和和八十四丈除之得三丈五丈為弦假如句弦和五十六丈股弦和六十三丈求弦和和句弦和五十六丈與股弦和六十三丈相乘得三千五百二十八丈倍之得七千五十六丈為實開方得八十四丈為弦和和假如句股和四十九丈弦較較二十八丈求句股弦兩數相加為兩句一弦共數七十七丈自乘得五千九百一十九丈句股和自乘得二千四百一丈
