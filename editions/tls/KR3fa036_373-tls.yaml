body:
  text: 其度不可平分於是設想其間另作一均輪于本圈之界以便推算其法以二十三度二十九分之正弦為半徑作圓平分三百六十度每十五度為一節又以半徑為距度尺細分二十三度二十九分用法將圓周節氣線上下逐度相對以細線牽切距度尺上視尺上所切之度即得各節逐日距度也節氣線尺
