body:
  text: 失之大最卑前後本輪固失之大矣均輪又失之小如圖甲為地心乙丙丁戊為黃道已為不同心天之心庚辛壬癸為不同心天乙庚為本輪半徑與甲已兩心差等以本輪之法論之最卑時本輪心在乙太陽在庚中距時本輪心在丙太陽在辛乙丙為平行九十度辛甲丙角為平行實行之最大差以不同心天之法論之太陽自最卑庚行至辛亦九十度已辛甲角為平行實行之最大差與辛甲丙角等故本輪之法與不同心天之法相同以均輪之法論之最卑時本輪心在乙均輪心在子太陽在丑中距時本輪心在丙均輪心在𫑗太陽在辛最髙時本輪心在丁均輪心在辰太陽在己辛甲丙角最大差仍當甲已之全而丑乙之卑於本天半徑已乙之髙於半天半徑者止及甲已之半與甲寅等故以推盈縮差惟中距與本輪同最髙半周比之本輪則大最卑半周比之本輪則小刻白爾設本天為撱圓以寅為不同心天之心均分面積為平行而以其角度為實行正所以合不同心天與本輪均輪而一之也
