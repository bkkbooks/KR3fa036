body:
  text: 二率戊𫑗一九三三二三率未乙九一七一七六四率酉乙一檢表得丙乙四十五度正弧三角形求餘角法凡弧三角有三邊三角先得三件可知餘件與平三角同理前論正弧形以黃赤道為例而但詳乙角者因春分角有一定之度人所易知故先詳之或疑求乙角之法不可施於丙角不知求乙角之法一一皆同丙角更之而用丙角求餘邊亦如其用乙角也所異者乙角定為春分角其度不變丙角為過極經圈交黃道之角隨度而移近大距則甚大類十字角近春分只六十六度半弱中間交角度度不同故必求而得之丙角所成諸句股皆以亥辰𫑗為例丙乙為黃道度甲乙為赤道同升度丙甲為黃赤距度丙角為黃道上交角乙為春分角甲常為正角
