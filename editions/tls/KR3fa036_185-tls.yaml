body:
  text: 容方也鈍角形但可以大邊為底其求之則皆一法也三角容方以圖算假如銳角形求容方任以一邊為底如圖以乙丙最小邊為底先從對角甲作中長垂線至丁又從乙角作丑乙立線與甲丁平行而等乃從甲角作横線過丑至癸截癸丑亦如甲丁乃從癸向丙角作斜線割丑乙立線於子末以子乙之度截中長線于戊即戊丁為容方之徑從戊作己庚又從巳作線至辛從庚作線至壬成庚巳辛壬即所求容方銳角三鈍角形求容邊皆可方則惟有大為底而邊可為底法皆一法同銳角句股形求以句股為底容方以弦即截股截句為底法同為容方徑不鈍銳兩角另求中長線又法依乙丙邊為底以乙丙底作正
