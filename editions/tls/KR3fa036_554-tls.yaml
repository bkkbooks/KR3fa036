body:
  text: 其上有赤道象限底與面一邊相連為底與斜面所同用乃赤道地平之半徑一邊相離即立面長方形為赤道距地平度之切線從斜面作對角線切至底則地平為兩平分各得四十五度而赤道為不平分又各因北極之髙下而異即因距地平度之多寡而異也自赤道𫑗㸃至對角線用正切赤道求地平一率距地平度割線二率地平半徑三率赤道正切四率地平正切地平轉求赤道則反用其率自赤道對角線至正午用餘切赤道求地平一率赤道半徑二率距地平度割線三率赤道餘切四率地平餘切地平轉求赤道亦反用其率正切法即句股錐餘切法即句股方錐以對角線分塹堵為二亦即成此二種錐形也赤道地平距度表赤道距地平度即北極距天頂度之數各䖏髙下不同兹用𥂁城北極出地三十三度推之其距天頂五十七度赤道距地平亦五十七度然惟在子午規為距午度距地度分秒距午度距地度分秒
