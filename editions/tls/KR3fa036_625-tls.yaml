body:
  text: 各省府縣之中星處處不同一𡻕之中星日日不同每日之中星時時不同兹用赤道星度分列縱十二宫横三十度前列周𡻕各節氣各時刻上列節氣各日時刻各分縱横推之便得各節氣各日各時刻各分也𥂁城在京師東三度四十分較京師早十四分四十秒故京師起酉正𥂁城則起酉初三刻二十秒也假如在𥂁城冬至後五日測得婁宿三星正中察婁宿三星在二十九度一十九分一十二秒從初度起酉初三刻二十秒推得婁宿三星正中為戌初二刻十二分三十六秒四十八𢕄也至参宿一星正中察参宿一星在三宫二十一度三十二分二秒二十四𢕄從初度起亥初三刻二十秒推得参宿一星正中為子初初刻十一分二十八秒九𢕄三十六纎也餘並倣此推之恒星平儀髙弧定時圖恒星定時之法舊用經度中星今於中星之外既用各宫經度求之矣而又以經度定時必用南北真線或用校凖之指南針非此則無以求之不若用其緯度較便且真其法檢恒星經緯度表加减𡻕差用本年緯度作緯線于赤道之南北然後測其地平緯度
