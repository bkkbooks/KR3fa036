body:
  text: 壬癸股一率原設弦半徑一二率原設弦丁角五十七度正弦八三八六七六三率今有弦壬丁邊九十一丈八尺四率今所求股壬癸邊七十六丈九尺八寸九分一求壬角以丁角五十七度减象限九十度餘三十三度為壬角句股形有邊求角假如壬癸丁句股形有壬丁弦一百二丈二尺癸丁句四十八丈求二角一邊一求丁角以壬丁弦比癸丁句若半徑乙丁與丁角之餘弦甲丁一率壬丁邊一百二丈二尺二率癸丁邊四十八丈三率半徑一四率丁角餘弦四六九六六七二查表得六十一度五十九分一十四秒為丁角一求壬癸邊以半徑比丁角之正弦若壬丁弦與壬癸股一率半徑二率六十一度五十九分一十四秒正弦八八二八四五六三率壬丁邊四率壬癸邊九十丈二尺二寸六分八釐一求壬角以丁角六十一度五十九分一十四秒减象限餘二十八度四十六秒為壬角
