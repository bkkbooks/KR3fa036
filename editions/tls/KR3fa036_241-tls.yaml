body:
  text: 四率丙角正弦九五五九八七檢表得丙角七十二度五十五分二十一秒假如有丙甲距度及乙甲同升度而求丙交角則為丙甲之正弦與乙甲之切線若半徑與丙角之切線也丙甲距緯一十六度二十一分五十七秒乙甲赤道四十二度三十一分三十五秒求丙交角一率丙甲正弦二八一七三八二率乙甲切線九一七一七六三率半徑全數一四率丙角切線三二五五九八五檢表得丙角七十二度五十五分二十一秒假如有丙甲距度及乙丙黃道度而交丙交角則為乙丙之切線與丙甲之切線若半徑與丙角之餘弦也丙甲距緯一十六度二十一分五十七秒乙丙黃道四十五度求丙交角一率乙丙切線一二率丙甲切線二九三六六八二三率半徑全數一
  hash: sha256:e31e1d200d6af85b49711c9b4aad81226d087bae0d6108fd8ece4b2a185daafb
