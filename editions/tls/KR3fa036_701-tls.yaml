body:
  text: 之正弦相乘半徑除之也今以大距度與黃道度相加為總弧相减為較弧而各取其餘弦以相加减視總弧過象限則兩餘弦相加不過象限則相减而折半為距緯正弦又或起算二至有距至黃道度求距緯本以大距正弦與黃道度之餘弦相乘半徑除之也今以大距度與黃道度相加為縂弧相减為較弧而各取其正弦以相加减折半得距緯正弦是以加减代乘除也設黃道距分三十度求距度
