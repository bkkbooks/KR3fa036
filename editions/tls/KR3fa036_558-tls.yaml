body:
  text: 塹堵赤道界表塹堵儀以正方為底上具地平象限即圓周四分之一每度之界即半徑也以長方為斜面上具赤道象限惟底面相連之䖏為半徑其餘各度所加不同兹距𫑗酉度丈尺寸分釐距𫑗酉度丈尺寸分釐五十一二六一一七五十五五一三四九一三七六一十五二十一二四四一四三八六十六五一四五四八一五三八八二五三十一六九四一一一五七十七五一六二四五一七五六三五四十一一四六一一八七二八十八五一七七三七一八一九七四五一一四一九九十一八三六一用𥂁城赤道髙五十七度推之惟𫑗酉之界一丈至正午則長一丈八尺三寸六分一釐按度列表用者依表定界可得地平上赤道之象而赤道度與地平度之差亦可以是求之太陽地平經緯定時圖地平經緯與赤道經緯可以互求測得地平經或地平緯以求赤道緯即得節氣以求赤道經即得時刻用赤道加地平圖或用旁視交加圖俱可得之而地平加赤道正視圖用之尤便圖依𥂁城北極出地之數位置赤道節氣緯線時刻經線用南北真線測得地平經度或用象限測得地平緯度察赤道南北節
