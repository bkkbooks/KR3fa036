body:
  text: 凡算三角有用半徑與正弦相為比例者皆以半徑為正角之正弦其法與銳角鈍角用兩正弦為比例者同也三角算例凡三角形有三類曰直角三邊形即句股也有正方角一餘並銳曰銳角形三角並銳曰鈍角形三角內有鈍角一餘並銳句股形有一角一邊求餘角餘邊假如壬癸丁句股形有丁角五十七度壬丁弦九十一丈八尺求餘邊餘角一求丁癸邊以半徑全數比丁角之餘弦若壬丁弦與癸丁句一率原設弦半徑一二率原設句丁角五十七度餘弦五四四六三九三率今有弦壬丁邊九十一丈八尺四率今所求句癸丁邊四十九丈九尺九寸七分一求壬癸邊以半徑比丁角之正弦若壬丁弦與
  hash: sha256:86e81d5d1a9a7a6576a72cd4718d2040a6b24b74277b59d332721630a00e2051
