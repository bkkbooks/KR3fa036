body:
  text: 日輪正居日天之中日天動而日輪亦動日天運行之一周如於宗動天畫一道焉所謂黃道也黃道周天三百六十度分四分為一象限一象限又分六分每分十五度為一節氣如圖自冬至至春分一象限也又分之為六節氣自春分至夏至自夏至至秋分自秋分至冬至亦然黃道春秋分運旋之跡為晝夜平規夏至運旋之跡為晝長規冬至運旋之跡為晝短規從北極視之止見長平二規從南極視之止見平短二規從春秋分視之亦止見三規之半圓今用側睨遥望之法以得三規之全體亦聊擬渾天之本象焉耳正弦分時尺平儀時刻用正弦線分之但每刻加距三度又四分之三取度難清今用正弦度變時作尺用法並同正弦線尺得時亦同而用較便
