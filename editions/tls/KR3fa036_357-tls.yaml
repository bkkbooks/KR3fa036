body:
  text: 剖分渾圓為二或從赤道剖分或從黃道剖分皆成平圓二圖即一圖而觀之天象未備合二圖而用之運轉亦難今得赤南放濶之法將南圖黃道之交角即於北圖赤規之外紀之與赤規連為一圖而黃道之度胥全交角之理益著可以用黃道推赤道亦可以用赤道推黃道矣又赤道運動黃道亦隨之以轉星曜在天之度一一按圖可得以作天地二𥂟其用尤至便也用赤經直線分黃經圖
