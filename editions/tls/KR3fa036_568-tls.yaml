body:
  text: 立夏立秋小滿大暑芒種小暑夏至夏至戌初酉正酉初申正申初未正未初午正太陽直影隨地長短不同亦隨時長短不同兹用𥂁城北極出地三十三度推算各節氣各時刻之直影列表節氣直推時刻横推其縱横相遇之數即為節氣時刻相應之丈尺也作股晷按表中丈尺㸃之或止用句股尺量取直影查表即得節氣時刻也表中丈尺以一丈之表見例若表長一尺則以丈為尺以尺為寸表長一寸則又以丈為寸以尺為分以下逓减一等若用古法八尺之表則用八數折之用西法十二度之表則用十二乘之並同太陽勾晷圖太陽勾晷以所立之表為勾壁上之影為股法同平板先畫一横線為地平線線上分十三直線為二十四節氣線次用長短之影㸃於直線而聨之為時刻曲線立横表於地平線上令與線平表端之影所至
