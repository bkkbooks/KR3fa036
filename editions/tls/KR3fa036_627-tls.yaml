body:
  text: 以地平緯度察赤緯求赤經得恒星所臨赤經方位又察恒星赤經原度加本日距日赤經度分變作時刻即得本日之時刻也測日月星髙弧求實度圖用象限儀闚管或用句股尺測得日月之髙弧以為即緯度矣而不知儀噐所得者乃視度非實度也盖日月星之實度俱從地心立算而人所居者地面則
