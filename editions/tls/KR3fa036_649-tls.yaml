body:
  text: 位即所求之正弦設弧十六度二十七分四十三秒求正矢法以設弧共分自乘之八二五四九九八五為屢乘數又以三四相乘之十二為第一除數五六相乘之三十為第二除數七八相乘之五十六為第三除數乃以屢乘數折半為第一得數為實以屢乘數乘之第一除數十二除之得二八三九三八六為第二得數又為實以屢乘數乘之第二除數三十除之得七八一三為第三得數又為實以屢乘數乘之第三除數五十六除之得一一為第四得數於是以第一得數與第三得數相併又以第二得數與第四得數相併復以後併數减先併數餘四九九一八三四一截去末二位即所求之正矢也
