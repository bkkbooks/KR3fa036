body:
  text: 乙丁為撱圓大半徑與平圓乙壬半徑等戊乙小半徑之小於平圓半徑者即壬戊撱圓差若逐度割之則撱圓之餘弦必與平圓之餘弦等而正弦必小於平圓然平圓正弦與撱圓正弦之比例必同於平圓半徑與撱圓小半徑之比例也如丁子弧為三十度丑乙為三十度之餘弦平圓與撱圓等子丑為平圓三十度之正弦寅丑為撱圓三十度之正弦子寅為三十度之撱圓差丁𫑗弧為六十度辰乙為六十度之餘弦平圓與撱圓等𫑗辰為平圓六十度之正弦已辰為撱圓六十度之正弦𫑗己為六十度之撱圓差則子丑與寅丑之比𫑗辰與巳辰之比皆同於壬乙與戊乙之比而子丑與子寅之比𫑗辰與𫑗己之比皆同於壬乙與壬戊之比也求撱圓角度設𫑗乙辰角為平圓六十度求撱圓之己乙辰角試以乙辰為半徑作弧則𫑗辰為𫑗乙辰角之正切已辰為己乙辰角之正切夫𫑗辰與己辰之比既同於壬乙與戊乙之比則𫑗乙辰角之正切與
