body:
  text: 句股釋例三弧三角名義弧三角之法以測渾圓渾圓上之弧度皆與天相應其弧度有極大之圈乃腰圍之一線如黃赤道子午規地平規皆是也兩弧度相交而成角角有正有斜斜角又有銳鈍共三種而角兩旁皆弧線與直線角異兩弧線又皆半周必復相交作角而等與直線半徑異三弧度相交則成三角形三角形有三角三邊共六件以先有之三件求餘三件與平三角同所不同者平三角形之三角并之皆一百八十度弧三角不然其三角最小者比一百八十度必盈但不得滿五百四十度平三角之邊小僅咫尺大則千百萬里弧三角邊必在半周以下不得滿一百八十度合三邊不得滿三百六十度平三角有兩角即知餘角弧三角非算不知平三角有一正角餘二角必銳弧三角則否有三正角兩正角者其餘角有鈍有銳或兩銳或兩鈍或一銳一鈍不等平三角有一鈍角餘二角必銳弧三角則否其餘角或銳或正或銳甚有三鈍角者平三邊以不同邊而同角為相似形同邊又
