body:
  text: 角或丙為鈍角刖於次形戊角作垂弧法同上條設乙甲丙形有丙角甲丙邊乙甲邊法用甲已戊次形作垂弧甲丁以甲丁戊分形求丁戊及甲分角又以甲丁己形求得丁己以并丁戊成己戊即丙乙又得甲分角以并先得分角即甲交角又得己角即乙外角設乙甲丙形有三邊內有二邊乙甲丙甲相同皆為過弧法引相同之二邊各滿半周成戊甲已次形作甲丁垂弧兩形相等任以甲丁戊分形求到戊角以减半周得乙角亦即丙角求到甲半角倍之成甲角設乙甲丙形有丙甲二鈍角甲丙邊法引乙丙乙甲滿半周會于戊成甲戊丙次形自甲作垂弧與丙戊引長弧會于丁先求丙甲丁形諸數次求甲戊丁得甲戉以减半周為乙甲又以丁戊减先得丁丙得丙戊以减半周為乙丙又求得戊虛角减半周為戊角即乙對角或自丙角作垂弧亦同設乙甲丙形有乙甲二鈍角甲丙邊法引設邊成丙戊角次形作丙丁垂弧引次形邊會
