body:
  text: 故三者同一數也句股弦之名三有和有較則五分之則十有三又分之則二十有一而巳句股之長為線乘之為面一線自乘為方面兩線相乘為長方面方面亦謂之冪其中容受為積亦謂之實再乘為立方體而句股之數錯綜之以至於無窮焉句股原理如圖弦實兼句實股實凡弦方內去句實即為股實去股實即為句實合句實股實斯為弦實又弦方內有四句股積一句股較積句股和方內有一弦方一句股較方弦方內四句股積外亦四句股積共有八句股積又中一句股較積又弦方內即弦較較乘弦較和之積弦方外即弦和較乘弦和和之積此句股之所以能相求也句股相求句股求弦以句自乘得句實股自乘得股實併之得弦實開方得弦句弦求股句弦求股以句自乘得句實弦自乘得弦實弦實內减句實得股實開方得股股弦求句以股自乘得股實弦自乘得弦實弦實內
