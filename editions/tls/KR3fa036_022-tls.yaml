body:
  text: 宿當黃道北立春立秋後黑道半交在立冬之宿當黃道東北至所冲之宿亦如之四序離為八節至隂陽之所交皆與黃道相會故月行有九道也今法總名白道夏至在隂厯冬至在陽厯則月距赤道較黃道為遠夏至在陽厯冬至在隂厯則月距赤道較黃道為近其黃白大距最大則五度一十七分二十秒最小則四度五十九分三十五秒其道與黃道一𡻕十三交𡻕𡻕遷動至十九年二百四十九交而後復其原度焉此月之道也土星本道與黃道相交之角二度三十一分木星本道與黃道相交之角一度一十九分四十秒火星本道與黃道相交之角一度五十分金水二星同行黃道而次輪之道亦異金星次輪面交黃道之角三度二十九分水星次輪心在正交當黃道北之角三度五分一十秒當黃道南之角六度三十一分二秒次輪心在中交當黃道北之角六度一十六分五十秒當黃道南之角四度五十五分三十二秒次輪心在兩交之中當黃道南北之角皆五度四十分此五星之道也道之出入內外各不同也日在第四重天去地心二萬九千一百四十四萬五千三百八十餘里月在第一重天去地心八十
