body:
  text: 歩金星假如道光癸巳距根六十三日求金星經緯諸年根金星距冬至一十五分一十四秒二十一𢕄最髙六宫四度五十九分三十秒三十六𢕄伏見二宫二十九度三十九分一十七秒四十九𢕄諸日數六十三日金星二宫二度五分四十四秒四十九𢕄最髙一十四秒一十八𢕄伏見一宫八度五十分二十四秒一十𢕄諸平行金星年根日數相加得二宫二度二十分五十九秒一十𢕄最髙六宫四度五十九分四十四秒五十四𢕄伏見四宫八度二十九分四十三秒五十九𢕄正交置最髙平行减一十六度得五宫一十八度五十九分四十四秒五十四𢕄引數置金星平行减最髙平行得七宫二十七度二十一分一十四秒一十六𢕄初均以引數宫度分察所對之初均得一度三十三分三十二秒其號為减中分又察所對之中分得四十五分二十五秒初實行置金星平行依號减初均數得二宫四十七分二十七秒一十𢕄伏見實行置伏見平行反號加初均數得四宫一十度三分一十五秒五十九𢕄次均以伏見實行宫度分察所對之次均得四十五度一十一分一十七秒其號為减較分又察所對之較分得一度三十一分五十四秒
