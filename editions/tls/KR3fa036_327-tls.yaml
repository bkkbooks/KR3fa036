body:
  text: 方面積與撱圓外切長方面積之比例亦即同於撱圓大徑與小徑之比例如求撱圓六十度之面積則先設丁𫑗弧六十度求乙𫑗丁六十度之平圓面積以比之法以半周率三一四一五九二六五用三分之得一四七一九七五五為𫑗丁弧線與乙𫑗半徑一千萬相乘折半得五二三五九八七七五即乙𫑗丁分平圓六十度之面積而為平圓全積六分之一又以壬乙大半徑一千萬為一率戊乙小半徑九九九八五七一小餘八五為二率乙𫑗丁積為三率求得四率五二三五二三九九七二四九五即乙已丁分撱圓六十度之面積而為撱圓全積六分之一也
  hash: sha256:e3a1e91d1fd3c728d0ad3ed270155e861fd62862b9b974f3525315f76fb5e7cb
