body:
  text: 角一正一鋭一鈍邊二大以上正弧形三種邊角一小並同己形兩大小二與丁戊已三種無異但邊不能成半周角亦然無同度之邊斜弧三角形之角有三角並銳者內分三種一種有二角相等一種三角不相等一種三角俱等有二角銳而一鈍者內分四種一種二銳角相等一種二銳角不相等一種鈍角為一銳角减半周之餘一種二銳角相等而又並為鈍角减半周之餘有二角鈍而一銳者內分四種一種二鈍角相等一種二鈍角不相等一種銳角為一鈍角减半周之餘一種二鈍角相等而又並為銳角减半周之餘有三角並鈍者內分三種一種有二角相等一種三角不相等一種三角相等計斜弧之角十有四種斜弧三角形之邊有一邊足二邊小者內分二種一種二小邊相等一種二小邊不等有一邊足二邊大者內分二種一種二大邊等一種二大邊不等有一邊足一邊小一邊大者內分二種一種大小二邊合之成半周一種合二邊不能成半周有三邊並小者內分三種一種三邊不等一種二邊等一種三邊俱等有二邊大而一小者內分四種一種二大邊等一種二大邊不等一種
