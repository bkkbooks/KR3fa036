body:
  text: 丙角餘弦與半徑若丙甲切線與乙丙切線丙甲距緯一十六度二十一分五十七秒丙角七十二度五十五分二十一秒求乙丙黃道以丙角餘弦二九三六六八二除丙甲切線二九三六六八二陞七位得乙丙切線一檢表得四十五度弧角同比例解正弧三角形以一角對一邊則各角正弦與對邊之正弦皆為同比例如圖乙甲丙弧三角形甲為正角其正弦即半徑全數法為甲角之正弦與乙角之正弦若乙丙之正弦與丙甲之正弦更之則乙角之正弦與對邊丙甲之正弦若甲角之正弦與對邊乙丙之正弦也又丙角之正弦與對邊乙甲之正弦亦若甲角之正弦與對邊乙丙之正弦也合之則乙角之正弦與對邊丙甲之正弦亦若丙角之正弦與對邊乙甲之正弦也用半徑與乙丙為比例者取其數也言甲角之正弦與乙丙為比例者所以明其理也專用正弦求各角各邊有甲角乙角乙丙邊求丙甲邊
