body:
  text: 外角同用弧三角亦然弧三角角邊各類凡三角內有一正角謂之正弧三角形三角內並無正角謂之斜弧三角形三弧三角形之角有三正角者有二正角一銳角者有二正角一鈍角者三種不湏用算又有一正角兩銳角者內分二種一種兩銳角同度一種兩銳角不同度有一正角兩鈍角者內分二種一種兩鈍角同度一種兩鈍角不同度有一正角一銳角一鈍角者內分二種一種銳鈍兩角合之成半周一種合銳鈍兩角不能成半周計正弧之角九種而用算者六也正弧三角形之邊有三邊並足者足謂足九十度有二邊足一邊小者在象限以下為小有二邊足一邊大者過象限以上為大三種可不用算有三邊並小者內分二種一種二邊等一種三邊不等有二邊大而一小者內分三種一種二大邊等一種二大邊不等一種小邊為一大邊减半周之餘計正弧之邊八種而用算者五也二邊俱小則餘邊必不能大故無二小一大之形二邊俱大則餘邊亦不能大故無三邊並大之形一邊若足則餘邊亦有一足故無一邊足之形
