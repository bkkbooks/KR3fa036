body:
  text: 凡圓周平分三百六十經度必用分圓線分之分圓線即各弧之通弦亦曰分弦線亦曰分圈作分圓線法查八線表正弦數倍之為倍度之通弦假如求六十度通弦即以三十度之弦五倍之得一即六十度之通弦他皆若是或用量法作象限弧勻分九十度次從初度向九十度作斜弦次從初度作直線至各度移入斜弦上識其號即成分圓線也用法有圓徑求弧度以半徑為本線六十度之底定尺次逐度向圓周識之即得圓周各度象限度圖
