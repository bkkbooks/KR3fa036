body:
  text: 測天頂北星求北極出地圖測天頂以北之星先以星之赤緯與九十度相减得星距極度以星距地度興所測髙度相减得北極出地度假如測得北斗第一星髙六十度一十九分其距極二十七度一十九分以二十七度一十九分興星髙六十度一十九分相减得三十三度為取極出地度也又或測興取極最近之星星隨取極旋轉不入地平有距地平最卑之度則用星距極度興星距地平卑度相加得北極出地度假如測得勾陳第一星在北極下距地平三十一度一十八分其距極一度四十二分以一度四十二分興距地平三十一度一十八分相加亦得三十三度為北極出地度也
  hash: sha256:cf0a220ce4c6eff056d22ffd5b0c80fb961f19a789eb6a3560d4aa07c06aa400
