body:
  text: 三度四十分也測中星求東西偏度圖測日𨇠以求偏度所差甚𢕄最難真確不如用中星求之檢七政時憲書視日𨇠度分用對冲度分之恒星先一日午正用時憲書節氣校定時儀行至子正測所用之恒星偏度幾何星偏西一度則地偏東一度星偏東一度則地偏西一度假如秋分後七日子正測壁宿第一星偏於正午之西三度四十一分二十五秒即知其地偏東三度四十分也然後知所定子正已過其地子正十四分四十秒而真時可得矣或於昏後不拘何時測中星之遲早以求偏度偏東三度四十分則戌初之中星於酉正三刻零二十秒
