body:
  text: 方面之斜徑冪六千六百六十六六六亦三之二也平方開之得八十一六四九六即內容斜方之斜內容立方面冪三千三百三十三三三為渾圓徑冪三之二即方斜之半冪平方開之得五十七七三五是為渾圓徑一百內容立方之邊亦即渾圓內容立方立方又容小圓之徑至於立方內又容渾圓則其徑冪一千一百一十一一一為渾圓徑冪九之一為方斜面冪六之一立方面冪三之一開得平方根三十三三三不𥁞為內容小渾圓之徑以徑乘冪得三萬七千三十七為徑上立方積以三一四乘以四除得二萬九千八十八七九為圓柱積柱積取三之二得一萬九千三百九十二一九為小渾圓積得大渾圓二十七之一以小渾圓積二十七因之得五十二萬三千五百八十九一三為外大渾圓積盖外大渾圓徑一百其徑上立方一百萬以三一四乘四除得七十八萬五千三百九十八為圓柱積三分取二得五十二萬三千五百八十九為渾圓積內方立方面冪三千三百三十三三三其邊五十七七三五以邊為髙乘面得一十九萬二千四百五十為內容立方積立方內容小渾圓以立方之邊為徑
