body:
  text: 初實行置火星平行依號加初均得五宫二十二度二十分四十六秒四十一𢕄星距日次引置本日太陽實行减初實行得九宫二十度一十八分四十六秒一十九𢕄半外角星距日次引過半周者與全周相减餘兩宫九度四十一分一十三秒四十一𢕄折半得一宫一十九度五十分三十六秒五十𢕄半較角以次輪實半徑與次輪心距地數相加得一六九六七一七為一率相减得三七六四七八九為二率半外角之正切線一一八五八九五二為三率求得四率三六九一四九為半較角之正切線檢表得一十五度三分四十二秒次均數置半外角减半較角得一宮四度四十六分五十四秒五十𢕄星距日九宫後其號為减本道實行置初實行依號次次均數得五宫一十七度三十三分五十一秒五十一𢕄距交實行置初實行减正交平行得一宫二度二十分四十秒二𢕄升度差以距交實行宫度察所對之升度得四十七秒其號為减黃道實行置本道日行依號减升度差得五宫一十七度三十三分四秒五十一𢕄星距黃道線以距交實行宫度察所對之星距黃道數得一七一一三三其號為北星距地心線以次均數之正弦五七四五四八為一率次輪實半徑六五七九六四為二率星距日次引之正弦四七一七三為三率求得四率五四一五八五視緯以星距地心線為一率星距黃道緯為二率次輪心距地為三率求得四率三二四七四一為視緯之正弦檢表得一度五十一分三十九秒二十八𢕄
