body:
  text: 句自乘得句實四百四十一丈股弦和自乘得和實三千九百六十九丈相併得四千四百一十丈為實倍和六十三丈作一百二十六丈除之得三十五丈為弦假如股二十八丈句弦和五十六丈求弦股自乘得股實七百八十四丈句弦和自乘得和實三千一百三十六丈相併得三千九百二十丈為實倍和五十六丈作一百一十二丈除之得三十五丈為弦假如句二十一丈股弦和六十三丈求股以句實四百四十一丈减股弦和實三千九百六十九丈餘三千五百二十八丈倍和作一百二十六丈除之得二十八丈為股假如股二十八丈句弦和五十六丈求句以股實七百八十四丈减句弦和實三千一百三十六丈餘二千三百五十二丈為實倍和一一二除之得二十一丈為句假如弦三十五丈句股積二百九十四丈求句股較弦自乘得弦實一千二百二十五丈减四句股積一千一百七十六丈餘四十九丈為實
