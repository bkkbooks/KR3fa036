body:
  text: 而比例等內外兩方直形有平立諸線不內不外兩方直形有平立諸線成大小四方錐亦皆為相似之底而比例等黃道在斜平面赤道在平面而其綫互居者以方直形故也大距度在立面距緯度在斜立面而其線畢具者亦以方直形故也盖形既方直則横線直線兩兩相對而等法從二至起算以兩弧求一弧又或以三弧求一弧斜平面比例為黃道半徑與黃道正弦若距緯割線與赤道正弦又為黃道半徑與黃道切綫若大距割線與赤道切線平面比例
