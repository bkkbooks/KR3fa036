body:
  text: 四度四十七分三十二秒一十八𢕄之正切四六一九一相乘退七位得二九九九六七九為地經正弦檢表得距𫑗一十七度二十七分二十秒十二𢕄三十六纎有赤地大距及地經求距地平法為半徑與大距正切若地經正弦與距地平正切簡法省一率以大距正切與地經正弦相乘得數退七位即距地平正切設赤地大距五十七度地平經一十七度二十七分二十秒十二𢕄求地平緯以五十七度之正切一五三九八六五與地經正弦二九九九六七九相乘退七位得四六一九一檢表得距地平二十四度四十七分三十二秒一十八𢕄求日出入地平時刻法以半徑為一率北極出地度之正切為二率本節黃赤距緯之正切為三率求得四率為距𫑗酉正之正弦檢表得度化時南加北减得日出時刻南减北加得日入時刻今設以北極出地三十三度推之
