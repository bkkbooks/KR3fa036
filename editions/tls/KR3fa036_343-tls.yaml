body:
  text: 兩極俱切地平則其經緯正如此形其赤道圈即作天頂規其外周大圈即作地平規也立圓旁視圖平圓從內視外變㘭為平立圓從外視內抑突為平從外視內者其法如置身天表遥瞩渾球之外面則球面之經緯度分位置一一分明其中心為渾員心亦即二分之㸃其外周為子午規其中直線為𫑗酉規從𫑗中視之為東半天之形從酉中視之為西半天之形其經度用正弦分之其緯度用矢線分之經度惟𫑗酉規為直線餘悉弧度緯度悉變直線經度近𫑗酉者濶近子午者狹緯度近赤道者疎近兩極者密盖近目者平鋪而見大遠日者垜壘而見小視
