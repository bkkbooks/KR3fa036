body:
  text: 方形即甲乙丙戊方又作丁辛對角線次作甲辛戊辛兩斜線割原形之兩斜線于己于庚乃作己庚線即方邊若底上方形大則其徑亦大于對角線則如第二圖引丁辛線至子其理亦同有此二法則三邊並可為底若句股形以句為底即用乙丙句作丙辛庚乙方形從庚向丙作斜線割丁乙弦于壬從壬作癸壬甲壬二線即所容方或用股上方則引出句邊如股其法平分丙角則横直線自相等而成正方是容方亦用分角法也三角外切平員句股形外切平員之心在弦線中央故即以弦為徑以弦折半取心又法以圖算任于句或股平分之作十字正線此線過弦線之㸃即員心銳角形外切平員之心在形之內鈍角形外切平員之心在形之外其法任以兩邊各平分之作十字線引長之必相遇于一㸃即為員心鈍銳法同外切平員與容員之法不同者內容員之心即三角形之心其心能分各角為兩平分此分角求心之法所由以立也外切員之
