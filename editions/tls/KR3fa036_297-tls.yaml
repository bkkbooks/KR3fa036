body:
  text: 弦得癸外角七十一度三十分即甲乙邊求甲丙邊即次形寅角甲角一百二十度二正弦八六六二五四相乘得八六二七丙甲八十五度二正弦九九六一九四七二七四一三四六七五以半徑一除之得數八六二七二七四為一率半徑一為二率甲丙兩角相較三十五度正矢一八八四七九相較得數四七乙外角七十度矢六五七九七九八七一三一九為三率求得甲丙邊半周餘度之矢五五三二一三為四率檢表得六十三度二十七分以减半周得甲丙邊一百一十六度三十三分求乙丙邊即次形丑角丙角正弦九九六一九四九相乘得數半徑除之乙角正弦九三九六九二六得數九三六一一六七為一率半徑為二率丙乙兩角較二十五度矢九三六九二一與甲外角六十度矢五相較得數四六三七九為三率求得
