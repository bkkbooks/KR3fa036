body:
  text: 太隂平儀髙弧定時圖太隂南行北行其南緯北緯既分兩種似不可以一圖𥁞之而惟平儀之法一圖可當兩圖如圖上為天頂下為地底中為地平南為南緯北為北緯為南行兩種赤緯若倒用之以天頂作地底以地底作天頂以南緯作北緯以北緯作南緯又為北行兩種赤緯既隨時測得髙弧則以赤緯求赤經而得太隂所臨
