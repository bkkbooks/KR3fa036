body:
  text: 一分之餘切也如轉求正弦餘弦則二三率相乘所得九一七一七六之數不動以餘切二二八三四七五八除之亦得正弦三九八四八二三二三率相乘所得三九八四八二三之數亦不動以正切四三四四六六六除之亦得餘弦九一七一七六又以正弦餘切相乘以半徑一千萬除之亦得九一七一七六為餘弦餘弦正切相乘以半徑一千萬除之亦得三九八四八二三為正弦又凡四率中有半徑者只用進退七位可省一率以正弦除餘弦得數二二八三四七五八進七位即是餘切以餘弦除正弦得數四三四四六六六進七位即是正切以餘切除餘弦得數亦進七位而得正
