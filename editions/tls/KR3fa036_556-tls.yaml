body:
  text: 然其餘各度相距不同自初出地平至午正其度漸髙過正午至將入地平其度漸下以距午之度定之偏東偏西度等其髙下亦等既入地平之後未出地平之先赤道在地平之下其距地平之度與在地平之上亦等故一象限可當半周之用半周又可當全周之用循環推之可也
