body:
  text: 四九八三三檢表得五十二度四十六分二十秒春分後减象限得距春分赤經三十七度一十三分四十秒夏至後加象限得距春分赤經一百四十二度四十六分二十秒又或黃赤俱為南緯則秋分後减三象限得距春分赤經二百一十七度一十三分四十秒冬至後加三象限得距春分赤經三百二十二度四十六分二十秒又設赤道北二十度黃緯南三度甲數乙數並同黃緯正弦五二三三六加乙數三一三六九二六得三六六二八六為中數為實以甲數三七四四五八除之進七位得九七七五一五三檢表用中比例求之得一十二度一十分二十六秒三十𢕄减象限得七十七度四十九分三十三秒三十𢕄為春分後度加象限得一百二度一十分二十六秒三十𢕄為夏至後距春分度又或赤緯南二十度黃緯北三度則所得度分秋分後减三象限得距春分二百五十七度四十九分三十三秒三十𢕄冬至後加三象限得距春分二百八十二度一十分二十六秒三十𢕄
