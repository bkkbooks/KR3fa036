body:
  text: 十六度二十二分大寒小雪南緯小滿大暑北緯各距二十度十一分小寒大雪南緯芒種小暑北緯各距二十二度三十八分冬至南緯夏至北緯各距二十三度二十九分今更推各節氣後距緯整度列表以備測量之用較為簡明其有零分者查黃赤距度表用之不拘時刻求北極出地圖測北極出地簡法不拘何時刻但有地平髙度反方位即可得之先用所測髙度及方位位日于𥂟次用本日距緯作緯圈次從日位作通弦切緯圈而過次
