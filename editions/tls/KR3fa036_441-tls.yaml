body:
  text: 星距地數與半徑相减得四三二八九一為最小兩心差兹用土星兩心差作撱圓以見例其餘俱可按本天之兩心差為之九重天渾圓本象圖舊法用諸輪藉以推歩度數實皆假設而非實有新法用撱圓亦假設以便推歩耳愚者信以為真則誤矣西人創蛋形圖或謂本於古人天如雞子之説不知雞子之喻取地在天中之象非取其撱圓也盖物極圓則能自動撱圓則不可運行矣故撱圓藉以推歩而本象仍為渾圓不可易也渾圓古謂九重西人分其髙下月天最下宗動天最髙如圖中一㸃為地球其徑二萬四三三三里外一層為月天去地心八十四萬四六九一里又外一層為水星天又外一層
