body:
  text: 假如股弦較七丈句弦較十四丈求句股弦二較相乘得九十八丈倍之得一百九十六丈開方得十四丈為弦和較加句弦較十四丈得二十八丈為股加股弦較七丈得二十一丈為句以句弦較加句以股弦較加股並得三十五丈為弦假如股二十八丈弦和和八十四丈求句弦和較股實七百八十四丈以股二十八丈减弦和和八十四丈餘五十六丈即句弦和為法除之得十四丈為句弦較與句弦和相减餘四十二丈折半得二十一丈為句與句弦和相加得七十丈折半得三十五丈為弦假如股二十八丈弦較較二十八丈求句弦和較股實七百八十四丈以股併弦較較得五十六丈即句弦和為法除之得十四丈為句弦較與句弦和相减折半得句相加折半得弦假如句二十一丈弦和和八十四丈求股求弦句實四百四十一丈以句减弦和和得六十三丈即股弦和為法除之得七丈為股弦較與股弦和相加折半得三十五丈為弦相减折半得二十八丈為股
