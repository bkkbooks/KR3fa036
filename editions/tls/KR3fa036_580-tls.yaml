body:
  text: 一識於午線之左右然後自北極向赤道上時刻㸃一一作斜直線得本地之時刻次用節氣線之赤道線合於天頂距赤道之割線察赤道南北緯線臨於午正線上者識之得午正節氣㸃北極㸃永不移動但移赤道線合於天頂距赤道午正左右各時刻之割線察赤道南北緯線臨於各時刻線上者又逓識之得各時刻節氣㸃循其節氣㸃而一一聨之成曲線得本地之節氣用法立表于地心上指天頂北則斜對北極南則斜對赤道察表端之影所到之節氣線定本地之南北方向察表端之影所到之時刻線定本地之時刻兹用𥂁城度數為之以見其例其餘各處悉倣此法以得各處時刻也旁面日晷圖旁面日晷作兩立面東面向東西面向西作法于近南作直線上指天頂下指地心近上作横線與地平相應兩線相交之䖏為表位即二分𫑗正之㸃於兩線問作象限弧自下起數至本地北極出地度止自此向𫑗正㸃作斜直線以分弧度此線即為赤道任用横表之長為切線四十五度之底定尺逓取十五度切線向赤道線累加之作識定時細分每刻則逓
