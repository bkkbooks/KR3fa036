body:
  text: 二十四秒化作一百四十四秒為二率距日加差一分三十八秒化作九十八分為三率求得四率一分二十六秒為距日加分交角加分距日加分一分二十六秒與距交加分二分七秒相加得交角加分三分三十三秒黃白大距置最小距限四度五十九分三十五秒與交角加分三分三十三秒相加得黃白大距五度三分八秒升度差用月距正交一十八度一十分一十七秒一𢕄查記升度差三分五十二秒較秒二十八秒乃以距限大較一十七分四十五秒化作一十六十五秒為一率較秒二十八秒為二率交角加分三分三十三秒化作二百一十三秒為三率求得四率五秒三十六𢕄與所記之升度差三分五十二秒相加得三分五十七秒三十六𢕄為升度差號减黃道實行白道實行十一宫一十二度一十四分五十四秒三十六𢕄减升度差三分五十七秒三十六𢕄餘十一宫一十二度一十分五十七秒為黃道實行黃道緯度用月距正交一十八度一十分一十七秒一𢕄查記距緯一度三十三分一十八秒較分五分三十一秒乃以距限大較一十七分四十五秒化作一千六十五秒為一率較分五分三十一秒化作三百三十一秒為二率交角加分三分三十三秒化作二百一十三秒為三率求得四率一分六秒一𢕄與所記距緯相加得一度三十四分二十四秒一𢕄為黃道緯度
