  text: 太陽赤道經度求得地平緯度即知五星在地平上之伏見也用距等圈弧矢求列宿地平度圖列宿赤道經緯與黃道經緯不同而有黃道經緯可以求赤道經緯地平經緯又與赤道經緯不同而有赤道經緯亦可以求地平經緯其法依本地北極髙度安置北極赤道即得赤道距天頂度安置天頂地平各作十字經緯線求列宿度依赤道南北緯度作
