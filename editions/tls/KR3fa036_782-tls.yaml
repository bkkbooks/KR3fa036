body:
  text: 實次均以三千六百秒為一率較分化五千五百一十四秒為二率中分化二千七百二十五秒為三率求得四率四千一百六十七秒以度分收之得一度九分二十七秒為加差與次均相加得實次均四十六度二十分四十四秒黃道實行置初實行依號减實次均得初宫一十四度二十六分四十三秒一十𢕄距交實行置初實行减正交平行得八宫一十一度四十七分四十二秒一十六𢕄距次交實行以伏見實行與距交實行相加得初宫二十一度五十分五十八秒一十五𢕄星距黃道線以距交實行宫度察所對之星距黃道數得一六一五八九其號為北星距地以伏見實行宫度察所對之星距地得七八二七距地差以引數宫度察所對之距地差得二一六七六星距地用數置星距地减距地差得七五八五三一視緯以星距地用數為一率星距黃道線為二率半徑為三率求得四率二一三二六為視緯之正弦檢表得北緯一度一十三分一十四秒
