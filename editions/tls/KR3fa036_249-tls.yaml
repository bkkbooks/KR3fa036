body:
  text: 一甲角正弦半徑九十度一二乙角正弦黃赤大距二十三度二十九分三九八四三七八三乙丙正弦黃經四十五度七七一六八四丙甲正弦距緯檢表得一十六度二一五七二八一七三八有甲角乙角丙甲邊求乙丙邊一乙角黃赤大距二十三度二九三九八四三七八二丙甲距緯一十六度二一五七二八一七三八三甲角九十度同半徑過極經圈正交赤道之角一四乙丙檢表得黃經四十五度七七一六八有甲角丙角乙甲邊求乙丙邊乙丙角過極經圈斜交黃道之角七十二度五五二一九五五九八二乙甲赤經四十二度三一三五六七五九二九六三甲角九十度過極經圈正交赤道之角一四乙丙黃經得四十五度七七一六八有乙角丙角丙甲邊求乙甲邊一乙角大距二十三度二九三九八四三七八二丙甲距緯一十六度二一五七二八一七三八三丙角黃交角七十二度五五二一九五五九八七四乙角赤經四十二度三一三五六七五九二九六有乙丙邊丙甲邊甲角求乙角
