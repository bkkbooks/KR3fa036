body:
  text: 解經一六經之中典禮制度地輿人物前人言之詳矣獨於天文歴數未免缺畧儒者通天地人以格物窮理為事顧於天文歴數之大茫然不觧而猶謂此小道不足學也豈不誤哉予幼時讀書於堯典月令中星周禮土圭之類亦茫然不知為何物迨後肆意經學渉獵百家之書而後昔日之疑漸釋以是知天文歴數之學固儒者事也作觧經北辰居其所朱註云北辰北極天之樞也盖本爾雅北極謂之北辰讀者以為北極即北辰矣及觀朱子語類謂北極星離天之不動處猶一度有餘此語盖本隋書天文志祖暅所測宋史天文志沈括渾儀議云攷騐極星更三月而知天中不動處遠極星三度有餘元史郭守敬所測仍三度竒而宋邵諤鑄儀於臨安已去極星四度有竒諸家所測異於爾雅爾雅是則諸家非諸家是則爾雅非矣且諸家所測或近或遠而宋時邵諤所測在元郭守敬之先而其度較遠又何以故
  hash: sha256:3cf27df8b36b24a22783ee247edbcd2a3cb79572fe064a65d67b17f7a9cbf732
