body:
  text: 法以半徑為一率北極出地度之正割為二率赤道緯度之正弦為三率求得四率為地平經度之正弦即地平方位南北加减得日出入偏於正𫑗酉之方位今亦以北極出地三十三度推之北極髙三十三度求日出入方位設冬至求日出入方位法以北極髙三十三度之正割一九二三六三三與黃赤大距三九八四八二三相乘退七位得四三五二八七四為地平經度正弦檢表得二十五度四十八分一十二秒一十八𢕄向南加之得𫑗正偏南二十五度四十八分一十二秒一十八𢕄為日出方位酉正偏南二十五度四十八分一十二秒一十八𢕄為日入方位又設清明求日出入方位法以一九二三六三三與清明距緯五度五十五分一十一秒之正弦一三一三四九相乘退七位得一一二六六七為地平經度正弦檢表得六度二十八分七秒一十八𢕄向北加之得偏北六度二十八分七秒一十八𢕄為日出入方位
