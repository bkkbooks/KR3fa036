body:
  text: 春分日𨇠戌宫初度秋分日𨇠辰宫初度正當黃赤交㸃而無距緯其時日之髙度即赤道之髙度也以赤道之髙度與九十度相减得赤道距天頂之度亦即北極出地之度也假如𥂁城春分正午測得日髙五十七度即赤道髙五十七度也與九十度相减得赤道距天頂三十三度即北極出地亦三十三度也各節氣測北極髙度圖春秋分無距緯即以日髙為赤道之髙其餘節氣則加减其距緯以得赤道之髙春分後秋分前距緯在北用减秋分後春分前距緯在南用加然後與九十
