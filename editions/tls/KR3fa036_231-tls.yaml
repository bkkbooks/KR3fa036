body:
  text: 前二句股形在癸丁大距弧內外癸己𫑗用正餘弦在弧內戊丁𫑗用割切線出弧外後三句股形在丙乙甲三角內外丙辛壬在丙角用兩正弦在渾圓內子甲丑在甲角兼用正弦切線半在內半在外酉未乙用兩切線在渾圓外用法假如有丙乙黃道距春分之度求其距緯丙甲法為半徑癸𫑗與乙角之正弦癸已若丙乙黃道之正弦丙壬與丙甲距緯之正弦丙辛也丙乙黃道距春分四十五度求距緯丙甲一率癸𫑗一二率癸己三九八四三七八三率丙壬七七一六八四率丙辛二八一七三八檢表得丙甲一十六度二十一分五十七秒若先有丙甲距度而求丙乙黃道距春分之度則反用之為乙角之正弦癸已與半徑癸𫑗若丙甲距緯之正弦丙辛與丙乙黃道之正弦丙壬也丙甲距緯一十六度二十一分五十七秒求丙乙黃道
