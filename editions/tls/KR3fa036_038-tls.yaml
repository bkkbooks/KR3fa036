body:
  text: 解經二説卦傳五行四時後天八卦之序㩀太極既分之後播五行於四時也説卦傳帝出乎震一節言五行分旺四時之義震巽二木主春故震在東方巽東南次之離火主夏故為南方之卦兑乾二金主秋故兑為正秋乾西北次之坎水主冬故為北方之卦土旺四季故坤土在夏秋之交為西南方之卦艮土在冬春之交為東北方之卦木金土各二者以形王也水火各一者以氣王也坤隂土故在隂地艮陽土故在陽地震陽木故正東巽隂木故近南而接乎隂兑隂金故正西乾陽金故近北而接乎陽其序甚明自禄命家謂地支中各有所藏亥中兼藏甲木寅中兼藏丙戊已中兼藏戊庚申中兼藏壬戊又直以辰戌丑未為土而五行之理遂亂不知亥子丑為北方水寅𫑗辰為東方木己午未為南方火申酉戌為西方金天地一定之至理也焉得復藏其他乎惟辰戌丑未因天地中氣之所寄故為土然土所占者三之二耳其一原是本方之氣到土位方作土論不到土位北原是水東原是木南
