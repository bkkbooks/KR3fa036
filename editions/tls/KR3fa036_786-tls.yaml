body:
  text: 黃道實行置初實行依號加實次均得一宫二十六度二十七分二十一秒一十一𢕄距交實行置初實行减最髙平行得二宫一十八度五十六分一十七秒一十五𢕄距次交實行以伏見實行與距交實行相加得二宫一十九度一十六分二十五秒五十六𢕄在黃道北實交角以距交實行宫度按用北距限表察所對之度分秒得五度三十九分二十二秒星距黃道線以距次交實行宫度察所對之星距黃直數得三二四七五三星距地以伏見實行宫度察所對之星距地得一四五三二一三七距地差以引數宫度察所對之距地差得六九九二六二星距地用數置星距地减距地差得一三八三二八七五視緯以星距地用數為一率星距黃道線為二率半徑為三率求得四率二三五四九一為視緯之正弦檢表得一度二十分五十八秒為北緯
  hash: sha256:4ba80f8f9417fce4140a0be75b96d34aa3dc62b481fab0bc0adbc7a04a755be1
