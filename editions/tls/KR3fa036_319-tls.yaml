body:
  text: 行運於虛䖏則必不可無樞軸若撱圓之球則只可平轉兩頭竟為無用又無斜升斜降証以天象東西有差南北度髙度不變亦有可通而天為横雞子形不得為立雞子形𡮢觀九章算術引張衡之言立方為質立圓為渾知渾天之名本取立圓非取於撱圓乃悟雞子之喻取黃在白中若地在天中非取撱圓形似又觀梅氏書云圖弧角於平面必用視法變渾為平平置渾儀從北極下視則惟赤道為外周不變而黃道斜立即成撱形又悟最外之天仍為渾圓而七政天為撱圓亦視之若撱而非真撱也撱圓名義太陽之行有盈縮由於本天有髙卑其説一為不同心天一為本輪而不同心天之兩心差即本輪之半徑第谷用本輪以推盈縮差其髙卑又止及兩心差之半故又用均輪以消息之刻白爾以來屢加精測最髙前後本輪固失之小均輪又失之大最卑前後本輪固失之大均輪又失之小乃設本天為撱圓以兩心差一六九為勾平圓半徑一千萬為弦求得股九九九八五七一小餘八四八一九一即撱圓之小半徑而凡撱圓之正弦角度面積與平圓
