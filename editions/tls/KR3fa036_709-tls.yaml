body:
  text: 用中比例求得赤北緯二尺七分二秒四十八𢕄黄經距春分十度黄緯南十度一率半經二率距春分十度正位一七三六四八二三率甲數三九二四二八四四率中數乙數一五九二六六轉以中數六八四四四减之餘九一二二一六用中比例求得赤南緯五度十四分一秒四十八𢕄設黃道距春分三十度黃緯北六十度縂弧八十三度二十九分正弦九九三五三八八較弧三十六度三十一分正弦五九五五六六兩正弦相减三九八四八二二折半一九九二四一一為甲數甲數轉减縂弧正弦餘七九四二九七七為乙數法為半徑與距春分三十度之正弦若甲數與中數之正弦用四率求得黃弦距赤為中數止得九九六二一小於乙數乃以乙數加中數得八九三九一八八用中比例算之得赤北緯六十三度二十二分十一秒三十六𢕄零六纎又設黃道距春分三十度黃緯南六十度甲數乙數四率中數並同但以中數轉减乙數
