body:
  text: 一率癸己三九八四三七八二率癸𫑗一三率丙辛二八一七三八四率丙壬七七一六八檢表得丙乙四十五度假如有甲乙赤道同升度求距緯丙甲法為半徑𫑗丁與乙角切線丁戊若甲乙赤道正弦甲丑與丙甲距緯切線子甲也甲乙赤道同升四十二度三十一分三十五秒求距緯丙甲一率𫑗丁一二率丁戊四三四四六六六三率甲丑六七五九二九六四率子甲二九三六六八二檢表得丙甲一十六度二十一分五十七秒若先有丙甲距緯而求甲乙赤道則反用之為乙角之切線戊丁與半徑丁𫑗若丙甲距緯之切線子甲與甲乙赤道之正弦甲丑也丙甲距緯一十六度二十一分五十七秒求甲乙赤道
