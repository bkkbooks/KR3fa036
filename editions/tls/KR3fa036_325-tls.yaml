body:
  text: 己乙辰角正切之比亦必同於壬乙與戊乙之比故以壬乙一千萬為一率戊乙九九九八五七一小餘八五為二率𫑗乙辰角六十度之正切一七三二五八為三率求得四率一七三一八三四為已乙辰角之正切檢表得五十九度五十九分四十七秒即己乙辰角而𫑗乙己角一十三秒為撱圓差角又設已甲辰角六十度五十分三十二秒求𫑗甲辰角試以甲辰為半徑作弧則己辰為己甲辰角之正切𫑗辰為𫑗甲辰角之正切夫𫑗辰與己辰之比既同於壬乙與戊乙之比則己辰與𫑗辰之比必同於戊乙與壬乙之比而已甲辰角之正切與𫑗甲辰角正切之比亦必同於戊乙與壬乙之比故以戊乙九九九八五七一小餘八五為一率壬乙一千萬為二率己甲辰角之正切一七九二三八九七為三率求得四率一七九二六四五七為𫑗甲辰角之正切檢表得六十度五十分四十五秒即𫑗甲辰角而𫑗甲己角一十三秒為撱圓差角是平圓與撱圓角度之比例亦同於大徑與小徑之比例也求撱圓面積凡平圓面積與撱圓面積之比例同於平圓外切正
