body:
  text: 推歩一厯法之煩必以算法御之用算法則有徑可以知周有周弧可以知畸零之弧有弧線可以知弦矢有弦矢可以知各線有已知之線可以求未知之線有此弧己知之線可以求他弧未知之線有經可以求緯有緯可以求經有黃可以求赤有赤可以求黃有赤道可以求地平有地平可以求赤道有現在之度可以求千𡻕以上之度有現在之度亦可以求將來之度天象萬變而皆以算法御之此推算所以為厯家之要務也述推歩歩八線求周徑密率割圓舊術屢求句股湏開數十位之方今用杜德羙法以圓內六等邊别立乘除之數以求之頃刻可得先將一三五七九等數各自乘為屢次乘數如一自
