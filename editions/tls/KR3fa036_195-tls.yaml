body:
  text: 邊之弦線三二七二四以九六乘之得三一四一五四三百八十四邊之弦線一六三六二三五以一九二乘之得三一四一五七一二所得之三一四一五為確數而以下猶未真也後觀西術以五一五三九六七五五二邊求得周弧三一四一五九二六五三五八九七九三二三八四三一五四一五五此數是從六邊逓析三十三次凡用句股相求六十四𥂟而後得者求周至此二十七位誠可謂至確之數矣第以位數太繁仍宜截去尾數但用前八九位為常率庶幾便於推歩焉耳既得徑周密率則有徑可以求周有周可以求徑有徑有周可以求積圓徑一則周三一四一五九二六五有徑數求周者以三一四一五九二六五乘徑數得之圓周一則徑三一八三九八八有周數求徑者以三一八三九八八折周數得之圓徑一周三一四一五九二六五以周徑相乘四歸得七八五三九八一六三三七五為積或以周徑各半相乘得數亦同圓周一徑三一八三九八八以周徑相乘四歸得七九五七七四四七九七八或以周徑各半相乘得數又簡法以七八五三九八一六三三
