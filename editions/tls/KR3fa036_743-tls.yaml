body:
  text: 六八七八四為中數在立春節宜以中數與乙數相减餘五四三四一六四為地平上緯度正弦查表得三十二度五十四分五十九秒二十四𢕄三十纎有亦道緯地平緯求赤道經設立春赤道南緯十六度二十一分五十七秒地平上緯三十二度五十四分五十九秒轉求赤經則以甲數為一率中數為二率半徑為三率求得四率為赤經正弦簡法即以甲數八四六八九四除中數六九六八七八四除畢進七位即得八六六二五四為赤經距午餘弦檢表得距午三十度有赤道緯地平緯求地平經
