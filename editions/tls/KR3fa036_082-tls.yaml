body:
  text: 至日𨇠星紀夏至日𨇠鶉首春分日𨇠降婁秋分日𨇠夀星今之星紀箕也龍而非武今之鶉首参也虎而非鳥今之降婁壁也武而非虎今之夀星翼也鳥而非龍厯年既多𡻕差益遠左不必龍而龍非青右不必虎而虎非白前不必鳥而鳥非朱後不必武而武非元名實不既紊乎竊謂日𨇠星紀云云以無形之宫度言之語赤道則為宗動之位語黃道則為日輪之天而二十八宿之分布四方者又别於列宿天自成宫度而與赤道黃道之宫度論其相入之淺深相距之遠近庶幾其並行而不悖乎十月之交朔日辛𫑗日有食之李氏觧此章引唐書志云以厯推之在幽王之六年今以時憲法推之自雍正癸𫑗歴元上至幽王六年乙丑積二千四百九十八年以積年與周𡻕三百六十五日二四二三三四四二一四一五八三三相乘得中積分九十一萬二千三百七十二日三五一三八一五一三四八七七九八三四减氣應三十二日一二二五四得通積分九十一萬二千三百四十日一二八八四一五一三四八七七九八三四滿紀法六十去之餘四十零日一二八八四一五一
