body:
  text: 以消息其數刻白爾更以撱圓分其面積以求盈縮而髙卑前後盈縮之數乃俱與實測相符自最髙至最卑六宫為縮厯為减差自最卑至最髙六宫為盈厯為加差最卑前三宫與後三宫相當最髙前三宫亦與後三宫相當其差數皆相等太陽一小時之實行盈極於二分三十三秒縮極於二分二十二秒中距復於平行二分二十七秒五十一𢕄以差數加减平行而得實行即以差數加减恒氣而得定氣矣赤道變時表古法一日百刻每刻作六十分每時有八刻又零二十分作二小刻今法止用九十六刻以八刻為一時又分一日為二十四小時以四刻為一小時每時若六十分每刻十五分每分六十秒每秒六十𢕄赤道
