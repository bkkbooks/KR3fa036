body:
  text: 一道耳以其斜交赤道言之則十二月分之為七衡即七道也二十四氣分之又為十三道也七十二候又各不同故前人又以七十二道言之大抵春秋分時黃與赤交黃道即赤道也春分後秋分前則在赤道之北秋分後春分前則在赤道之南去分一氣距赤道五度五十五分去分二氣距赤道十一度三十分三氣距十六度二十二分四氣距二十度十一分五氣距二十二度三十八分六氣即冬夏至距二十三度二十九分距至後又一氣近似一氣轉回向赤道矣此日之道也古分月道為九以黃道內為隂歴外為陽歴冬入隂歴夏入陽歴月行青道冬至夏至後青道半交在春分之宿當黃道東立冬立夏後青道半交在立春之宿當黃道東南至所冲之宿亦如之冬入陽歴夏入隂㦄月行白道冬至夏至後白道半交在秋分之宿當黃道西立冬立夏後白道半交在立秋之宿當黃道西北至所冲之宿亦如之春入陽歴秋入隂厯月行朱道春分秋分後朱道半交在夏至之宿當黃道南立春立秋後朱道半交在立夏之宿當黃道西南至所冲之宿亦如之春入隂厯秋入陽厯月行黑道春分秋分後黑道半交在冬至之
