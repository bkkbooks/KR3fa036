body:
  text: 黃道細分經度其疎密與赤道逈異而即可以赤道經度定之其法先以北極為心平分赤道經度次取距北極二十三度二十九分為黃極再加二十三度二十九分為黃道規樞運之成黃道規次從黃極向赤道上所平分之經度逐度作直線透出黃道規外即得黃道規上不平分之經度前用地心横線作弧線得黃道全經圈此借赤道經度作直線亦可徑求黃道上之經度所得並同而法尤簡黃赤升度表
