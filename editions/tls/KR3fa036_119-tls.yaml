body:
  text: 如此者句股名義横者為句縱者為股斜者為弦或以短邊為句長邊為股斜邊為弦又有正方形句股同長是為無較之句股但隨縱横之勢以為句股句股相併之數曰句股和句股相减之差曰句股較股弦相併口股弦和句弦相併曰句弦和句股弦相併曰弦和和句股之差併弦曰弦較和股弦之差曰股弦較句弦之差曰句弦較併句股與弦相减之差曰弦和較弦與句股之差相减其差曰弦較較又有句和和股和和即弦和和也同是句股弦三者之總數也又有句和較股較和即弦較和也弦較和是一弦一句股較而句和較是股弦和中少一句亦一弦一句股較股較和是一股一句弦較分句弦較之股弦較加股得一弦餘一句股較故三者之數並同也又有句較較股較較即弦和較也弦和較是句中少股弦數股中少句弦數而句較較是句中去股弦較股較較是股中去句弦較故三者如一也又有股和較句較和即弦較較也弦較較是一句一股弦較而股和較是句弦和中去一股餘一句一股弦較句較和是一句一股弦較
