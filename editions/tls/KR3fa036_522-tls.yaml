body:
  text: 二分偏東二十九分山西髙三十七度五十三分偏西六度二十七分陝西髙三十四度十六分偏西十度三分甘肅髙三十七度偏西十五度三十分湖北髙三十度三十四分偏西四度四十七分湖南髙二十九度偏西六度三十分廣東髙二十三度十分偏西六度三分廣西髙二十五度十三分偏西八度四十四分四川髙三十度四十一分偏西十四度四十六分雲南髙二十五度六分偏西十六度七分貴州髙二十六度三十分偏西十二度二十二分赤道上加地平經度圖赤道分三百六十度地平亦分三百六十度以北極為心分各䖏地平經度法從赤道酉中上數本地北極出地之數對𫑗中作斜線得天頂規倍加出地之數得地平規樞運之成地平規上為南地平下為北地平交於𫑗酉之中者為東西地平又從赤道酉中下數本地北極出地之數作斜線過子午直線得地底折半得天頂規樞運之成天頂規上為天頂下為地底中為地心天頂規即地平𫑗酉規規樞作地心横線用切線作規於天頂規之內外得地平三百六
