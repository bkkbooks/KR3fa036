body:
  text: 閭盧掩月圖影半徑最大者四十六分五十一秒月半徑最大者一十六分四十八秒相併得六十三分三十九秒以此數當距緯用最小黃白交角四度五十九分三十五秒求得距交白道度一十二度一十六分五十四秒為實望可食之限又以最大太陽均數一度五十六分一十三秒最大太隂均數七度三十九分三十三秒相併得九度三十五分四十六秒為兩實行相距最遠之度計月逐及于日太陽又行五十五分與太陽均數相加得一十五度九分為平望可食之限
