body:
  text: 太陽地平經緯㝎時圖氣線上所臨之時刻線即得現在某節氣中之何時何刻也太陽髙弧晷圖太陽髙弧之晷乃太陽在天之本象也天體本圓故以圓影測其度分其法範銅為圈上為天頂下為地底天頂之下位置地心為太陽透影之孔地心平對之處為地平線地平線上分十三直線為二十四節氣所值地平線至地底分九十緯度以九十緯度按太陽各節氣之髙弧㸃于十三直線即其所㸃者而聨之為午正前後時刻線圈用象限則以九十度為九
