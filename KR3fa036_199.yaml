body:
  text: 二百再展得徑二十又得倍積四百再展得徑二八二八四二七一二四七四六一八四又得倍積八百再展得徑四十又得倍積一千六百再展得徑五六五六八五四二四九四九二三六八又得倍積三千二百以一與一四一四二一三五六二三七三九二為比例截用前數位為常率逓加展方得數方圓相容平方內容平圓平圓內又容平方方率徑一圍三圓率圍三一四一五九二六五平方與所容之平圓其徑同其周若四與三一四一五九二六五也平圓與所容之平方其徑若一十與七七一六七八一其周若一十與六二八三一八五三也外平方與內平方其徑若一十若七七一六七八一其積若二與一也外平圓與內平圓其徑若一十與六二八三一八五三其積亦若二與一也方圓周徑相求同積較徑為方變圓圓變方之用凡方圓同積則圓
