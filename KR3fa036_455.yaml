body:
  text: 星則不然並以本天上平行度為歲輪心然其軌迹所到並於太陽有一定之距故又成繞日左行之圖象西人新圖五星並以太陽為心蓋以此也然金水歲輪繞日其度右移上三星軌迹其度左轉苦歲輪則仍右移耳土星能至甲木能至乙至丙又其自行之髙卑也火星兼論太陽髙卑要不能改其徑線相距之大致故五星以徑線距太陽終古如一火星天亦用太陽為心而沖日之處割入太陽天內乃歲輪上周行之迹耳非本天也其實歲輪之心仍係本天在太陽天外耳其有遲留逆伏者歲輪心正在太陽之上星又在歲輪之頂為合伏合伏以後星在歲輪上東移有類平轉故其東移速為疾歲輪心離日漸遠星在歲輪離合伏之度亦漸遠而向下行則東移之度漸遲歲輪心離日至一象限星在歲輪直向下行人自地觀之不見其動為留輪心距太陽益遠將至半周星行歲輪之底轉成向西行為退輪心與日沖星正居輪底為退沖自輪底西移而就日仍為退至于西距日一象限上行之勢又直人自地觀之亦
