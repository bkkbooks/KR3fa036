body:
  text: 分故黃極與北極相距亦二十三度二十九分如圖以北極為心平分三百六十度為赤道度從赤道酉中下數二十三度二十九分對𫑗中作斜線得黃極再加二十三度二十九分得黃道規樞運之成黃道規從赤道酉中上數二十三度二十九分又作斜線得黃南極折半得黃道全體規樞運之成黃道全體規即𫑗酉規規樞作地心橫線用切線作規於黃道規之內外得黃道三百六十度或以黃極為心平分黃道度用法加赤道度亦同赤道南故濶圖
