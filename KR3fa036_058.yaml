body:
  text: 璿璣玉衡治厯觀天之器也七政之行必紀於天之度而天度不離乎黃赤二道之經緯平分天腰者赤道也交於赤道以會於兩極者為赤經與赤道平行者為赤緯斜交赤道而出其內外者黃道也交於黃道以會於黃極者為黃經與黃道平行者為黃緯聖人為璿璣以象之為玉衡以窺之以察日之南北則節氣之早晚可辨以察日之出入則晝夜之永短可分以察月之周天與會日則晦朔弦望之期候可定至於五星之會日冲日而有合伏退望五星之近日遠日而有順逆遲留與夫日月五星之互相掩映而有交食凌犯俱可推步而不爽是即所謂齊也舜時之制不可考已厯代以來為法漸密今制為儀三重其在外者即古之六合儀而不用地平圈其正立雙環為子午圈兩面皆刻周天三百六十度自南北極起初度至中要九十度是為天經斜𠋣單環為天常赤道圈兩面皆刻周日十二時以子正午正常子午雙環中空之半而結於其中要是為天緯其南北二極皆設圓軸軸本實於子午雙環中空之間而軸向內以貫內二重之環其下承以雲座仰面正中開雙槽以受雙環東面正中開雲窩以受垂球下面置十
