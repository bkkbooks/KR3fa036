body:
  text: 句股釋例二三角名義西法用三角猶古法之用句股也但三角有鈍角而句股無之論者遂謂句股之術有所窮殊不知鋭角形須分為兩句股鈍角形須𥙷成句股邊角比例莫非句股也至於弧三角以直線測渾圓又於無句股中尋出句股也句股三角一而二二而一者也三角之形有三等邊有二等邊有三下等邊又有四邊形可析為兩五邊形可析為三六邊形可析為四以至多線成形析之皆可成三角至三角則無可析矣故三角能𥁞諸形之理三角形有㸃有線有面有體㸃如針芒㸃所在即角之端也自一㸃引而長之至又一㸃止則成線矣線有弧直二種弧線以一線成圓面直線必三線以上始能成面至面與面相得而成體或方或圓其形不一此四者皆三角法中之所有也而三角法所以異於句股者以用角也凡兩線相遇則成角角有三類一正方角一鋭角一鈍角以兩線十字縱橫相遇皆為正方角亦曰直角亦曰方角以兩線斜相遇則一為鋭角一為鈍角凡鋭角必小
