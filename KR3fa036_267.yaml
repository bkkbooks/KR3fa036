body:
  text: 于丁先求甲丁丙形諸數次丙丁戊虛形求到丙戊以減半周為乙丙先求到丁甲以虛線丁戊減之得戊甲即得乙甲先求到甲丙丁角內減丙虛角得丙外角即得原設丙角設乙甲丙形有丙鈍角有角旁之兩邊丙乙丙甲法用甲戊丙次形作甲丁垂線引丙戊會于丁先以甲丁丙形求到諸數再以甲丁戊虛形求甲戊即得乙甲又甲虛角減先得甲角成甲外角又戊虛角即乙外角設乙甲丙形有甲鈍角乙丙邊丙甲邊法用丙戊甲次形自丙作垂弧會甲戊線于丁求到甲戊即得乙甲求戊角即乙角以丙虛角減先得丙角即丙外角正斜弧三角並用次形正弧三角斜弧三角並有次形法而其用各有二其一易大形為小形則大邊成小邊鈍角成鋭角其一易角為弧則三角可以求邊亦二邊可求一邊正弧三角形易大為小用次形
