body:
  text: 四星距黃道表按兩交前後分順逆列之兩交後之各宫列於上初宮至二宫係正交後在黃道北六宫至八宫係中交後在黃道南其數同兩交前之各宫列於下三宫至五宫係中交前在黃道北九宫至十一宫係正交前在黃道南其數同四星距交實行在上六宫者用順度在下六宫者用逆度表用次輪心距黃道之數檢其正弦得距度分秒以定交角至角同邊異緯大於角視緯大於實緯南北又各有大小之異宜各用三角形推之
