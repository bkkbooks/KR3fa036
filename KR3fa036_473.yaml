body:
  text: 恒星布列周天古有去極入宿度數入宿即經度也去極即緯度也然黃道度與赤道度不同𡻕差亦異盖黃道以黃極為樞赤道以赤極為樞兩道兩極各相距二十三度半故星在兩極之間者黃道属未宫赤道則属丑宫星在兩道之間者黃道属緯南赤道則属緯北此黃赤不同之極致也恒星循黃道東行每年五十一秒緯度終古不改而經度之差有常赤道與黃道斜交分至前後南北遠近其差不等兩極之間在黃道為差而東在赤道為差而西兩交之際黃道南者差而入赤道北黃道北者差而出赤道南此𡻕差不同之極致也渾天圓體不可圖圖之於平面止見其半有從黃道剖分兩圖者有從赤道剖分兩圖者皆止見渾體之半黃道𡻕差有常推算用之其加减分數較易赤道𡻕差各星不同加减之法較煩而方位有定為測量之所用兹用赤道經緯為赤北赤南兩圖若兩半圓合面為一則見渾天全體即匾渾天儀之制也恒星位置盖天割圓圖
