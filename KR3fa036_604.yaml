body:
  text: 則見不問其距日遠近也黃道交于地平有正相交有斜相交合朔若在斜交之宫雖距日十三度或十五度而其髙于地平未及十二度不可見也合朔若在正交之宫則距日十三度而已髙于地平十二度即得見其光也或合朔在子而又行疾厯則朔日之夕可見矣或合朔在午後而又行疾厯則前月晦日之晨見之尤為常事不足異也日食求兩心視相距圖用簡平儀繪圖以本日地平髙下差為半徑作平圓即地徑當月天之度亦即地受日照之半面上應渾天半周圓心即日射地面至地心之㸃以人視日則人所處之地面即日影心以日照月則月所當之地面即月影心假令人所處之地面正在圓心則必見
  hash: sha256:0f0fe7c629f38613f03aec8dabed1c2652b303100cf2665adf8534f90032f94a
