body:
  text: 推步三步七政行度步日𨇠假如道光丁亥距根三十二日求太陽實行年根距冬至三十九分五十三秒五十九𢕄最卑九度五十六分四十四秒一十二𢕄日數三十二日平行一宮一度三十二分二十六秒三十二𢕄最卑行五秒三十一𢕄平行太陽平行年根日數相加得一宮二度一十二分二十秒三十一𢕄最卑平行九度五十六分四十九秒四十三𢕄引數置平行減最卑平行得初宫二十二度一十五分三十秒四十八𢕄均數以引數宫度分察所對之均數得四十四分五十三秒其號為加太陽實行置平行依號加均數得一宫二度五十七分一十三秒三十一𢕄
