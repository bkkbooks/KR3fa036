body:
  text: 正弧三角形圖一計三種甲形三角乙形角二足一鋭邊二足一小並十字正方三丙形角二正一鈍邊二足一大邊並足九十度此置正角在凸面與正角在邊者並一法以上三種不湏用算正弧三角形圖二丁形角一正二鋭鋭同度三邊並小同者計三種二戊形角一正二鈍鈍同度邊二大同度一小己形角一並一鋭一鈍其鈍鋭兩角成半周邊二大一小此正角在邊與前圖內一大邊與小邊成半周正角在面者同法後由辛壬形倣此以上正弧形三種有同度之邊與角謂之二等邊形內有已形雖無同等之邊角而有共為半周之邊角度雖不同而所用之正弦則同即同度也凡邊等者角亦等後倣此庚形角一正二鋭三邊並小並同丁正弧三角形圖三形而無等度辛形角一正二鈍邊計三種二大一小並同成形而共等度壬形
