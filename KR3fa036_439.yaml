body:
  text: 三五相加得一七九九二五為火星行次輪周距地心最髙之數與半徑相減得七九九二五為最大兩心差又用次輪心最卑與本數六三二七五相減得二五八四二五為火星行次輪周距地最卑之數與半徑相減得七四一五七五為最小兩心差金星次輪心在最髙距地心一一四三一一最卑九八五六八九次輪心在最髙初宫初度星距地心一七三六七九六與半徑相減得七三六七九六為最大兩心差次輪心在最髙六宫初度星距地心二九一八二六與最卑距地差二八六二二相減得二七三一八六為最卑星距地心之數與半徑相減得七二六八一四為最小兩心差水星次輪心在最髙距地心一六八二一一五在最卑距地心九五四七一九次輪心在最髙星行輪周距地初宫初度一四五三二一五五與半徑相減得四五三二一五五為最大兩心差六宫初度六八三二一五五與最卑距地差一一三五四六相減得五六九七一九為最卑
