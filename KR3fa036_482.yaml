body:
  text: 赤𢕄秒經分差赤𢕄秒緯分差黃道歲差五十一秒為恆星東行之數周天所同無有異者赤道歲差各星多寡之數不同且有加有减不能一致以其在兩極之間或在兩交之際也二十八宿距星無在兩極之間者故經度有加無减而有在兩交之際者故緯度有加有減也兹用經緯各差列表每年按數加减而赤道之度乃真赤道之度真而測量之用乃准焉
