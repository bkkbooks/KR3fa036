body:
  text: 解經一六經之中典禮制度地輿人物前人言之詳矣獨於天文歷數未免缺略儒者通天地人以格物窮理為事顧於天文歷數之大茫然不解而猶謂此小道不足學也豈不誤哉豫幼時讀書於堯典月令中星周禮土圭之類亦茫然不知為何物逮後肆意經學涉獵百家之書而後昔日之疑漸釋以是知天文歷數之學固儒者事也作解經北辰居其所朱注云北辰北極天之樞也蓋本爾雅北極謂之北辰讀者以為北極即北辰矣及觀朱子語類謂北極星離天之不動處猶一度有餘此語蓋本隋書天文志祖暅所測宋史天文志沈括渾儀議云考驗極星更三月而知天中不動處遠極星三度有餘元史郭守敬所測仍三度竒而宋邵諤鑄儀於臨安已去極星四度有竒諸家所測異於爾雅爾雅是則諸家非諸家是則爾雅非矣且諸家所測或近或遠而宋時邵諤所測在元郭守敬之先而其度較遠又何以故
  hash: sha256:654da4cec3dd43b95ebad8653716906db7863d8fa52e1b25000db3fb1291c558
