body:
  text: 黃道上加白道度圖黃赤大距恆為二十三度二十九分黃白距限則有大小之異大為五度一十七分二十秒小為四度五十九分三十五秒今約取五度整數為用黃赤交點恆在辰戌初度黃白交點則又隨時不同每日退行三分有竒每年退行十九度有竒至十九年有竒滿二百四十二交而遍於黃道之十二宫則又復其始今取現在𫑗宫四度為圖黃道宫度恆從丑初起數白道宫度每從交點所到之度起數交點移則宫度亦移今取現在𫑗宫四度為初宫初度黃道出入於
