body:
  text: 太陽全徑化秒為一率十分化作六百秒為二率併徑內减定真時兩心視相距餘化秒為三率求得四率為秒以分收之得食分若兩心視相距大於併徑則不食即不心算月升圖合朔日視太隂實行黃道度子宫一十五度當黃道之立春戌宫初度當黃道之春分酉宫一十五度當黃道之立夏未宫初度當黃道之夏至午宫一十五度當黃道之立秋辰宫初度當黃道之秋分𫑗宫一十五度當黃道之立冬丑宫初度當黃道之冬至自子宫一十五度至酉宫一十五度為正升自酉宫一十五度至未宫初度為斜升自未宫初度至寅宫一十五度為橫升自寅宫一十五度至子宫一十五度亦為斜升正升月體背正西而向正東斜升月體背西北而向東南橫升月體背正北而向正南
