body:
  text: 太陽股晷圖太陽股晷以所立之表為股地上之影為句即古人土圭遺法也作股晷法用平板先畫一横線為地心線線上分十三直線為二十四節氣線次用長短之影㸃於直線而聨之為時刻曲線立表於地心線上上指天頂表端之影所至為時刻近表者為午正午正前後以次漸長用法按節氣置表取太陽影正對直線察直線上曲線之界即得現在時刻也太陽股晷表𫑗初𫑗正辰初辰正巳初巳正午初午正冬至冬至小寒大雪大寒小雪立春立冬雨水霜降驚蟄寒露春分秋分清明白露穀雨處暑
