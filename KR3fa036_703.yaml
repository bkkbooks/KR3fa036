body:
  text: 求得距緯十一度二十九分三十三秒折半得一九九二四一一設黃道一十五度求距緯總弧三十八度二十九分正弦六二二二八七較弧八度二十九分正弦一四七五二一七相加得七六九八八七折半得三八四九四三求得距緯二十二度三十八分一十六秒以黃經黃緯求赤經赤緯黃赤二道經緯相求用斜弧三角形以星距黃極為一邊星距北極為一邊并兩極之距為三邊此本法也今不用距極度而用其餘度徑取黃緯為一邊二至之黃赤大距為一邊而取二邊之總較兩正弦為用加减得甲數乙數然後用四率算之乃簡法也凡星有黃緯之南北有黃經之南北黃經南北即南六宫北六宫若星之黃緯南北與黃經同者其赤緯南北亦與黃緯同法用四率乙數相加為緯度正弦若星之黃緯南北與黃經異者赤緯有同有異皆四率乙數相减為赤緯正弦而相减有二法但視乙數大受四率轉减者赤緯之南北與黃緯同若乙數小去减四率者赤緯之南北與黃緯異若星在黃道軸正當二分經度其角必九十度無餘弦亦無四率但以
