body:
  text: 轉與紀法六十相減餘為天正冬至日分一十九日八七一一五八四八加一日得紀日二十又置中積分減氣應餘分一二二五四加本年天正冬至分八七一一五八四八得積日九十一萬二千三百七十二日九九九九九九九九加朔應一十五日一二六三三得通朔九十一萬二千三百八十八日一二六三三以朔策二十九日五三五九五三除之得積朔三千八百九十六餘數一十一日一三一五四二為首朔以積朔與太隂交周朔䇿一十一萬四百一十三秒九二四四一三三四相乘得四萬三千一十七萬二千六百四十九秒五一四三七二六四滿周天一百二十九萬六千秒去之餘一百一十九萬六千六百四十九秒五一四三七二六四以宫度分收之為積朔太隂交周十一宫二度二十四分九秒三十六𢕄置首朔太隂交周應六宫二十三度三十六分五十二秒四十九𢕄與之相減得首朔太隂交周四宫八度四十七分一十六秒四十七𢕄首朔係幽王六年二月朔日加八箇月朔策得二百四十七日二四六三九六六又加紀日二十得二百六十七日二四六三九六六滿紀法六十去
  hash: sha256:f4425531e0164bca9851e5cb001c8df19c88f6e2f2fd55a57b9b41f7de1581c3
