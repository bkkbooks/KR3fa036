body:
  text: 實度必髙於視度又地平上䝉氣之差能升卑為髙則實度又必卑於視度測得視度减䝉氣差復加地半徑差始為實度䝉氣差漸髙漸小地半徑差惟恒星及土星木星無之以其距地遠也太陽地半徑差最髙為九秒五十𢕄最卑為十秒十𢕄中距為十秒不必立表其餘各曜多寡不同各宜按表推之䝉氣差表䝉氣差距地平近其數甚大漸遠則其數漸小用法測得七政或恒星髙度各依差數减之始得實髙假如測得髙四十度則察表中四十度所對之數為一分十秒與四十度相减餘三十九度五十八分五十秒為實髙也
  hash: sha256:a3d36e57a2241f361824c19bc4c0e783b4600081cd34095f681499a1f1b7362f
