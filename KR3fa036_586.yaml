body:
  text: 小滿日出卯初初刻四分四十五秒二十八𢕄日入酉正三刻十分十四秒三十二𢕄大暑芒種日出寅正三刻十二分八秒四十四𢕄日入戌初初刻二分五十一秒一十六𢕄小暑夏至日出寅正三刻九分二十六秒四十八𢕄日入戌初初刻五分三十三秒一十二𢕄夏至之髙下而遲早各異兹用鹽城北極髙三十三度推算日出日入之時刻列表他方當依髙度另推太陽出入時刻表二節氣前後每日出入不同兹又用鹽城北極出地三十三度推算日出日入之時刻列表用法先檢節氣距緯表察現在節氣後幾日距赤道南北幾度然後用距緯檢本表分南北推之察某度橫對之某刻某距緯一二三四五六七八九一二三四五六七八九一二三三一一一一一一一一一一二二二二二
