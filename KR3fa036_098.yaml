  text: 一度三分北十九度二十六分壁一戌宫六度四十四分北十二度三十五分奎一戌宫二十度北十五度十八分婁一酉宫一度三十二分北八度二十九分胃一酉宫十四度三十分北十一度十六分昴一二十六度五十九分北四度畢一申宫六度三分南三度觜一申宫二十一度十六分南十三度二十五分參一申宫二十二度十五分南二十五度二十分井一未宫二度五十二分南初度五十三分鬼一午宫三度十九分南初度四十八分柳一午宫七度五十三分南十二度二十七分星一午宫二十四度五十二分南二十二度二十四分張一已宫三度十七分南二十六度十二分翼一已宮二十一度二十一分南二十二度四十一分軫一辰宫八度十九分南十四度二十五分緯度終古不變經度每歲東行五十一秒赤道經緯當用黃赤經緯互推法推之赤道經度每歲各星遷改不同而緯度或加或減又因黃道斜絡之勢而度分多變動不居焉冬夏致日春秋致月以辨四時之敘鄭康成云冬至日在牽牛景長三尺夏至日在東井景尺五寸此長短之極極則氣至冬無愆陽夏無伏
