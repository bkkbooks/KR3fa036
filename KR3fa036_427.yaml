body:
  text: 舊法不同心天本輪均輪圖太陽之行有盈縮由於本天有髙卑春分至秋分行最髙半周故行縮而厯日聲秋分至春分行最卑半周故行盈而厯日少其說一為不同心天一為本輪而不同心天之兩心差即本輪之半徑故二者名雖異而理則同也第谷用本輪以推盈縮差惟中距與實測合最髙前後則失之小最卑前後則失之大又最髙之髙於本天半徑最卑之卑於本天半徑者非兩心差之全數而止及其半故又用均輪以消息乎其間而後髙卑之數盈縮之行與當時實測相合然天行不能無差第谷所定盈縮之最大差為二度零三分一十一秒刻白爾以來屢加精測盈縮之最大差止有一度五十六分一十二秒又以推逐度之盈縮差最髙前後本輪固失之小矣均輪又
  hash: sha256:71834d71d4e115e1809c3466f2ecf4b12d250eac5c51d0df1bdcdd6ef5c474b8
