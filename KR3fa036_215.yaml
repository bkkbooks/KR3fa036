body:
  text: 同角為相等形弧三角則但有相等之形而無相似之形以同角者必同邊也平三角但可以三邊求角不可以三角求邊弧三角則可以三角求邊平三角用八綫惟用於角弧三角用八線並用於邊平三角以角之八線與邊相比弧三角是以角之八線與邊之八線相比平三角有正角即為句股若正弧三角形實非句股而以其八線輳成句股平三角以角求邊是用弧線求直線也以邊求角是用直線求弧線也然角以八線為用仍是以直線求直線也句股法也弧三角以邊求角以角求邊是以弧線求弧線也而角與邊並用八線仍是以直線求直線也亦句股法也盖惟直線可成句股所不同者平三角所成句股形即在平面而弧三角所成句股不在弧面而在其內外測量家有㸃有綫有面有體弧三角備有之其所測之角即㸃也弧三角之邊即綫也弧三角之形即面也弧三角之所麗即渾體也渾圓內㸃綫面體與弧三角相應如渾球中剖則成平圓即面也以球面之各角依視法移于平圓面即渾圓內相應之㸃也又以弧與角之八線移至平面成句股是渾圓內相應之綫也又如弧三角之二邊各引長之成大圈
