body:
  text: 江南加𣋡影五刻至戌初一刻為昏刻其時中星則河鼓第二星偏東四度三十四分冬至日𨇠箕一度十分順天日入申正二刻四分加𣋡影六刻十二分至酉正一刻一分其時中星則天倉第一星偏西一度四十八分江南日入申正三刻十二分加𣋡影六刻七分至酉正二刻四分為昏刻其時中星則土司空偏西一度二十六分夫測中星亦所以測日也恒星當午自人視之為天之中既得中星計至日入度分加入昏刻所行而太陽之真𨇠乃得確㩀所以為厯家之要務也朞三百有六旬有六日以閏月定四時成𡻕古歴三百六十五度四分度之一天周𡻕周並同元郭守敬授時術考古凖今定天周為三百六十五度二千五百七十五分𡻕周為三百六十五日二千四百二十五分實為中華之舊法其法自今年冬至至來年冬至凡三百六十五日二十四刻二十五分而太陽行天一周是為一朞自正月元旦至臘月除夕凡三百五十四日三十六刻七十一分一十六秒而太隂會太陽於十二次一周是為一𡻕一𡻕之中日與天會而多五日二十四刻二十五分為氣盈月積
