body:
  text: 恆星黃赤經緯表用道光丁亥黃赤經緯度分列表設丁亥年日𨇠黃道子宫五度求黃道宿度察表牛宿第一星黃道經度為子宫一度四十分二十一秒與日𨇠黃道經度相减餘三度一十分三十九秒即太陽入牛宿三度一十分三十九秒也以後每年用加法以歲差五十一秒加於各宿黃道經度然後與諸曜黃道經度相减餘為諸曜黃道宿度也又設丁亥年日𨇠黃道子宫五度求中星先察升度表黃道子宫五度為赤道子宫七度二十一分三十四秒推得酉宫七度二十一分三十四秒正中為酉正初刻次察本表胃宿第一宿黃道經度為酉宫八度一十三分零七秒度分有餘用與五中之度相减得五十一分三十三秒即為其時胃宿第一星偏東五十一分三十三秒也又推得酉宫十一度六分三十四秒正中為酉正一刻察胃宿度分不足亦用與正中之度相减得二度五十三分二十七秒即為其時胃宿第一星偏西二度五十三分二十七秒也餘並依此推之以後每年亦用加法以各宿赤道歲差加於各
