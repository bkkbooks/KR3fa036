body:
  text: 每十五度當一時每三度四十五分當一刻表上列度下列分秒自上視之則以度化時化分自下視之則以度之分化時之分若秒以度之秒化時之秒若𢕄也升度時差表赤道每十五度當一時每三度四十五分當一刻黃赤同升則有加减之差有時黃度小於赤度須用加差有時黃度大於赤度須用减差如表酉宫十五度在赤道為三時在黃道止得二時五十分零六秒須加九分五十四秒然後合於黃道之度又如丑宫十五度在赤道為七時在黃道已有七時零五分零九秒須减去五分零九秒然後合於黃道之度前所列升度表是黃赤度分之差今用升度時差是以度分化時刻之差也
