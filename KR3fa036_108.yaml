body:
  text: 去當居不居未當去而去皆變行也以占其國之灾福五星之出入黃道亦如日月故所犯星座可以預求也而古法無緯度於是占者以為失行而為之例曰凌曰犯曰鬪曰食曰掩曰合曰句己曰圍繞夫句已凌犯占可也以為失行非也五星離黃道不過八度則中官紫微及外官距遠之星必無犯理而占書皆有之至於恆星有定數亦有定距終古不變而占者既無儀器以考其度又不知出入地平有𪷟氣之差或以橫斜之勢而目視偶乖遂妄謂其移動於是為占曰王良策馬車騎滿野天鉤直則地維圻泰階平人主有福中州以北去北極度近則老人星遠而近濁不常見也於是古占曰老人星見王者多夀以二分日候之若江以南則老人星甚髙三時𥁞見而疇人子弟猶歲以二分占老人星密疏貢諛此其仍訛習欺尤大彰明者矣儒者不明厯學反令術士挾其不經之說以相炫誘而不能斷其惑是亦儒者之過也然則占驗其𥁞無憑乎曰有之如所謂日月之食五星之晝見經天固灾異也但占家附會之說不可信耳故私習之禁亦禁夫妄言禍福者非謂天變不足畏也
