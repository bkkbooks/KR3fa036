body:
  text: 有黃道有大距求距度法為半徑與大距正弦若黃道正弦與距度正弦有大距有距度求黃道法為大距正切與大距正割若距度正弦與黃道正弦又為大距正弦與半徑若距度正弦與黃道正弦又為半徑與大距餘割若距度正弦與黃道正弦有黃道有距度求大距法為距度正弦與黃道正弦若半徑與大距正割又為半徑與黃道正弦若距度餘割與大距正割又為黃道正弦與距度正弦若半徑與大距正弦又為半徑與距度正弦若黃道餘割與大距正弦今設以黃道三十度距緯十一度二十九分三十三秒互舉其例以明之黃赤經緯相求起算冬至
