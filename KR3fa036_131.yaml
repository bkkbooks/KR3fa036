body:
  text: 假如句二十一丈股弦較七丈求弦求股以股弦較七丈除句實四百四十一丈得股弦和六十三丈以加股弦較七丈得七十丈折半得三十五丈為弦弦內减股弦較七丈餘二十八丈為股假如股二十八丈句弦和五十六丈求弦求句以句弦和五十六丈除股實七百八十四丈得句弦較十四丈以加句弦和五十六丈得七十丈折半得三十五丈為弦弦內减句弦較十四丈餘二十一丈為句假如句二十一丈股弦較七丈求股句自乘得句實四百四十一丈股弦較自乘得較實四十九丈相减餘三百九十二丈為實倍較七丈作十四丈除之得二十八丈為股假如股二十八丈句弦較十四丈求句股自乘得股實七百八十四丈句弦較自乘得較實一百九十六丈相减餘五百八十八丈為實倍較十四丈作二十八丈除之得二十一丈為句假如句二十一丈股弦和六十三丈求弦
