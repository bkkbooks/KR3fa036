body:
  text: 四十秒其髙七十七度法以二十七刻九分四十秒變赤道度得一百零三度四十分其大矢一二三六二七二九為一率正矢七六三七二七一為二率七十七度之正弦九七四三七一為三率求得四率六一八一五為正弦檢表得三十七度內減去星距天頂十三度餘二十四度與九十度相加折半得五十七度與九十度相減餘三十三度為北極出地度也如圖壬為天頂寅丙乙為地平辛為北極辛壬乙己寅為子午圈星從𫑗出地平行至甲厯二十七刻九分四十秒變度為甲辛丁角其大矢戊丁正矢丁已甲乙為星距地髙弧七十七度其正弦甲丑又作甲寅距等圈及子庚正弦成甲𫑗丑及子𫑗庚兩同式句股形故甲𫑗與𫑗庚之比同於甲丑與子庚之比而甲𫑗與𫑗庚之比原同於戊丁與已丁之比然則戊下與丁已之比亦必同於甲丑與子庚之比矣既得子庚查正弦得寅庚弧度內減星距天頂之癸庚弧餘寅癸弧與壬寅象限相加為壬辛癸弧折半於辛得辛壬弧為極距天頂與壬寅象限相減餘辛寅弧為北極出地度也
