body:
  text: 五十七七三五依立圓法以三一四乘四除得一十六萬一千四百九十七為圓柱積取三之二得一十萬七千六百六十一為小立圓積小立圓內又容立方面冪一千一百一十一一一其徑三十三三三以徑乘冪得立方積三萬七千三十七以三乘四除得二萬九千八十八為圓柱積又三分取一得一萬九千三百九十二為立方內又容小渾圓積為大渾圓積二十七之一也撱圓法解西人刻白爾噶西尼戴進賢以撱圓言天用撱圓面積求太陽太隂加减均數自未葉大悟不同心規與小輪難以推算更剏蛋形圖以觧天文根本説者謂即古人天形如雞子鳥卵之説其法舊有而至戴進賢始得用者諸輪法自多禄𤱔至湯若望南懷仁月已增至四輪猶湏加减勢難更增小輪乃改從撱圓立法其實加减又密而己既立撱圓之象則又有以撱圓為實象者竊意撱圓又不如渾圓近理盖物極圓則能自動莫難之珠没柰何之球皆其証也天與七曜之動豈有運樞轉轂者乎極圓則能自動亦一説也若以為撱圓試為撱圓之輪運於實處則不可
