body:
  text: 測月星乃視指時度表所指逰旋赤道宫度加半周即得所測月星赤道經度隨察指緯度表所指四逰圈距赤道南北度分即得所測月星赤道緯度也以本時太陽赤道經度用綰時度表綰定逰旋赤道以月五星本時赤道經度之對冲用綰經度表於逰旋赤道綰定四逰圈將四逰圈𢃄逰旋赤道推轉用窺衡測定月星乃視綰時度表對於天常赤道之某時刻分加六時即得太陽時刻以本日子正月五星赤道經度或恆星經度之對冲用綰經度表於逰旋赤道綰定四逰圈又以本日子正太陽經度用綰時度表綰定逰旋赤道爰以四逰窺衡於月星出入地平時測之視綰時度表當天常赤道之某時刻分加六時為本日月星出入時刻之通數復計測時距本日子正後若干時刻比例得太陽行分變時為太陽時差比例得月五星行分變時為月五星時差乃於前所測月星出入時刻之通數减太陽時差加月五星時差即得月星出入地平時刻也日月之行則有冬有夏日行黃道而欲求日行之出入必以赤道為宗赤道者天體之半腰黃道者斜交乎赤道而出其內外者
