body:
  text: 故二法並用而時刻乃真也又直景為太陽上半徑之影倒景為太陽下半徑之景二法並用而参考之然後得太陽心之景而為時刻之真數也太陽中表測景圖股表之景得太陽上半徑之度分减去半徑始得太陽心之度句表之景得太陽下半徑之度分加入半徑始得太陽心之度分盖𨇠度以太陽心之所到為定必得太陽心之度分而得度分真時刻亦真也惟用中表𥪡二小柱于平面之上二小柱之端置一横柱或繫一横線以之測景則上半徑之景自上而入
