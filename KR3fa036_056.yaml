body:
  text: 十七秒秒下又有四十一𢕄三十八纎二忽二十六芒五十六塵立法尤為精密但日法一萬分與中法同而一日九十六刻一刻十五分一分六十秒秒以下俱以六十遞析必以通分之法求之其法自今年冬至至來年冬至凡三百六十五萬二千四百二十三分三四四二計得三百六十五日五時三刻三分五十七秒為一朞或自今年春分至來年春分亦同自正月元旦至臘月除夕凡三百五十四萬三千六百七十分八六三六計得三百五十四日八時四十八分三十六秒為一歲日積三百六十五萬二千四百二十三分三四四二而與天會一歲之外多五萬二千四百二十三分三四四二為氣盈月積二十九萬五千三百零五分九五三而與日會一歲之中少五萬六千三百二十九分一三六四為朔虛計每日盈一百四十三分五七七七虛一百五十八分九五七一月共得九千六十二分七六七一歲共得一十萬八千七百五十二分四八六為通閏其置閏之法與舊不異而又略有變通要皆至十有九年七閏然後氣朔分齊而尾數猶未能𥁞齊也在璿璣玉衡以齊七政
