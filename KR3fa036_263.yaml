body:
  text: 第三垂弧又法用次形設乙甲丙形有乙丙二角乙丙邊求餘二邊及甲角法引丙甲至己引乙甲至戊各滿半周作戊己邊與乙丙等而已與戊並乙丙之外角成甲戊己次形乃作垂弧己丁於形內分為兩形以己丁戊分形求丁戊以己丁甲形求甲丁合之成甲戊以減半周即乙甲以已丁甲分形求己甲以減半周即丙甲以已丁甲分形求甲交角設乙甲丙形有丙甲二角乙甲邊求乙角及餘邊法引甲乙丙乙俱滿半周會于己成丙甲已次形作己丁垂形于次形內分次形為兩求到分形兩己角合之為次形己角與乙對角等求到分形甲丁及丁丙并之即甲丙求到次形己丙以減半周得乙丙設乙甲丙形有乙丙乙甲二邊有乙角法用甲乙戊次形作甲丁垂弧分為兩形以乙甲丁分形求到丁乙及甲分角又以甲戊丁形求到甲戊以減半周為丙甲又得甲分角并先所得成甲角即甲外角又得戊角即丙對
