body:
  text: 曰爾雅與諸家皆是也北辰在第九重宗動天北極在第八重恆星天宗動天萬古不動而恆星天則每歲東行也作爾雅時北極正當北辰之處故曰北極謂之北辰其後東行而差則漸與北辰遠矣故曰離不動處一度有餘三度有餘也今以所製儀器考之其儀器是自南周用目以窺北周祖氏所測雖云離一度有餘其真度尚未及一度宋沈括時亦正在二度左右元郭太史所測為的至於邵諤時己去四度竒者北極出地之髙下差也前所云每歲東行者歲差也歲差每七十餘年而移一度此所云北極出地之髙下者里差也里差則雖同在一時而每向南二百里則北極低一度每向北二百里則北極髙一度臨安北極出地三十度十八分北極既低而宗動恆星二天參差益遠固其宜也故曰爾雅與諸家皆是也然則當以何説為宗曰今非周秦之時亦非隋唐宋元之時當以今日之實測為宗耳考乾隆甲子經緯度北極星經度在辰宫一十一度五十二分零七秒緯度在赤道北八十四度四十七分四十五秒用赤道差率加減推算至今道光甲申經度在辰宫一十一度五十五分零三秒緯度在赤道北八十四度
  hash: sha256:504d1058ecf75e68e9382d8a3ed39c8ed92f688ee2b01d3ed997db2f11b77b2d
