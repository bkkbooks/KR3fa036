body:
  text: 故前平視之外周躋縮成一直線也心即地心在伏見輪即為太陽又即為正交中交因旁視正交中交過心橫線竟看成一㸃丁心癸即本天上黃道圈本天小於黃道然其度一一與黃道相應而成一圈亦因旁視看成一直線兩直線相交於心即成緯度角兩直線相交即兩圈相交亦即為兩圓面相切星道黃道在渾體俱成面甲心丁角在黃道北其弧甲丁其正弧甲庚北大距之緯度也甲丁弧雖在本天然即外應黃道緯乙心癸角在黃道南其弧乙癸其正弦乙辛南大距之緯度也乙癸弧在本天外應黃道與甲丁同緯度即角度角同而緯有大小者角雖同而邊不同也大距度以半徑為全數其餘各度並皆以正弦當全數假如任舉一度如過正交三十度為戊㸃其正弦戊心法為甲心全數與甲丁大距之正弦甲庚若戊心正弦與戊子弧之正弦戊已也以上所論皆本天之事然伏見輪之理並無有二故此一圖即可作伏見輪觀其旁視之交角甚明也四星距黃道表
