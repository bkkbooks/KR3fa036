body:
  text: 又置一分之弧線為實以六十秒除之得一秒之弧線屢加之至十秒表而列之為求弦矢之用乃至簡至易之法也第按梅氏弧綫舊表尾數稍有訛誤今以算法求之知其不合而另推逐度分秒之弧線列表如左由是求弦矢求八線取而用之裕如也
