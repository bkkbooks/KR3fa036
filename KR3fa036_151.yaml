body:
  text: 假如句二十一丈股二十八丈求容方句股相乘得五百八十八丈為實以句股和四十九丈除之得十二丈為容方徑假如方外餘句九丈餘股十六丈求容方邊餘勾九丈與餘股十六丈相乘得一百四十四丈開方得十二丈即容方邊容方以圖代算假如句二十一丈股二十八丈求容方但平分正角甲作斜線至弦邊乙次從乙作乙丙乙丁兩直線恰得方邊十二丈與得之算法者不殊又法從戊作戊己線與甲戊等從庚作斜線至己相交於丙量得甲丙十二丈即方邊又法從庚作庚壬線與庚甲等從戊作斜線至壬相交於丁亦量得甲丁十二丈為方邊
  hash: sha256:1a1282942655d6587ce782366ff10c8b2b15352a3875f47cc538f8c2e02c35d4
