body:
  text: 周天三百六十度分十二宫二十四定氣每氣十五度歲周實三百六十五日二十三刻計每日太陽之行止得五十九分零八秒若概以每日一度求之其失不細今於周天度內另立歲規其法先定奧日現今奧日限夏至後十度即從未宫十度望𥂟心作一線折半求中凡為折半者五取三十二分之一為規樞旋大規其規較周天規稍偏以歲規自天頂中勻分十二月得中氣又勻分二十四節氣俱為恆氣又細分三百六十五度二四二三為周歲之日以歲周
