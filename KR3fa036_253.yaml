body:
  text: 凡弧三角形但有一角及其對角之一弧則其餘有一角者可以知對角之弧而有一弧者亦可以知對弧之角皆以其正弦用三率比例求之假如乙丙甲三角形先有甲角及相對之乙丙弧則其餘但有丙角可以知乙甲弧但有乙角可以知丙甲弧此為角求弧也若有乙甲弧亦可求丙角有甲丙弧亦可求乙角此為弧求角也斜弧三角形作垂弧正弧形有正角如平三角之有句股形也斜弧形無正角如平三角之有鋭鈍形也平三角鋭鈍二形並以虛線成句股故斜弧形亦以垂弧成正角也正弧形以正弦等線立算句股法也斜弧形仍以正角立算亦句股法也垂弧之法有三其一作垂弧於形內則分本形為兩正角形其二作垂弧於形外則輔成正角形其三作垂弧於次形凡三角俱鋭垂弧在形內一鈍二鋭或在形內或在形外自鈍角作垂弧則在形內自鋭角作垂弧則在形外兩鈍一鋭或三角俱鈍則用次形其所作垂弧在次形之內之外次形無鈍角垂弧在其內有鈍角垂弧則其外若破鈍角亦可在內
