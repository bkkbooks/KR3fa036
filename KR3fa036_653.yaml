body:
  text: 三餘弦九一七一七六如求割線即以半徑一千萬為實以正弦三九八四八二三為法除之得數二五九五二一八即設弧之餘割亦即餘弧六十六度三十一分之正割以餘弦九一七一七六為法除之得數一九三三二即設弧之正割亦即餘弧六十六度三十一分之餘割也如先有正割餘割求弦亦以半徑一千萬為實以餘割二五九五二一八除之亦得正弦三九八四八二三以正割一九三三二除之亦得餘弦九一七一七六蓋正弦與半徑之比例若半徑與餘割之比例餘弦與半徑之比例若半徑與正割之比例試以正弦餘割相乘即與半徑自乘之積等餘弦正割相乘亦與半徑自乘之積等所以能互為比例也用弦求切用正弦餘弦兩線求切線用四率斷比例以餘弦為二率半徑為三率以正弦為一率除之得餘切以正
