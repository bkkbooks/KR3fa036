body:
  text: 四率丙角餘弦二九三六六八二檢表得丙角七十二度五十五分二十一秒又如有丙交角有乙丙黃道度而求乙甲同升度則為半徑與丙角之正弦若乙丙之正弦與乙甲之正弦丙角七十二度五十五分二十一秒乙丙黃道四十五度求乙甲赤道以丙角正弦九五五九八七乘乙丙正弦七七一六八退七位得乙甲正弦六七五九二九六檢表得四十二度三十一分三十五秒或先有乙甲同升度而求乙丙黃道度則以前率更之為丙角之正弦與半徑若乙甲之正弦與乙丙之正弦乙甲赤道四十二度三十一分三十五秒丙角七十二度五十五分二十一秒求乙丙黃道以丙角正弦九五五九八七除乙甲正弦六七五九二九六陞七位得乙丙正弦七七一六八檢表得四十五度又如有丙交角有乙甲同升度而求丙甲距度則為丙角之切線與半徑若乙甲之切線與丙甲之正弦
