body:
  text: 赤道之度將赤道南放濶直至南極而止地平之度將地平下放濶直至地底而止而七政行度所及則有定數太陽最大距緯二十三度二十九分太隂最大距緯二十八度四十六分二十秒五星惟金星距緯最大至三十二度三十一分今用割圓法割至去極一百二十三度以備測驗七政之用而七政在赤道某度在地平某度可以按圖而得地平橫偃宫度圖赤道宫度之上加地平橫偃宫度法以赤極為心分十二支俱貫極心以便點定極髙旋規之用用緯度尺量準本地各宫北極出地髙度而點定之一七宫極子正位點六十二宫極丑正未點五十一宫極寅正未點二八宫極亥正未點三九宫極戌正未點乃求各宫樞一七宫午正求樞六十二宫未正求樞五十一宫申正求樞二八宫已正求樞三九宫辰正求樞如鹽城極髙三十三度一宫為𫑗七宫為酉點極在子求樞在午即從赤道酉中上數三十三度作斜
  hash: sha256:a74280e1c4e19db1a3a417e2f8cdbc8f4a2e96c886e4d1e30ce0292831895f23
