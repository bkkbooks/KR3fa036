body:
  text: 步火星假如道光己丑距根一百二日求火星經緯先求本日太陽實行三宫一十二度三十九分三十三秒引數三宫四十四分一十六秒然後求火星諸年根火星三宫一十八度四十分三十七秒二十𢕄最髙八宫三度一十五分六秒五十二𢕄正交四宫一十九度五十九分五十一秒五十一𢕄諸日數一百二火星一宫二十三度二十七分二十秒二十一𢕄最髙一十八秒四十三𢕄正交一十四秒四十七𢕄諸平行火星年根日數相加得五宫一十二度七分五十七秒四十一𢕄最髙八宫三度一十五分二十五秒三十五𢕄正交四宫二十度六秒三十九𢕄引數置火星平行减最髙平行得九宫八度五十二分三十二秒六𢕄初均以引數宫度分察所對之初均得一十度一十二分四十九秒其號為加次輪心距地又察所對之次輪心距地數得一三三五七五三本天次輪半徑又察所對之次輪半徑本數得六四五一九五九太陽髙卑差以本日太陽引數宫度分加减宫得九度四十四分一十六秒所對之太陽髙卑差數得一一九次輪實半徑置本天次輪半徑加太陽髙卑差得六五七九六四
