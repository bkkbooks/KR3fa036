body:
  text: 乘得三三為實以十三度四十八分二十秒之正切二四五七二六三與十三度四十八分三十秒之正切二四五七七七七相減餘五一四為法除之得五秒四十八𢕄五十四纎進作六秒與十三度四十八分二十秒相加得十三度四十八分二十六秒為赤道經度也設赤道三十度求黃道法以大距割線一九三三一與赤道三十度之正切五七七三五三相乘得六二九四八六八二一八七五九三為實半徑除之退七位得六二九四八六八檢表在三十二度十一分二十秒三十秒之間乃以今得之正切六二九四八六八內減三十二度十一分二十秒之正切六二九四六二九餘二三九與十秒相乘得二三九為實以三十二度十一分二十秒之正切六二九四六二九與三十二度十一分三十秒之正切六二九五三五相減餘六七六為法除之得三秒三十𢕄一十八纎收作四秒與三十二度十一分二十秒相加得三十二度十
