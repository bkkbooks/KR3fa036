body:
  text: 丈為長方面即為兩句股積折半得二百九十四丈為句股面積或先將股折半作十四乘句二十一或先將句折半作一五乘股二十八並得二百九十四為面積假如弦三十五丈句股較七丈求句股面積弦實一千二百二十五丈句股較實四十九丈相减餘一千一百七十六丈四歸之得二百九十四丈為句股面積假如弦三十五丈句股和四十九丈求面積弦實一千二百二十五丈勾股和實二千四百一丈相减餘一千一百七十六丈四歸之得面積句股求積以圖明算假如句九股十二减甲乙句之半乙丁為虛線丙辛是移乙丁己形為丙辛己形以𥙷成直長方面也按圖計之得積五十四或减甲丙股之半戊丙為虛線乙庚是移戊丙己形為乙庚己形以𥙷成橫長方面也按圖計之亦得積五十四也句股容圓
