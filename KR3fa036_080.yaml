body:
  text: 經言朱鳥元武青龍白虎者其名見此此以四獸畫之於旗立於軍之前後左右以象天體之周旋也青龍在左左東方也夀星大火析木之分主之白虎在右右西方也降婁大梁實沈之分主之朱雀在前前南方也鶉首鶉火鶉尾之分主之元武在後後北方也星紀元枵娵訾之分主之所以謂之朱鳥者柳為鳥注注者朱鳥之喙也七星𩒍為員官頸朱鳥𩒍也員官嚨喉也張為素素即嗉鳥受食之處也翼為羽翮朱鳥之翼也其宫曰鶉首鶉火鶉尾鶉即朱鳥乃鳳也所以謂之青龍者角二星象角故一名龍角氐房心象龍身心即其當心之處尾宿即龍尾也所以謂之元武者子曰元枵枵者虛也即虛危也又象龜蛇為元武也所以謂之白虎者奎曰封豕參為白虎三星直者是為衡其外四星左右肩股也小三星曰觜觽為虎首也是四獸者皆以星象而得名也南方色朱東方色青北方色元西方色白名以四獸而係以色其義亦取象於四方也南曰前北曰後東曰左西曰右專以南面之象言之蓋北極亦𠋣北而嚮南也後世堪輿家概謂左龍右虎前鳥後武有不問其為東為西為南為北者俗論固不足道至厯家以冬
