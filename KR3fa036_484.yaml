body:
  text: 地平圖說黃赤經緯之度天下之所同也地平經緯之度一方之所獨也凡人所居之地南北相距二百里即差一度東西且有不二百里而差一度者此天頂所以隨地而變也天頂變則地平變地平變則髙下方位俱變而所見黃赤之經緯與凡日月之升降交食之淺深五星之伏見恆星之中偏亦無一不變矣故天學家重之作地平圖說春秋分測北極髙度圖
