body:
  text: 正交平均用日引查得三分四十秒號减立方較用日引查得日距地立方較九八二平行太隂平行十一宫一十三度二十九分一十三秒四十九𢕄內减一平均四分三十四秒餘十一宫一十三度二十四分三十九秒四十九𢕄為二平行用最髙最髙平行五宫六度四十分三十二秒二十五𢕄又加最髙平均七分四十二秒得五宫六度四十八分一十四秒二十五𢕄為用最髙用正交正交平行十宫二十三度九分九秒三十五𢕄內减三分四十秒餘十宫二十三度五分二十九秒三十五𢕄為用正交日距月最髙太陽實行一宫二度五十七分一十三秒三十一𢕄加十二宫减用最髙五宫六度四十八分一十四秒二十五𢕄餘為日距月最髙七宫二十六度八分五十九秒六𢕄日距正交太陽實行十三宫二度五十七分一十三秒三十一𢕄减用正交十宫二十三度五分二十九秒三十五𢕄餘為日距正交二宫九度四十八分三秒五十六𢕄二平均用月距日最髙七宫二十六度八分五十九秒六𢕄查得二平均三分一十八秒較秒二十秒號减乃以髙卑立方大較一一四為一率本時立方較九八為二率較秒二為三率求得四率一九三二收作一十九秒一十九𢕄與所查得之二平均三分一十八秒相加得二平均三分三十七秒一十九𢕄三平均用日距正交二宫九度四十八分三秒五十六𢕄查得三平均三十秒號减併均二三平均號皆為减則相加為併均共得四分七秒一十九𢕄號仍為减
