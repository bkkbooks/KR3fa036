body:
  text: 差一度日𨇠差九𢕄五十一纎則東西差一分不及者差而東有餘者差而西假如鹽城於秋分後上日子正測日𨇠檢時憲書日𨇠辰宫六度四十一分察其對沖為戌宫六度四十一分檢恆星表得壁宿第一星在戌宫六度三十九分三十五秒差一分二十五秒用儀器測得壁宿第一星偏於正午之西一分二十五秒則正午之度為戌宫六度四十一分而正子之度必為辰宫六度四十一分察定時儀已過子正後二秒半知日𨇠方當辰宫六度四十分一十二秒不及時憲書者三十八秒依法推偏東度得偏東
  hash: sha256:047cca982341543710045bd067e271b9f5d820656418949e22b6f1c86b23a956
