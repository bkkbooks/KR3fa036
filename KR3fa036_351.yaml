body:
  text: 一與半圓相應而仍與大圈之度等亦無不可與大圈為比例矣又法以距等之半徑為度仍以大圓之心為心而運規於大圓之內作內距等半圓則不必勻分半圓即以大圓之度為度而一一相應焉又或用正弦規尺量取得度亦同法尤簡捷赤道上加黃道圖赤道分三百六十度黃道亦分三百六十度第以北極為心則赤道平分而黃道不平分以黃極為心則黃道平分而赤道不平分黃赤大距二十三度二十九
