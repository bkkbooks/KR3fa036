body:
  text: 百六十掛䇿一應氣盈之餘數五日四分日之一扐策合隂陽共十二應十二朔為一歲之實數每朔二十九日九百四十分日之四百九十九一歲三百五十四日九百四十分日之三百四十八掛策一應朔虛之餘數十日九百四十分日之八百二十七過揲為正策乾策三十六合六爻二百一十有六坤策二十四合六爻百四十有四凡三百有六十當一期之日數掛扐為餘策乾策十三合六爻七十八坤策二十五合六爻百五十凡二百二十有八當一章之月數二篇之策為全策陽爻百九十二得六千九百一十二隂爻百九十二得四千六百零八凡萬有一千五百二十當閏終之總數正數當一期之日蓋日周天而為一期為太陽所主也餘數當一章之月蓋氣朔分齊而為一章為太隂所主也全數當閏終之總數蓋三十二月而閏一月其辰萬有一千五百二十三十二年而閏一年其日萬有一千五百二十此則日月正餘會終蓍卦齊同之數也厯代之厯歲分消長不同故有五日四分日之一而有餘者亦有四分日之一而不足者然舉其中者以該其變者則四分為常法也授時法歲實比四分日之一减七十五分
