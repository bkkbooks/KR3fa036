body:
  text: 弦為股半徑為弦半徑減餘矢數即正弦數為句餘角之弧線外又以半徑為句餘切為股餘割為弦假如分平圓為十二宫以三十度之正弦五為句半徑一為弦求股法以五自乘得二五以半徑一自乘得一相減餘七五開方得八六六二五四為十二宫之股即三十度之餘弦也又如以三十度之正弦為小股以餘弦減半徑數即正矢數一三三九七四五為小句求小弦法以小股五自乘得二五小句一三三九七四五自乘得一七九四九一六六六五二五相併得二六七九四九一六六六五二五開方得五一七六三八為十二宫正弦外句股形之小弦小弦折半得二五八八一九即二十四時十五度之正弦也割圓求句股積假如十五度求句股積法以十五度之正弦二五八八一九與其餘弦九六五九二五八相乘得二四
