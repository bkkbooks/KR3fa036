body:
  text: 原是火西原是金以一歲之日五分之每得七十三日零四八四八一八再四分之每得一十八日二六二一二零四五中氣寄於四辰之末故辰戌丑未月終之一十八日三時一刻方是土氣辰月過清明末月過小暑戌月過寒露丑月過小寒十二日二時零十三分方土王用事前之十二日二時零十三分原從本方之氣也歲與日時亦然辰戌丑未歲過立夏九日一時四刻十分方作土論巳前原是本方之氣辰戌丑未日過己初二刻六分方作土論己前原是本方之氣辰戌丑未時過初三刻三分方作土論己前原是本方之氣也大衍迎日推策法史稱黃帝迎日推䇿後代談卦畫者多以厯法推配孔子於大衍之數則曰象四時象閏又曰當期之日則蓍策之與厯法相表裏可見矣以數推之一年三百六十五日四分日之一每日百分凡三萬六千五百二十五分以天數二十五除之得一千四百六十一分為日數又以地數三十除日數得四十八零七分為月數是為大衍用數揲策合左右共四十八應四十八弦為期日歲月之經數經弦七日半期日三
