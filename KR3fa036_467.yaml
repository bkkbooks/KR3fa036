body:
  text: 交之角逐度不同故以最小之交角四度五十五分三十二秒與最大之交角六度三十一分零二秒均分為二十限各求其星距黃道度分列表每限交角相差五分夫交角止差五分則星距黃道所差甚𢕄可以不計故依實交角相近者取用也五星伏見距日表五星伏見距日表以星之黃道宫度按晨夕列之初宫至二宫六宫至八宫列于上三宫至三宫九宫至十一宫列于下前後分順逆列星之黃道度中列各
