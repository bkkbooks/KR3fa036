body:
  text: 弦矢互求弦矢互求止用加減半徑以正弦數減半徑數便得餘矢數以餘弦數減半徑數便得正矢數以正矢數減半徑數亦得餘弦數以餘矢數減半徑數亦得正弦數如前所求設弧二十一度十九分五十一秒之正弦三六三七五二五以減半徑得九六三六二四七五即設弧之餘矢亦即餘弧六十八度四十分九秒之正矢如設弧過四十五度以上者先求得餘弧之正弦以減半徑即得設弧之正矢也如前所求設弧十六度二十七分四十三秒之正矢四九九一八三以減半徑得九五九八一七即設弧之餘弦亦即餘弧七十三度三十二分十七秒之正弦如設弧過四十五度以上者先求得餘弧之正矢以減半徑即得設弧之正弦也用弦求割用正弦餘弦兩線求割線用三率連比例以半徑為中率以正弦為首率除之得餘割以餘弦為首率除之得正割更之亦可以割求弦以半徑為中率以餘割為首率除之得正弦以正割為首率除之得餘弦設弧二十三度二十九分求得正弦三九八四八二
