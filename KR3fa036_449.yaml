body:
  text: 四十分火星北緯為四度二十一分南緯為六度四十七分蓋本輪有髙卑則次輪心距地有遠近遠則緯小近則緯大因次輪心在本道之北半周當最髙南半周當最卑故南緯大於北緯也下二星視緯圖第谷測得次輪心在兩交之中星在次輪最近其緯度極大金星為九度零二分水星為三度三十三分金水二星本道之交點皆近最髙則兩交之中皆近中距故次輪心距地心之遠近皆等而南北之緯度亦等赤道規上加黃道及五星道規圖黃道交於赤道五星本道又皆交於黃道今以赤道為主而加黃道規又以黃道為主而各依星之本道交點以加五星道規俱按道光丁亥五星交點度分
