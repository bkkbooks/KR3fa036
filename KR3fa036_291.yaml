body:
  text: 一甲乙丙形甲乙邊適足九十度餘二邊一大一小角一鈍二鋭易為丑癸寅正弧形引乙丙小邊成半周作𫑗亥庚丑寅午以丙為心之半周作甲丑癸辛戊以乙為心之半周作乙壬癸寅弧以甲為心三弧線相交成丑癸寅次形與本形弧角相易而有正角丑寅邊即丙角癸寅邊即甲角丑癸邊即乙外角是角盡易邊也又寅角為甲丙邊所成丑角為乙丙邊所成癸正角為甲乙邊所成是邊𥁞易角而有正角也又辰戊丙形辰戊邊象限餘並同前易為正弧形並同前法乙丙戊形乙戊邊足一象限餘並小易為正角形則丑寅度即丙外角丑癸度即乙角寅癸度即戊角是角為邊也又寅角生于丙戊丑角生于乙丙癸正角生于乙戊是邊為角而有正角也辰甲丙形易為正角形辰甲象弧餘二大邊三角並鈍則丑寅邊為丙外角丑癸邊為辰外角寅癸邊為甲外角角為邊也又寅角生于甲丙丑角生于辰丙而癸正角生于辰甲是邊為角而有正角也右本形有象限弧即次形有正角而斜弧變正弧
