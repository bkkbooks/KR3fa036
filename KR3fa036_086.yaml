body:
  text: 之餘二十七日二四六三九六六自初日甲子起算至二十七日則十月朔日正得辛夗又加八箇月太隂交周朔策得十月朔日太隂交周初宫一十四度九分八秒一十一𢕄為黃道北實朔的食之限其時在處暑後二日六時有竒日月交會于己宫二度三十分而有食也日在營室奎胃畢東井桞翼角房尾斗婺女孟春日月會於娵訾娵訾亥次之號營室北方火宿二星上有離宫六星遶之其廣十度今法娵訾初虛九度四分終室八度五十八分立春日在女五度四十三分雨水日在虛九度四分仲孟日月會於降婁降婁戌次之號奎西方木宿十六星形如破鞋廣十六度今法降婁初室八度五十九分終奎十度一分驚蟄日在危十四度六分春分日在室八度五十九分季春日月會於大梁大梁酉次之號胃西方土宿三星鼎足廣十五度今法大梁初奎十度二分終昴三度二分清明日在壁八度十八分穀雨日在奎十度二分孟春日月會於實沈實沈申次之號畢西方隂宿八星状如掩兔之畢旁一星為耳其廣十七度今法實沈初昴三度三分終参七度四十六分立夏
