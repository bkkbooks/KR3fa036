body:
  text: 次形法輔算例設角一鋭二鈍邊二大一小甲乙丙形甲角一百二十度乙角一百一十度丙角八十五度為一鋭二鈍三角求邊如法易為丑寅癸次形癸寅邊六十度當甲角丑癸邊七十度當乙角寅丑邊當丙角並以角度減半周得之求甲乙邊即次形癸外角二率甲角一百二十度正弦八六六二五四相乘三率乙角一百一十度正弦九三九六九二六以一率半徑除之得四率八一三七九七五用前得四率數為一率八一三七九七五半徑為二率一甲乙兩角相較十度之矢一五一九二三與丙角減半周九十五度之大矢一八七一五五七相較得數為三率一七一九六三四求得四率一三一七三四七為次形癸角大矢內減半徑得三一七三四七為癸內角一百八度之正弦以癸內角減半周得七十一度三十分即甲乙邊或用省法徑以所得正弦作餘
