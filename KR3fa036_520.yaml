body:
  text: 位置之法京師南北真線偏指南針西二度三十分蓋即京師之偏度也今凖此作圖取京師東二度三十分為中線以定各省之經緯京師北極出地三十九度五十五分偏於中線之西二度三十分盛京髙四十一度五十一分偏東四度三十分山東髙三十六度四十五分偏西一十五分河南髙三十四度五十二分偏西四度二十四分江南髙三十二度四分偏西一十二分安𡽪髙三十一度偏東一度三十分浙江髙三十度十八分偏東一度十一分江西髙二十八處三十七分偏西三度七分福建髙二十六度
