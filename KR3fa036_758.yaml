body:
  text: 初實行用平行十一宫一十三度二十分三十二秒三十𢕄減初均三十一分一十秒餘十一宫一十二度四十九分二十二秒三十𢕄為初實行月距日初實行十一宫一十二度四十九分二十二秒三十𢕄減太陽實行一宫二度五十七分一十三秒三十一𢕄得月距日十宫九度五十二分八秒五十九𢕄二均用月距日十宫九度五十二分八秒五十九𢕄查記二均三二四二及較數三五三乃以立方大較一一四為一率立方較九八為二率較數三五三化作二百三十三秒為三率求得四率一十九秒五十四𢕄與所記二均相加得三十三分一秒五十四𢕄為所求之二均其號為減二實行初實行十一宫一十二度四十九分二十二秒三十𢕄減二均三十三分一秒五十四𢕄餘十一宫一十二度一十六分二十秒三十六𢕄為二實行實月距日月距日十宫九度五十二分八秒五十九𢕄減二均三十三分一秒五十四𢕄餘十宮九度一十九分七秒五𢕄為實月距日太陽最髙太陽最卑行九度五十六分四十九秒四十三𢕄加六宫得太陽最髙六宫九度五十六分四十九秒四十三𢕄日月最髙相距太陽最髙實行五宫十八度五十四分三十秒二十五𢕄加十二宫減太陽最髙餘十一宫八度五十七分四十秒四十二𢕄為日月最髙相距相距總數實月距日十宫九度一十九分七秒五𢕄與日月最髙相距十一宫八度五十七分四十秒四十二𢕄相加得相距總數九宮十八度十六分四十七秒四十七𢕄
