body:
  text: 與丙角之餘弦一甲丙邊二丁丙分邊三半徑四丙角餘弦七八七七九檢表得丙角三十八度四十分四秒五十五𢕄求甲角先求分形大半之甲角以丙角三十八度四十分四秒五十五𢕄減象限餘五十一度一十九分五十五秒五𢕄為丁甲丙分形之甲角次求分形小半之甲角以甲乙弦比丁乙句若半徑與分形甲角之正弦一甲乙邊二丁乙分邊三半徑四甲分角正弦五一五三二檢表得三十度三十七秒為丁甲乙分形之甲角末併分兩甲角得甲全角八十一度二十分三十二秒五𢕄求乙角併丙甲二角以減半周得乙角五十九度五十九分二十三秒鈍角形有兩角一邊求餘角餘邊假如乙丙丁鈍角形有丙角三十六度半乙角二十四度丁乙邊五十四丈先求丁角以丙乙二角併之共六十度半以減半周得餘一百一十九度半為丁鈍角次求乙丙邊以丙角正弦比丁角正弦若乙丁邊與乙丙邊一丙角三十六度半正弦五九四八二二八二丁角一百十九度半正弦八七
