body:
  text: 舊法用中星定時刻惟星在午正者可用其餘各宫方位與時刻異疏密之度不可用以定時今既推得南北真線東西偏度而知中星之度正偏遲早異於他處矣又用蓋天法推得他平經度之界緯度之規則不獨正午可以定時而凡恆星之出入地平以至天頂與其在正午東西諸宫度上均可用其經度或緯度以求赤道經度而得本地之時刻也兹用冬至子正為一圖以見例餘悉倣此推之周歲周日中星表
