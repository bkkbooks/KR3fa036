body:
  text: 法為半徑與戊角之正弦若戊亥之正弦與亥丙之正弦又半徑與辛角即戊角之正弦若辛丁之正弦與丁庚之正弦合之則戊亥之正弦與亥丙之正弦亦若辛丁之正弦與丁庚之正弦一率亥己餘弦亥戊正弦黃經二率亥甲餘弦亥丙正弦赤緯本形即次形三率己丁餘弦辛丁正弦黃經四率甲丁餘弦庚丁正弦赤緯若丁為鈍角則如上圖作甲己線于形外乙庚丙戊如赤道己丁亥戊如黃道皆象弧戊角如秋分其弧己乙如夏至距緯此兩黃經並在夏至前秋分後其理易見一率亥己餘弦即亥戊正弦二率亥甲餘弦即亥丙正弦三率己丁餘弦即戊丁正弦四率甲丁餘弦即庚丁正弦或先有者是丁鈍角甲丁丁亥二邊則先求丁己線亦用前圖
  hash: sha256:b4caa578efe4221757f95275e5fcffdb2b245016c7cc7e5d17150218e2196a47
