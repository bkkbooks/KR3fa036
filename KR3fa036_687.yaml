body:
  text: 推歩二歩黃赤地平經緯黃赤經緯相求起算春分用八線法從二分起算有距分黃道度及大距度求赤道度法為半徑與大距之餘弦若黃道之正切與赤道之正切有距分赤道度及大距度求黃道度法為半徑與大距之割線若赤道之正切與黃道之正切有黃赤二經度求大距度法為半徑與黃道之正切若赤道之餘切與大距之割線又為半徑與赤道之正切若黃道之餘切與大距之餘弦也設黃道十五度求赤道法以大距餘弦九一七一七六一與黃道十五度之正切二六七九四九二相乘得二四五七五六六二四三四一二為實半徑除之退七位得二四五七五六六檢表十三度四十八分二十秒之正切二四五七二六三十三度四十八分三十秒之正切二四五七七七七即知在二十秒三十秒之間乃以今得之正切二四五七五六六內减十三度四十八分二十秒之正切二四五七二六三餘三三與十秒相
