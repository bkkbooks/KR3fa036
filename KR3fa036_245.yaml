body:
  text: 丙角七十二度五十五分二十一秒乙甲赤道四十二度三十一分三十五秒求丙甲距度以丙角切線三二五五九八五除乙甲切線九一七一七六升七位得丙甲正弦二八一七三八檢表得一十六度二十一分五十七秒或先有丙甲距度而求乙甲同升度則以前率更之為半徑與丙角切線若丙甲正弦與乙甲切線丙甲距緯一十六度二十一分五十七秒丙角七十二度五十五分二十一秒求乙甲赤道以丙角切線三二五五九八五乘丙甲正弦二八一七三八退七位得乙甲切線九一七一七六檢表得四十二度三十一分三十五秒又如有丙交角有乙丙黃道度求丙甲距度則為半徑與丙角餘弦若乙丙切線與丙甲切線丙角七十二度五十五分二十乙秒乙丙黃道四十五度求丙甲距度以丙角餘弦二九三六六八二乘乙丙切線一退七位得丙甲切線二九三六六八二檢表得一十六度二十一分五十七秒或先有丙甲距度而求乙丙黃道則以前率更之為
