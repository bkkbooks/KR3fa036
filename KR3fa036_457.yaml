body:
  text: 不見動為留過此而輪心距日益近星在輪上漸向東行又是又見其東移之速而至於合伏是為歲輪之周以歲輪立算可以得其遲留逆伏之度以圍日圓輪立算所得不殊金水伏見輪圖五星行于歲輪起合伏終合伏皆從距日而生故五星之歲輪並與日天同大而歲輪之心原在本天周故其圍日象又並與本天同大上三星之本天色太陽外其大無倫又其行皆左旋頗費解説故只用歲輪也至於金水本天在太陽天內伏見輪既與之同大又其度順行故用伏見輪伏見輪即繞日圓象如上三星圍日之圈若用歲輪則金水之歲輪反大於本天故不用歲輪也伏見輪半徑與本天等本天上歲輪心所行之周半在黃道北半在黃道南其勢斜立如太隂之出入黃道為隂陽厯也
