body:
  text: 不見動為留過此而輪心距日益近星在輪上漸向東行又是又見其東移之速而至於合伏是為𡻕輪之周以𡻕輪立算可以得其遲留逆伏之度以圍日圓輪立算所得不殊金水伏見輪圖五星行于𡻕輪起合伏終合伏皆從距日而生故五星之𡻕輪並與日天同大而𡻕輪之心原在本天周故其圍日象又並與本天同大上三星之本天色太陽外其大無倫又其行皆左旋頗費觧説故只用𡻕輪也至於金水本天在太陽天內伏見輪既與之同大又其度順行故用伏見輪伏見輪即繞日圓象如上三星圍日之圈若用𡻕輪則金水之𡻕輪反大於本天故不用𡻕輪也伏見輪半徑與本天等本天上𡻕輪心所行之周半在黃道北半在黃道南其勢斜立如太隂之出入黃道為隂陽厯也
