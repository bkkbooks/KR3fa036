body:
  text: 得數一百一十七步內減乙丙餘數八十四步折半四十二步為乙丁依句股法乙丁自乘一千七百六十四步甲乙自乘三千三百六十四步相減餘數一千六百步平方開之得甲丁四十步為形外垂線以乙丙底折半十六步半乘之得積凡求得鈍角形積六百六十步三角求積以量代算三角求積以中垂線乘半周得積蓋凡自形心作垂線至各邊皆等故中垂線乘半周為一切有法之形所公用方員及五等面六等面至十等面以上並同故以中垂線為濶半周為長其所作長方形即與三角形等積又中垂線至邊皆十字正方角即分各邊成句股形以乘半周得積即句股相乘折半之理假如鈍角形乙丙邊五十八步甲乙邊一百一十七步甲丙邊八十五步求積術平分甲乙兩角各作線會于心從心作垂線至乙甲邊如心庚乃量取中
