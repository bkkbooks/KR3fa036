body:
  text: 之兩識分中之䖏即正南正北也假如秋分後春分前測得日出之處在𫑗正之南識之又測得日入之處在酉正之南識之兩識分中即正南之位春分後秋分前測得日出之䖏在𫑗正之北識之又測得日入之䖏在酉正之北識之兩識分中即正北之位也又或取表影識於圓圈之周亦如前法兩識分中但秋分後春分前得正北春分後秋分前得正南表影用其對照之位也每日日中測南北真線圖日出日入之時其影必長日中之時其影必短日出
