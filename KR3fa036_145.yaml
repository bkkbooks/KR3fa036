body:
  text: 假如句二十一丈弦較和四十二丈求股求弦句實四百四十一丈以句併弦較和得六十三丈即股弦和為法除之得七丈為股弦較與股弦和相加折半得弦相减折半得股弦與句股和求句股以圖代算假如弦三十五丈句股和四十九丈求句股法先作甲丙弦三十五丈引之至乙為甲乙句股和四十九丈因以甲為心儘乙為界運規作一象限又以丙甲弦半之於丁以丁為心儘丙為界作丙戊甲半圓次自丁作垂線分半圓於戊以戊為心用丙為界運規作大半圓大半圓與象限相割於已從己向甲作直線割小半圓於辛乃作辛丙為句恰得二十一丈即辛甲為股恰得二十八丈與得之算法者不殊句股求積假如句二十一丈股二十八丈求面積以句二十一丈與股二十八丈相乘得五百八十八
  hash: sha256:715402d1851476ce65534d6ce203aeb9431f32f020f37a58810d3ae4f345065e
