body:
  text: 而惟金星光大故獨言金星也古謂五星晨見夕見皆為去日半次但分數不同耳金星去日十五度二百一十八萬二千六百一十分而為晨見去日四十五度二百一十八萬二千六百一十分為晨見去日最遠之度伏後又去日十五度二百一十八萬二千六百一十分而為夕見去日四十四度七百九十六萬三千八百七十分小分七十四為夕見去日最遠之數其以四十五度為金星去日最遠是則然矣而去日半次之說于法未真今推五星晨夕伏見限度各星不同土星限為一十一度木星限為一十度火星限為一十一度三十分水星限為一十度而金星則以五度為限合伏前去日五度為晨不見合伏後去日五度為夕見合退伏前去日五度為夕不見合退伏後去日五度為晨見又晨見夕見有順行退行之分合伏之後夕見西方者順行也順行漸遲遲而忽留為留退初退行漸近太陽為夕不見合退伏後晨見東方者亦為退行退行漸遲遲而忽順為留順初順行復近太陽為晨不見蓋漸差而東者日入後即可見漸差而西者日出前即可見也前朱鳥而後元武左青龍而右白虎
