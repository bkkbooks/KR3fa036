body:
  text: 為正割又如有正切正割求餘割以正切除正割得一七八八二九一六進七位為餘割有餘切正割求餘割以餘切正割相乘得一七八八二九一六退七位為餘割進七位者先除後乘退七位者即半徑除法也設弧三十三度三十分正弦正切餘切餘割四線互求設弧三十三度三十分正弦五五一九三七正切六六一八八五六餘切一五一八三五二求餘割以正切餘切相乘以正弦除之得一八一一八一為餘割或先有餘割正切餘切求正弦亦以正切餘切相乘以餘割除之得五五一九三七為正弦又或有正切餘割正弦求餘切有餘切餘割正弦求正切則以正弦餘割相乘以正切除之得餘切一五
