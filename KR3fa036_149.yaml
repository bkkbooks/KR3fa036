body:
  text: 句股和與弦相減得弦和較即容圓徑又法句股積四因之為實以弦和和除之得容圓徑假如句二十一丈股二十八丈求容圓句股相併為句股和四十九丈用句股求弦法求得弦三十五丈相減餘十四丈即弦和較為容圓徑又法句股相乘得兩句股積五百八十八丈倍之得一千一百七十六丈即句股四因積以弦和和八十四丈除之得十四丈為容圓徑又法句股相乘得五百八十八丈為實以弦和和之半四十二丈除之得十四丈為容圓徑容圓以圖代算假如句二十一丈股二十八丈求容圓但平分各角作線其線相交於己己即容圓之心從心儘一邊為界運規作圓恰得圓徑十四丈與得之算法者不殊句股容方句股相乘得兩句股積以句股和除之得容方徑又餘句餘股相乘開方得容方邊與句股和除句股倍積數同
  hash: sha256:a843f42b8489f3a5d98ee2f824c4a7282bd35f87c243922754c3582e116dfde1
