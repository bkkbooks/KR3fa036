body:
  text: 十七秒七帶食對兩心視相距角三度二十九分四秒五八其邊四分三秒五七為帶食兩心視相距得帶食八分三十八秒一七也五星地平髙弧定時圖五星之髙弧以赤緯定之五星之赤緯以黃緯推之五星之黃緯又以交點求之五星之交點隨時不同故黃緯亦隨時不同而赤緯之不同尤甚焉欲得五星之髙弧者須隨時察其正交度分而以黃道經緯變得赤緯然後以赤緯求髙弧而出入地平之時刻與距地平之度分可以按圖而得矣既得距地平度則以其赤緯轉求赤經得其所臨經度方位加距日經度變時即得時刻矣五星赤緯變動不居要當隨時依數為圖兹用道光丁亥首朔五星赤緯為一圖以見例土星距赤道北二十二度二十六分木星距赤道南四度十分火星距赤道南十二度二十九分
