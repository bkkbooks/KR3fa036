body:
  text: 赤道經緯相求有赤道有大距求距度法為半徑與大距正切若赤道正弦與距度正切有大距有距度求赤道法為大距正弦與大距餘弦若距度正切與赤道正弦又為大距正切與半徑若距度正切與赤道正弦又為半徑與大距餘切若距度正切與赤道正弦有赤道有距度求大距法為距度正切與赤道正弦若半徑與大距餘切又為半徑與赤道正弦若距度餘切與大距餘切又為赤道正弦與距度正切若半徑與大距正切又為半徑與距度正切若赤道餘割與大距正切今設以赤道十五度各舉其例以明之黃經距緯相求
