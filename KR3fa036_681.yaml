body:
  text: 分一度正實三四四八八三餘實九九九六九五五一一七開方得正弦一七四四九五九三餘弦九九九八四七七四四十五度正實六六九八七二九八餘實九三三一二七二開方得正弦二五八八一九四五餘弦九六五九二五八二六三十度正實二五餘實七五開方得正弦五餘弦八六六二五四四四十五度正實五餘實同開方得正弦七七一六七八一餘弦同求得己上四度正餘弦實即可竮折求取四十五度正餘弦即得九十度表竮折法如一合十五得十六折半得八度一次求法以二正弦相併為股以小度餘弦與度餘弦相減餘為句各自乘相併四歸之為所求度之正弦實以正弦實與通弦相減餘為所求度之餘弦實各開之得數再求法如得八度正餘弦實各開得弦數再求四度正弦却以八度餘弦與通弦十萬相減餘半之得四度正
