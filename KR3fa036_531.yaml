body:
  text: 之數為樞於赤道規樞之上下運之得赤道南北各距緯又從酉中上數南極入地之數作斜線過子午直線亦得南極折半得赤極規摳運之得赤極規即𫑗酉規規樞作地心橫線用切線作規於赤極規之內外得赤道經度而地平赤道可以互求其經緯矣又用南北真線測取地平經度或用緯度尺測取地平緯度以求赤道之經緯在太陽即為節氣時刻在月星加距日度亦即得各節氣時刻也地平北半周圖
