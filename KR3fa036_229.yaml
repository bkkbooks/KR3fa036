body:
  text: 等用算只四種正弧三角形以八線成句股乙丁寅為赤道乙丙癸為黃道乙與寅為春秋分癸為夏至午癸丁辰為極至交圈午與辰為南北極午丙甲為過極經圈丙乙為黃道距二分之度甲乙為赤道距二分之度即同升度丙甲為黃甲距緯成丙乙甲三角弧形甲為正角乙春秋分角與渾圓心𫑗角相應癸丁弧為黃赤大距即乙角之弧亦為𫑗角之弧癸己為乙角正弦𫑗己其餘弦戊丁為乙角切線戊𫑗其割線𫑗癸及𫑗丁皆半徑成癸己𫑗及戊丁𫑗兩句股形丙辛為丙甲距度正弦丙壬為丙乙黃道正弦作辛壬線與丁𫑗平行成丙辛壬句股形子甲為丙甲距度切線甲丑為甲乙赤道正弦作子丑線與丙壬平行成子甲丑句股形酉乙為丙乙黃道切線未乙為甲乙赤道切線作酉未線與子甲平行成酉未乙句股形
