body:
  text: 設弧十六度二十七分四十三秒求正弦法取設弧度分秒之弧線而併之得二八七三一五一三二為設弧之共分半徑九位弧線亦用九位自乘得八二五四九九八五為屢乘數又用二三相乘之六為第一除數四五相乘之二十為第二除數六七相乘之四十二為第三除數即用設弧共分為第一得數復為實以屢乘數乘之第一除數六除之得三九五二九七六為第二得數又為實以屢乘數乘之第二除數二十除之得一六三一五為第三得數又為實以屢乘數乘之第三除數四十二除之得三二為第四得數乃以第一得數與第三得數相併又以第二得數與第四得數相併復以後併數減先併數餘二八三三七八四三九截去末一
  hash: sha256:4299c7be42bc3ab07f9dc2d95f52b7ae669dc48a5ae760b5ce9b39ae9c036b27
