body:
  text: 月之從星則以風雨鄭康成引詩及春秋緯謂箕星好風畢星好雨且為好妻所尚之說諸家從之夫經星原有風雨之性𥡆尼閣亦言之而謂好妻所尚則陋矣以經星之本力言之黃道一十二象各具乾濕冷熱之性白羊金牛隂陽屬熱屬濕巨蟹獅子雙女屬熱屬乾天稱天蝎人馬屬冷屬乾磨羯寶甁雙魚屬冷屬濕其效尤著者如參井心尾等宿因內有五車大星柱星故主風參觜大角貫索主暴風昴畢主雨軒轅南河狼星主熱是也而所重則尤在於緯星土星效冷時變風雨為雹以損下物木星主風而益下物即又主雷亦順時而緩聲火星主猛雷雨主酷熱金星主濕而冷水星無定情經星本力亦有所其緯星之性光極大靜白者木星之性光大黃白者金星之性色紅有光或不甚光者火星之性不光明者土星之性如雲霧者皆水性之性又有黃白有光不大者則月性也光精明稍紅者則日性也𥡆氏以月與五星冲合度分推測各方風雨兼用𨇠次經星𠫵詳乾濕之性月從土星濕宫冷雲小雨天蝎人馬加冷夏至濕减熱冬至雪冷月從木星有風天晴冲和月從火星天氣有變
