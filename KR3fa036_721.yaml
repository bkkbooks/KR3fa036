  text: 又設赤緯南六十三度二十二分十一秒黃緯南四十五度總弧八十六度五十一分十一秒正弦九九八四九二較弧三十九度五十三分十一秒正弦六四一二六七三甲數一七八六一二三乙數八一九八七九六並與前同黃緯正弦七七一六八乙數大於黃緯轉於乙數內減去黃緯餘一一二一七二八為中數然後以甲數為一率中數為二率半徑為三率求得四率七二八二二八一為赤經餘弦檢表得四十三度一十五分四十三秒加三象限得
