body:
  text: 本極而成一點此經緯之度兩道同法也然而兩道之相差二十三度二十九分故其極亦相差二十三度二十九分而兩道緯圈之差數如之矣若其經度則兩道之相同者惟丑未之初度初分聮而為一圈其餘則皆有相差之度而其差又不等此其勢如以兩重罾網冒於圓球則網目交加縱橫錯午而各循其頂以求之條理井然至賾而不可亂此所以即顯見隱舉一知三可以經度求緯亦可以緯度求經可以黃之經求赤之經亦可以黃之緯求赤之經可以黃之緯求赤之緯亦可以黃之經求赤之緯用赤求黃亦皆復然宛轉相求而莫不吻合也用正弦求距緯圖
  hash: sha256:a7adaa264dbad1ec4fffa90f17e0a84aa0c9002a785d0c4fee0639d7bbcc3eeb
