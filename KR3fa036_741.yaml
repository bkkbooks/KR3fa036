body:
  text: 六三一四一八三三二四以半徑一千萬除之得七二六三一為地平緯正弦檢表用中比例得髙四十六度三十四分四十五秒四十二𢕄三十纎設立春求地平緯設立春求地平緯法以北極距天頂五十七度與立春赤道南緯十六度二十一分五十七秒相加為縂弧七十三度二十一分五十七秒正弦九五八一五二相减為較弧四十度三十八分三秒正弦六五一二二六八兩正弦相併一六九三七八八折半得八四六八九四為甲數甲數轉减縂弧正弦餘一五三四六二六為乙數設已正初刻求地平緯乃以半徑為一率已正初刻赤經距午三十度餘弦八六六二五四為二率甲數為三率求得四率六九
