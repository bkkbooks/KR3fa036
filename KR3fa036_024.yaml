body:
  text: 四萬四千六百九十一里一百四十四步金星在第三重天水星在第二重天略低于日火星在第五重天髙日倍半木星在第六重天髙日五倍土星在第七重天髙日十倍此其所行之髙下也髙下亦各不同即其內外之道或有經緯同度而為食為合為凌為犯者而其上下絶不相同則固未有相悖者也天之髙星辰之遠天體無形其髙本不可以道里計古言天之髙者凡十三家淮南天文訓謂天去地五億萬里張衡靈憲謂天去地一億一萬六千一百五十里王充論衡謂天去地十二萬一千六百六十六里帝王世紀謂天去地一十七萬八千四百八十五里半廣雅謂天去地二億一萬六千七百八十一里半洛書甄曜度春秋考異郵謂天去地一十七萬八千五百里春秋元命包謂天去地十三萬五千里三五律紀謂天去地九萬里關令內傳謂天去地四十千萬里考靈曜謂天去地八萬里河圖括地象謂天去地一億一萬六千里月令正義謂天去地一十九萬三千五百里諸家所言里數大半荒唐之説不可為據西法於七政之行測其髙度較地之半徑若干倍為其天去地心
  hash: sha256:09a5e3c7948e70620ecbf9eb2f5d2c5ba128a7c7086654c98a2be1873672bf20
