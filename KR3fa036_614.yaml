body:
  text: 金星距赤道南二十度二十分水星距赤道南十九度五十五分察地平線界得其出入之度分加距日度分得其出入之時刻用虛線於地平上量之得其距地平之度分與所臨赤道度分加距日度分得其時刻又從天頂作經度弧線得地平經度方位赤緯既移又當另為圖以求之五星伏見界圖五星之伏見既由於黃道之遠近亦由於地平之遠近也凡太陽在地平之下而五星在地平之上以太陽距地平下之度計之距地平五度則地平上之金星見距地平十度則地平上之木星水星見距地平十一度則地平上之土星見距地平十一度三十分則地平上之火星見距地平下之度未及其數則地平上之星不見此五星伏見之定限也法用地平下
