body:
  text: 出地度分然後用八尺之直表如法測之日中宵中日永日短古法晝夜百刻日中宵中晝夜各五十刻諸説皆同至於日永日短馬融謂長極於六十短極於四十據地中之言也授時法謂長極於六十二短極於三十八據燕都言之也鄭康成謂長極於五十五短極於四十五又取南北之適中者言之也蓋晝夜長短時刻由於南北極出入地與所居緯度之不同也天頂近於赤道則北極出地度數少即晝夜長短亦少天頂遠於赤道則北極出地度數多即晝夜長短亦多人從北地南行每二百里即更一度漸南漸移以今法九十六刻推之日中宵中各處皆是四十八刻至於日永日短在順天北極出地四十度則長極於五十九刻七分短極於三十六刻八分在河南北極出地三十五度則長極於五十七刻七分短極於三十八刻八分在江南北極出地三十二度有竒則長極於五十六刻六分短極於三十九刻九分在廣東北極出地二十三度則長極於五十三刻十一分短極於四十二刻四分星鳥星火星虛星昴
