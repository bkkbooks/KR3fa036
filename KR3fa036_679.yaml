body:
  text: 弦除餘弦以正切除半徑以餘弧除正割以半徑除餘切以正割除餘割得數並同又以半徑除正弦以正割除正切以餘切除餘弦以餘割除半徑得數並同又以正弦除半徑以正切除正割以餘弦除餘切以半徑除餘割得數並同故八線無非比例也試以三十度之各線分列為序以半徑居中左右對位相乘皆合一是為比例者三又挨次而除之皆合八六六二五四轉求之則皆一一五四七五是為比例者八又間一位而除之皆合五七七三五三轉求之則皆一七三二五八是為比例者十又間兩位而除之皆合五轉求之則皆二是為比例者八此八線互求之法所以反覆推之至于無窮也用開方求八線簡法求正餘弦簡法即以半通為十萬分實得一
