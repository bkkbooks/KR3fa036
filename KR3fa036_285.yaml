body:
  text: 甲乙算已戊得乙丙其角亦一鈍二鋭算戊鈍角得丙鋭角算己鋭角得乙鈍角而甲交角一算得之又戊甲乙形角一鈍二鋭引戊乙作圓又引乙甲至圓周巳成次形己甲戊與元形相當算己甲得甲乙算己戊得戊乙又同用戊甲邊算甲鋭角得甲鈍角算戊鈍角得戊鋭角算己角即乙角又甲己丙形三角俱鈍引丙己作圜又引丙甲至戊成相當次形己甲戊算甲戊得甲丙算己戊得己丙又同用己甲又丙鈍角即戊鈍角甲己兩鋭角並元形之外角斜弧三角形弧角互易用次形一乙甲丙形三角俱鋭易為丑癸寅形一鈍二鋭引乙甲作圓次引乙丙至酉引甲丙至未並半周次以甲為心作丁辛癸寅弧乙為心作戊丑癸壬弧丙為心作丑子午寅弧三弧交處别成一丑癸寅形與元形相當而元形之角盡易為邊邊盡易為角甲角之弧丁辛與次形癸寅邊等乙角之弧已壬與次形丑癸邊等
