body:
  text: 心外大圈為極至交圈內橫撱圈為赤道斜撱圈為黃道黃赤交角為春分秋分黃道兩端為冬至夏至黃道兩端距赤道兩端為黃赤大距直撱圈為赤道經度其交於赤道者為赤道經緯相交之正角其交於黃道者為經圈交黃道之角經圈交黃道之角距黃赤交角為所設黃道經度赤道正角距黃赤交角為所設赤道同升度黃道交角距赤道正角為黃赤距度赤道平安從交角視之則交角赤道象限與渾員心平半徑成一線其黃道之斜𠋣亦平從交角視之則交角黃道象限與渾員心斜半徑成一線黃赤相交成角而赤道既平安則從交角窺渾員心其半徑竟成一㸃而交角與渾員心角合成一角矣交角為春秋分之角其度不變經圈交黃道之角則隨度而移近大距則甚大類十字角近春秋分只六十六度半中間交角度度不同至經圈交
