body:
  text: 十七度二十一分終箕一度十分立冬日在氐二度二十一分小雪日在氐十七度二十一分仲冬日月會於星紀星紀丑次之號斗北方木宿六星形如北斗故亦謂之斗廣二十五度今法星紀初箕一度十一分終斗二十二度十五分大雪日在尾一度二十四分冬至日在箕一度十一分季冬日月會於元枵元枵子次之號婺女北方土宿四星如箕廣十一度今法元枵初斗二十二度十六分終虛九度三分小寒日在斗七度十六分大寒日在斗二十二度十六分凡此所推入次度分以今道光甲申𨇠度定之至於每歲差五十一秒積七十年有竒則差一度又當隨時移换不可膠於一定也土圭之法土圭之法立一表於地上長八尺于夏至晝漏之半時用尺有五寸之土圭量表之日景若景與土圭等即地中也如影短於土圭是地于日為近南影長于土圭是地於日為近北如偏東于土圭如日之將夕是地於日為偏東偏西于土圭如日之捋朝是地于日為近西皆不得中也以今八線推之夏至之景長尺有五寸是其天頂去日十度四十二分加北緯二
