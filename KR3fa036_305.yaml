body:
  text: 一率丁己餘弦即戊丁正弦二率甲丁餘弦即丁庚正弦三率亥己餘弦即亥戊正弦四率亥甲餘弦即亥丙正弦假如星在甲求其黃赤經緯則亥丁如兩極之距亥角若為黃經則丁角為赤經而亥甲黃緯丁甲赤緯也若丁角為黃經則亥角為赤經而丁甲黃緯亥甲赤緯也黃經赤經皆距至度黃赤緯皆距極度也法為亥角之餘弦與亥甲之餘弦若丁角之餘弦用丁鈍角實用外角與丁甲之餘弦又為丁角之餘弦與丁甲之餘弦若亥角之餘弦與亥甲之餘弦反之又為丁甲之餘弦與丁角之餘弦若亥甲之餘弦與亥角之餘弦又為亥甲之餘弦與亥角之餘弦亦若丁甲之餘弦與丁角之餘弦也又如月在甲求其黃白經緯則丁亥如黃白兩極之距亥角若為黃經則丁角為白經而亥甲黃緯丁甲白緯也若丁角為黃經則亥角為白經而丁甲黃緯亥甲白緯也又如星在甲求其赤道經緯與地平經緯則丁亥如天頂距北極亥角為赤道距至度則丁角為地平距午度而亥甲星距北極丁甲星距天頂也丁角為赤道距至度則亥角為地平距午度而丁
