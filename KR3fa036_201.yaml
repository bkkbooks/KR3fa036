body:
  text: 徑大方徑小其比例若一一二八三七九與一又若一與八八六二二六也有圓徑求同積之方徑以一乘一一二八三七九除或以八八六二二六乘一除並得方徑有方徑求同積之圓徑以一一二八三七九乘一或以一乘八八六二二六除並得圓徑約法以八八六二二六乘圓徑去末六位得方徑以一二二八二七九乘方徑去末六位得圓徑同積較周凡方圓同積則圓周小方周大其比例若一與一一二八三七九又若八八六二二六與一也約法以一一二八三七九乘圓周去末六位得同積之方周以八八六二二六乘方周去末六位得同積之圓周同徑較積較周即方內容圓圓外切方凡方圓同徑則方積大圓積小周亦如之其比例若四與三一四一五九二六五方徑一周四積一圓徑一周三一四一五竒積七八五三九八一六方徑二周八積四
