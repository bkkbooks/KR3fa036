body:
  text: 用正切求距緯圖黃赤道各節距緯度分可以正弦求之亦可以切線求之以正弦求之者以半徑九十度之正弦為一率大距二十三度二十九分之正弦為二率現在黃道經度之正弦為三率求得四率為距緯正弦或以切線求之亦同又簡法先作二十三度二十九分之交角紀其度于對角之弧次分黃赤兩道經度每十五度為一節聨黃赤而弧之從各節作正弦至赤道又從各節作直線至外弧得距度或用切線則其句股之形不在弧內而在弧外所得亦同又或用正弦線尺切線尺量之其法尤㨗黃赤距度表
