body:
  text: 十四度得去赤道三十四度四十二分即北極出地南極入地亦三十四度四十二分如向南行一百四十里天頂去赤道三十四度其景祗得一尺四寸一分為短於土圭如向北行六十里天頂去赤道三十五度其景則有一尺五寸六分八釐為長於土圭又其地之南北真線當天地之中如向東行二百里則當午前四分未及午正而己有一尺五寸之長如向西行一千里則至午後一刻五分己過午正而轉符一尺五寸之數惟天下之中夏至正午恰得尺有五寸此土圭之法所以垂于萬世也至鄭康成謂日景於地千里而差一寸考劉宋時測景交州去陽城萬里而景差一尺一寸八分梁魏測景金陵去洛千里而景差四寸唐開元測景白馬縣至上蔡武津五百二十六里二百七十步而差二寸有餘則千里一寸非其實矣蓋因北極出地髙下不同而其南北長短之差漸次增減不可以千里一寸限也馮相氏掌十有二歲賈疏言歲星百四十四年而跳一辰千七百二十八年而一大周今按時憲書歲星每年平行一辰又八十七分辰之一計八十七年有竒而跳一辰千四十
  hash: sha256:cdb1002b77dd98b3dffcfff12c6d3cfe363049fea1d53a998f482eb2cbd6ff86
