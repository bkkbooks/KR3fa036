body:
  text: 旋之跡即成赤道內外之距緯二分無距緯正當赤道之上赤道即為晝夜平規赤道之北二十三度二十九分為夏至運之成晝長規赤道之南二十三度二十九分為冬至運之成晝短規是謂三規又將各中氣運之成七圈是謂七衡又將各節氣運之成十三圈是謂十三道如圖春秋分道無距緯清明白露道距赤道北五度五十五分驚蟄寒露道距赤道南五度五十五分穀雨䖏暑道距赤道北十一度三十分雨水霜降道距赤道南十一度三十分立夏立秋道距赤道北十六度二十二分立春立冬道距赤道南十六度二十二分小滿大暑道距赤道北二十度
