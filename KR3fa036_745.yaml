body:
  text: 設赤道南緯十六度二十一分五十七秒地平上緯三十二度五十四分五十九秒求地平經法以北極距天頂五十七度與地平緯三十二度五十四分五十九秒相加為總弧八十九度五十四分五十九秒正弦九九九九九八八相减為較弧二十四度五分一秒正弦四八六九四兩正弦相加得一四八六八二折半為甲數七四三四一甲數轉减總弧正弦餘二九五九六四七為乙數赤緯正弦二八一七六四七與乙數相加得五七七七二九四為中數以中數與半徑相乘以甲數除之得八一九一四一一為地平經餘弦檢表得地平距午三十五度四秒即𫑗酉正偏南五十四度五十九分五十六秒也又或赤道緯北十六度二十一分五十七秒亦以地平上緯三十二度五十四分五十九秒算之則甲數乙數雖同而中數大異法以赤緯正弦轉减乙數餘一四二為中數以中數與半徑相乘以甲數除之得二一六九四為地平經餘弦檢表得地平距午八十八度五十分三十九秒三十一𢕄即𫑗酉正偏南一度九分二十秒二十九𢕄也
