body:
  text: 最小距限圖古法黃白大距不逾六度弦望無殊西法交角有大小朔望最小兩弦最大今測日在交㸃交角大前後皆小朔望尤小日在大距交角小前後皆大兩弦尤大最大則五度一十七分二十秒最小則四度五十九分三十五秒於是各以其度為半徑作圓平分三百六十度又以半徑為距度尺細分距度用法將圓周度分上下作線相對牽切距度尺上視尺上所切之度即得各宫各度之距度也黃赤距度恒起春分黃白距度則從正交起數以距交之遠近分其宫度正交移則宫度亦移而緯度之大小隨之黃白距度表
