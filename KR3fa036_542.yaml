body:
  text: 線過午即取為界抵子正㸃極處折半求樞運之得一七宫規若二八宫求樞在已推得鹽城二八宫極髙二十九度二十一分即從赤道中中上數二十九度二十一分作斜線過巳亦取為界抵亥正㸃極處折半求樞運之得二八宫規其餘各宫求樞運規俱仁此法推之北極離十二宫表北極出地之髙下以一七宫之規線定之四十宫之直線則天下之所同也而三九五十一宫二八六十二宫又因一七宫之髙下而各異其髙下者也今用宫北極出地度度分度分度度分度分
