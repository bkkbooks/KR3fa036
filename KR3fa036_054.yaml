body:
  text: 二十九日五十三刻五分九十三秒會合太陽而少五日六十三刻二十八分八十四秒為朔虛計每日盈一刻四十三分五十三秒四七七五虛一刻五十八分九十五秒六一七一一月共得九十刻六十二分八十二秒一歲共得十日八十七刻五十三分八十四秒是為通閏置閏之法其先則三年一閏者三繼以兩年一閏者一續又三年一閏者二繼以兩年一閏者一三年一閏則三十二日六十二刻六十一分五十二秒五歲再閏則五十四日三十七刻六十九分二十秒十有九歲七閏則二百六日六十三刻二十二分九十六秒至七閏則氣朔分齊是為一章也今時憲術採用西法定天周為三百六十整度其法最善蓋與其為畸零之度而初不能合於日行即不如以天為整度而用為起數之宗且以三百六十命度則經緯通為一法黃赤可以互求以測七曜則度分易得以算三角則理法易明此固西法之勝于中法者又以歲實消長不同初定歲周為三百六十五日二四二一八七五後加推測改為三百六十五日二四二三三四四二其下又有小餘一四一五八三三計得三百六十五日五小時三刻三分五
