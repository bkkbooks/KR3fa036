body:
  text: 丙乙甲形丙正角餘兩鋭角相等邊三小相等者二易為己癸壬次形角一鈍二鋭鋭相等以甲為心作寅己丑半周則甲角之度子寅弧成次形已壬邊以乙為心作𫑗己午半周則乙角之度𫑗辰弧成次形己癸邊此所成二邊相等以丙為心作亥癸壬未半周則丙角之度即為次形癸壬象限邊平分次形以已壬酉形求壬角得原設甲丙邊乙丙邊求半己角倍之成己角以減半周得原設乙甲邊若設丙戊丁形丙正角兩鈍角同度二大邊同度一邊小易為己癸壬次形與上同法惟丁戊用外角若設甲丙戊形丙正角餘一鋭一鈍而鋭角鈍角合成半周邊二大一小而小邊與一大邊合成半周易為已癸壬次形亦同上法惟甲用外角戊用本角而同度所得次形之邊亦同度其轉求本形也用次形之壬角得甲丙以減半周即得丙戊或乙丙丁形亦同右本形有正角次形無正角而有象限弧得次形之象限弧即得本形之正角或三角形無相同之邊角而有正角其次形必有象限弧或無正角而有相同之邊角其次形亦有等邊等角凖此論之
