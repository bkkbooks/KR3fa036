body:
  text: 乙數為緯度正弦若遇乙數四率相减至晝者其星正當赤道無緯度也若求赤經則皆用赤緯加减大距以生甲乙二數視黃赤二緯同向以乙數與黃緯正弦相减成次率而求得四率為赤經餘弦相减亦有二法視乙數小於黃緯必以乙數减黃緯而赤緯在北赤經必南六宫赤緯在南赤經必北六宫乙數大於黃緯宜以黃緯减乙數而赤經南則赤經亦南赤緯北則赤經亦北又視黃赤二緯異向則以乙數與黃緯正弦相加成次率而依法求得四率為赤經餘弦查餘弦表得度春分後减象限夏至後加象限秋分後减三象限冬至後加三象限皆命為距春分赤經有黃經黃緯求赤緯設黃經距春分三十度黃緯北十度法以黃緯與大距相加為總弧相减為較弧總弧三十三度二十九分正弦五五一六九四四較弧一十三度二十九分正弦二三三一六二五兩正弧相加七八四八五六九折半得三九二四二八四為甲數以甲數轉减總弧正弦得一五九二六六為乙數法為黃道半徑與黃經正弦若甲數與黃弦距赤用四率求得黃弦距
