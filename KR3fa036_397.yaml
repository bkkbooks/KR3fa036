body:
  text: 以斜面為正象限但斜立耳其底在赤道者轉成撱圓以距度逐度之正弦為其髙反以小徑當二至大徑當二分圓容方直儀圖圓容方直儀即句股方錐之方直儀而不用割切線祗以各弧正弦矢度相求其用已足一立面大距度成句股一斜立面距度正弦移於立面成句股一平面赤道度成句股一斜平面黃道正弦移於赤道成句股黃道正弦能移於平面者有相望兩立線為之限也距度正弦能移於立面者有上下兩橫線為之限也此四線相得成長方其立如堵故又曰弧容直濶也用法有大距黃道求距緯一率半徑二率大距正弦三率黃道餘弦四率距緯正弦更之可求大距
