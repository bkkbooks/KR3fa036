body:
  text: 而星體行伏見輪周其勢亦斜立與之相應故其交角等歲輪心在正交或中交則星無緯度故伏見輪上亦有正交中交歲輪心行本天隂厯半周即星在伏見輪上亦行北半周歲輪心行本天陽厯半周即星在伏見輪上亦行南半周緯之大小亦無不與之相似聨正交中交成一線此線在本天必過地心而在伏見輪亦必過日心以此線為橫線而均剖之作十字垂線則上下兩端所指並半交大距度矣此伏見輪上十字線之理也伏見輪交角圖伏見輪心即太陽太陽行黃道三百六十度伏見輪亦隨之行三百六十度而十字之形不變此正視之形也正視圖不能見交角故必以旁視明之伏見輪事事與本天等故以本天明之如圖甲丙乙壬為本天渾圓之體因旁視即見本天渾體甲心乙即本天之星道因旁視
