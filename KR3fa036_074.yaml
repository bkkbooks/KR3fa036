body:
  text: 魄死則明生月與日會曰朔朔日魄𥁞曰死魄其二日曰旁死魄三日曰哉生明亦曰朏朏月出也三日明生之名距日一象限故人所見之光如泮璧曰上弦與日對度日望望後以漸而𧇊月距日又過乎半周曰既望曰既生魄望後又行一象限月復近日亦一象限故人所見之泮璧向東曰下弦月終光𥁞體伏曰晦哉生明在三日而今之見光有遲速不同者其故由於地平及黃道也人居地面而見月光者必月輪在地平上髙十二度方可得見不然則否蓋月光之見否由於離地平之髙低不由於離日輪之遠近也故黃道交於地平不同有斜相交有正相交朔時日月同度若在斜交之宫則居地面者遲見月光也若在正交之宫則速見其光也又月因有遲疾厯亦有離太陽遲速在遲歷必遲離太陽在疾歷必速離太陽也揆之以日揆之以日即周禮所謂置𣙗以縣視以景為規置日出之景與日入之景晝參諸日中之景是也鄭注云于所平之地中央𣗳八尺之𣙗以縣正之視之以其景將以正四方日出日入之景其端則東西正也又
