body:
  text: 求弦矢求八線法舊用六宗三要以六種邊之弦求本弧之餘弦并求倍弧之正餘弦及半本弧之正餘弦又增弱半弧半半弧又半半弧錯綜得七十二又二簡法一以不等兩弧之弦求加減弧之正餘弦如六十度以內正弦每越五分而得一弦可得七百二十一以兩弧距六十度前後之度等得其兩正弦之較即得距弧之正弦如求六十度以外之正弦亦越五分而得一弦可得三百六十又用前法以求十二度弦作四次折半得四十五分弦又三而三之得五分弦又折半而三之得五十秒弦然後以弦比弦而得六十秒之弦由此可推五千四百之八線今用杜氏法任設畸零之弧分不必符乎六宗依乎三要而弦矢可得且與密率無殊焉斯誠術之竒而捷者也設弧二十一度十九分五十一秒求正弦法於弧弦表內取二十一度十九分五十一秒之弧線而併之得三七二二九三二五為設弧之共分半
  hash: sha256:afce1650cde0a05d4b7dcaed8989aede678273982a9fa45f2cc3ef68a55478f1
