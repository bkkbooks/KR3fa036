body:
  text: 一率半徑一二率甲分角十度割線一一五四二六七三率甲丁中長線三百四十六尺四寸一分四率甲乙邊三百五十一尺七寸五分鋭角形有三邊求角假如甲乙丙鋭角形有乙丙邊二十丈甲丙邊一十七丈五尺八寸五分乙甲邊一十三丈五寸任以大邊為底分為兩句股形一甲丁丙形以甲丙邊為弦丁丙為句一甲丁乙形以甲乙邊為弦丁乙為句兩弦相併為總相减為較兩句相併即乙丙邊原數為句總求兩句相减之數為句較以句總比弦總若弦較與句較也一兩句之總即乙丙二十丈二兩弦之總三十丈六尺三寸五分三兩弦之較四丈五尺三寸五分四兩句之較即丙戊六丈九尺四寸六分求分形之兩句以句較减句總餘乙戊一十三丈五寸四分半之得丁乙即戊丁六丈五尺二寸七分為甲丁乙分形之句又以戊丁加句較即戊丙得丁丙一十三丈七寸三分為甲丁丙分形之句求丙角以甲丙弦比丁丙句若半徑
