body:
  text: 一分二十四秒為黃道經度也設赤道三十度黃道三十二度十一分二十四秒求大距法以黃道正切六二九四八六八與赤道餘切一七三二五八相乘得一九三三一一五五二九四四為實半徑除之退七位得正割一九三三一檢表得二十三度二十九分為黃赤大距也又法以赤道正切五七七三五三與黃道餘切一五八八五九五六相乘得九一七一七六一四六二三八六八為實半徑除之退七位得餘弦九一七一七六一檢表得二十三度二十九分為黃赤大距也又法或以赤道正切除黃道正切進七位得大距正割或以黃道正切除赤道正切進七位得大距餘弦並同
