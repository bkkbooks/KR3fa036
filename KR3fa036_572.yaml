  text: 大寒一五二九三九二五六六六九七七四七四一八三五一八一五六七九二五三一七七三六四二小雪立春五四二五六四五六六四六七九七八五七四四九八四四六三七七七五一六五三三七四一三七立冬雨水一三三一六五三五七五五九四一一七九二八八九八六八二八八三六九七六一一五五霜降驚蟄一六一三八六六三八九三一一三二一二三七六六六二八七八九五三五六九二八三九八三九三寒露春分二二二四六一七三六一五六一三八一一五三九三五一七一一九三六六二三八八四四五八八六五秋分清明五六二八一五三七八四六一二四一七一一九五六二五六五七三三一和四五六二五七九五五九九七八白露穀雨一九三三八六八九五二一四三四二九四二五四二二三四四八一三九五八四二三五五四七五一八一五一處暑立夏一五五三八八六六九一四五一六一七二五四七三三五四四四二九一二五二二二一三三三三五九四三三三立秋小滿一九一四二五七一五一一一五一七六二二九九一四四七六六四八八四八七五一八二三五七五三五七六六四五四大暑芒種二一四四四九七四三一一五八一八五三三三一五五四九三三八一四四一七八五六八六五一一一三二五二六四五二五六四小暑夏至一七二二二四五七七五三一一七三一八八六三四三四五九九七四五五一六一四八三五七五五四六一二一七二五六三一一九五七夏至戌初酉正酉初申正申初未正未初午正太陽倒影隨地長短不同亦隨時長短不同兹用鹽城北極出地三十三度推算各節氣各時刻之倒景列表作句晷按表中丈尺點之或止用句股尺量取倒景亦得時刻表有長短依法加減乘除用之勾股二法大抵相須而成直景近午之數最明而出入為無窮景不可測量須用倒景以濟其窮倒景出入之數最明而正午之時景又甚長亦須用直景以濟之
