body:
  text: 指為正東正西以影端指節氣界定之察節氣線上之時刻界定本地之時刻惟午正影出線外亦當以平面日晷與之相濟平面日晷日出日入為無窮影又當以此晷濟之晷用𥂁城北極出地三十三度其餘各䖏用此晷者晷體皆同但北極出地多一度者將天頂線南移一度北極出地少一度者將天頂線北移一度即可各得本地時刻也太陽出入時刻表一太陽出入時刻惟春秋分正當赤道日出𫑗正日入酉正為天下之所同其餘各節氣出入時刻因北極冬至冬至小寒大雪大寒小雪立春立冬雨水霜降驚蟄寒露春分秋分清明白露穀雨䖏暑立夏立秋
