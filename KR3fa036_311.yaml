body:
  text: 積以全周四分之得一五七七九六三為象限弧線以全周三百六十分之得一七四五三二為每度之弧線兩數相乘得二七四一五四二一九八三一六為渾圓一度之面積渾圓體積渾圓徑二求得渾圓周六二八三一八五三周徑相乘得一二五六六三七六一四三五九一七為渾圓面積四除渾圓面積得三一四一五九二六五三五八九七九為平圓面積又以渾圓徑二乘平圓面積得六二八三一八五三七一七九五八六四七六八六三為圓柱積倍圓柱積為一二五六六三七六一四三五九一七二九五三七二六以三除之得四一八八七九二四七八六三九為渾圓體積蓋渾圓得圓柱三之二也或用徑上立方求渾圓積以渾圓徑二自乘得四為平方面再自乘得八為立方積以圓率三一四一五九二六乘之得二五一三二七四一二
