body:
  text: 同亦各節氣不同然所不同者所占之赤道度而地平之十八度則無不同也故乾䇿坤䇿之多寡為陽盈隂虛自然之數也敬致敬致即周禮所謂致日蓋於夏至午時立八尺表表下橫置尺五之土圭伺日行至中天而察其晷影之長短也致日之法先要知太陽緯度夏至在赤道北二十三度二十九分為緯度之極北其影極短以後緯度漸減至秋分正當赤道無緯度既過秋分漸生南緯影亦漸增至冬至在赤道南二十三度二十九分為緯度之極南其影極長自冬至以至夏至由南而北亦然其次要知里差里差南北論本地北極出地度分前所論緯度髙下是每日不同至論里差則雖同此一日而北方日影與南方不同其次要知句股算法測移有二法一用直表而取平地之影一用橫表而取壁上之影二者皆是句股形土圭法用直表表為股而平地之影為句也得句則知斜對之弦而太陽之髙度可推所謂日至之景尺有五寸就中州夏至言之也若順天夏至則二尺三寸七分江南夏至則一尺二寸六分各首長短不同須先測北極
