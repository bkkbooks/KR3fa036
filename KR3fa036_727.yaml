body:
  text: 赤道地平經緯相求從𫑗酉正起算以距𫑗正赤道度及赤地大距度求地平度法為半徑與赤地大距之餘弦若赤道之正切與地平之正切從午正起算則為半徑與赤地大距之餘弦若赤道之餘切與地平之餘切從𫑗酉正起算有地平大距轉求赤道法為半徑與大距之割線若地平之正切與赤道之正切從午正起算則為半徑與大距之餘弦若地平之餘切與赤道之餘切求距地平用簡法以赤地大距與赤道度相加為總弧相減為較弧而各取其餘弦以相加減總弧過象限則加不及則減而折半為距地平正弦起算午正
  hash: sha256:26d72a3fd9e28e79e6307d1bb2c4ba0aa364bf774e5d7b59b3864a6a02b270ee
