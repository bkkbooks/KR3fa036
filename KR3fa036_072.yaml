body:
  text: 濕宫有雨熱宫乾宫有大熱紅雲夏至雷月從金星小雨春分濕雲夏至小熱秋分雲冬至雪月從水星乾濕冷熱在十二宫之性而各地方旱潦不同尤須看各處天頂經星同五星之性其有地方不遠而旱潦相反者蓋以此也明魄朔望月體無光恆借太陽之光故日光照及其體則明不及其體則暗如使月本有光則近於日遠於日其光恆一絶無消長矣今朔則月全無光上弦漸長下弦漸消必借於日明也日在天上月天在下日光在月恆照半體朔日日月同度月正居日之下日光獨照其向上之半不照其向下之半人居地上獨能見其無光之下半而不能見其有光之上半故朔之日視月全無光也過朔日則月東行而漸離於日日輪在西月亦受光於西愈近於日日光愈照其上面愈遠於日日光愈照其下面以離太陽有遠近故其光無時不消長也月當望時乃正相對於日輪日光全照其向下之半日力得見而其向上者無光人日俱所不及焉故望日月光滿全也過望日後目力漸不能及月光漸消以至無光焉日為魂月為魄魄是黯處
