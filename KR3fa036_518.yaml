body:
  text: 則最小以平度六十分計之赤道之下一度得六十分去赤道二十度者一度止得五十六分二十三秒去赤道三十度者一度止得五十一分五十八秒去赤道四十度者一度止得四十五分五十八秒用分秒變里數積十八秒為一里積三分為十里積三十分為百里積五度為千里積五十度為萬里依法推得去赤道三十三度之地其經度得五十分二十九秒凡東西相去一百六十七里有竒而差一度也細推一百六十七里二百六十四步一尺四寸一分六釐中國各省經緯度圖魏氏書中所載各省經緯圖用方格平分度數既不明於度有濶狹之義各書所分偏度俱以京師為中線度其東西而又不知京師之仍有偏度也放渾儀
