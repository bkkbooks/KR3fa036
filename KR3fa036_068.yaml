body:
  text: 交是陽歷則白極在黃道南半交是隂厯則白極在黃道北白極循黃極而左旋距黃極恆五度而距赤極則隨時不同惟交㸃在二分時半交與白極並在極至交圈其距黃極之線合於黃赤兩極之距線正交在秋分中交在春分白極在兩極距線外則距赤極二十八度半正交在春分中交在秋分白極在兩極距線內則距赤極十八度半若交㸃離二分則否交㸃一周天而半交大距亦一周天而白極之循黃極而左旋者亦一周天而復於原度焉測大距必在半交時又必於月當冬夏二至時當半交而又當冬夏二至則兩交必在春秋二分值兩弦則日必在春秋分而適當兩交值朔望則日必在冬夏至而距半交春分上弦秋分下弦而月距半交是月當夏至而日在兩交也春分下弦秋分上弦而月距半交是月當冬至而日在兩交也以兩弦與日在兩交而論皆交角大冬至之日望而月距半交是月當夏至而日距半交也夏至之日望而月距半交是月當冬至而日距半交也以朔望與日距半交而論皆交角小各測其距赤道度與黃赤大距相减則最大最小之黃白距限皆得矣
