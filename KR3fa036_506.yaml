body:
  text: 之時極長以次漸短至午正而極短過午漸長至入而又極長測得日影極短之處即正南正北也法置十尺之表直立為股日之斜照為弦平地所得之影為勾假如鹽城北極出地三十三度之處立春日置十尺之表測影方交午初其影一丈二尺五寸四分一釐七毫測至極短之時其影止得一丈一尺六寸六分七釐二毫過此又漸加長則此一丈一尺六寸六分七釐二毫之影即正午時之影亦即正午方之影矣蓋正午之處時刻方位合一不拘何地何時無不同者故可以每日測之而得其南北之真線也測日月星髙度求南北真線圖日月星方出地平時與將入地平時其距地平之度甚卑至午正則極髙極髙之處即正南也測法不拘是日是月是五星是恆星亦不拘何地何時但於隨在所見一曜用儀器測其髙度先於未到正午處測
