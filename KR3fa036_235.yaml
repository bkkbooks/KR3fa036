body:
  text: 一率戊丁四三四四六六六二率丁𫑗一三率子甲二九三六六八二四率甲丑六七五九二九六檢表得甲乙四十二度三十一分三十五秒假如有丙乙黃道距二分之度徑求甲乙赤道同升度法為半徑𫑗癸與乙角之餘弦𫑗己若丙乙黃道之切線酉乙與甲乙赤道之切線未乙也丙乙黃道距二分四十五度求甲乙赤道一率𫑗癸一二率𫑗己九一七一七六三率酉乙一四率未乙九一七一七六檢表得甲乙四十二度三十一分三十五秒若先有甲乙赤道同升度而求黃道丙乙距二分之度測反用之為半徑丁𫑗與乙角之割線戊𫑗若甲乙赤道之切線未乙與丙乙黃道之切線酉乙也甲乙赤道四十二度三十一分三十五秒求丙乙黃道一率丁𫑗一
