body:
  text: 即丁角正弦求乙丙邊法為乙角之切線即丁壬切線與丙角之餘切即戊壬正切若半徑與丙乙之餘弦即壬角餘弦即得兩邊可求餘邊以上又次形三角求邊用次形止一弧一角相易今用又次形則兩弧並易為角兩角並易為弧斜弧三角易大為小用次形一甲乙丙二等邊形三角皆鈍先引乙丙邊成全圓又引甲丙甲乙兩邊出圓周外會于丁又引兩邊各至圓周如戊如巳成乙丁丙及戊己甲兩小形皆相似而等即各與元形相當而大形易為小形次形甲戊甲己二邊為元形邊减半周之餘則同一正弦次形己戊二角為元形之外角亦同一正弦而次形甲角原與元形為交角戊己邊又等乙丙邊故算小形與大形同法惟於得數後以减半周即得大邊及鈍角之度其交角甲及相等之戊已邊只得數便是并不用减二甲乙丙三邊不等形角一鈍二銳引乙丙作圓又引餘二邊至圓周巳戊得相當次形己甲戊算戊甲得甲丙算己甲得
