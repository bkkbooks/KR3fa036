body:
  text: 各數八十度折半為樞運之得一十規為距地平一十度又各數七十度六十度五十度四十度三十度二十度一十度依法運之得二十規至八十規其九十規即天頂之點也而日月星之升降各以其赤道內外之度得其地平髙下之度焉地平上加赤道經緯圖地平經緯上加赤道經緯法以天頂為心從地平酉中下數本地北極距天頂之數對𫑗中作斜線得北極又上數南極入地之數作斜線過子午直線得南極折半得赤道規樞運之成赤道規又用黃赤距緯
