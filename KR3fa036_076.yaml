body:
  text: 為規以識之者為其難審也自日出而晝其影端以至日入既而為規測景兩端之內規之規之交乃審也度兩交之間中屈之以指𣙗則南北正日中之景最短者也按日出入時其景甚長端不可識故為規以識之非先識景端而後為規也其法於國中治地極平作圓規中心置臬日出時景在臬西視景交規處識之日入時景在臬東視景交規處識之末取兩交相距中屈以指臬夏至前後屈處為正南臬為正北冬至前後屈處為正北臬為正南又按春秋分時日出之方即正東日入之方即正西其景終日成一直線即正東正西之直線其餘節氣春分後秋分前有偏北之度則有偏南之景秋分後春分前有偏南之度則有偏北之景必為規以識之而後中屈指臬以得南北之正向也又按日中之景最短每日皆然其最短之處即南北真線所在正南北者又當于此參之較出入之景尤的也東有啓明西有長庚啓明長庚皆金星也以其先日而出故謂之啓明是晨見東方時也以其後日而入故謂之長庚是夕見西方時也五星皆有晨見夕見金水又皆附日而行
