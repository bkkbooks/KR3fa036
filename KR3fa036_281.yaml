body:
  text: 周為戊丙餘並同前以上三角求邊正弧形弧角相易又法用又次形甲乙丙形依前法引乙丙邊甲乙邊各滿象限至庚至己作庚己弧引長之至丁亦引甲丙會于丁亦各滿象限成丁丙庚次形又引丙庚至辛引丙丁至戊亦滿象限作辛戊弧引之至壬亦引庚丁會于壬則辛壬庚壬亦皆象限成丁戊壬又次形此形與甲乙丙形相當乙丙邊易為壬角乙庚及丙辛皆象限內減同用之丙庚則辛庚即乙丙而辛庚即壬角之弧也乙邊甲易為丁角乙甲之餘度己甲即丁交角之弧也是次形之兩角即元形之兩邊也乙角易為丁壬邊丁己及庚壬俱象限內減同用之庚丁則丁壬即己庚而為元形乙角之弧也丙角易為戊壬邊丙交角之弧辛戊其餘為次形戊壬也是次形之兩邊即元形之兩角而次形戊丁邊即元形丙甲次形戊角即元形甲角也若原形有三角則次形有戊直角有戊壬丁壬二邊可求乙甲邊法為乙角之正弦即丁壬正弦與半徑若丙角之餘弦即戊壬正弦與乙甲之餘弦
