body:
  text: 太隂火金水星地半徑差表太隂地半徑差分最大兩心差最小兩心差而以最髙宫度定之火星金星水星地半徑差分最髙最卑中距而以地平實髙定之測得髙度既減去蒙氣差矣又依地半徑差數加之始為實髙假如測得月火金星髙三十九度五十八分五十秒太隂若在最大兩心差時初宫初度則得實髙四十度五十三分四十四秒火星若在最髙則止得三十九度五十九分四十一秒金星若在最髙則又得四十度零一十秒視髙同蒙氣之差亦同而實髙不同者則以地半徑差各曜不同故也
