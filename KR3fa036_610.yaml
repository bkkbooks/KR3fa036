body:
  text: 五分五十三秒九五求得真時視行三分二十六秒二三真時距用時一十一分三十九秒八與用時相加得午正三刻六分三十九秒為食甚真時求得垂線四分二十九秒即食甚真時兩心視相距也日食𢃄食圖推日食帶食徑求兩心視相距以地平為斷凡已初𧇊而𢃄出者止求𢃄出時之相距未復圓而𢃄入者止求帶入時之相距若已過食甚而帶出者即以帶食視緯求復圓用時未及食甚而𢃄入者即以𢃄食視緯求初𧇊用時如圖𢃄食食甚用時辰正二刻一分五十一秒一六日出辰初一刻九分二十九秒二三在用時前四刻七分二十一秒九三以一小時兩經斜距三十三分一十秒二三為比例得𢃄食距弧三十七分一十四秒五四用時兩心實相距四十三分三十七秒八帶食兩心實相距五十七分二十一秒八一赤白交角八度四十分五十秒六八日出時赤經髙弧交角四十五度四十分四十八秒三八白經髙弧交角三十六度五十九分五
