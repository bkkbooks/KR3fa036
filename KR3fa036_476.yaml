body:
  text: 渾天之法南北平分其為匾渾天儀皆近赤道者其度最濶近南北兩極則漸狹至變而為蓋天之法則其在赤道之內者與匾渾天儀之北半圓同而其在赤道之外者轉以漸密之度改為漸疏之度愈近南則其度愈濶而星辰位置與匾渾天儀之南半圓大不侔矣此亦視法之理不得不然者也但愈南愈濶之度至南極則圖不可容令用割圓之法於黃道外又加五星南緯以便安置七政亦取測量足用已耳黃赤經緯表
