body:
  text: 置議者也測太陽法以四遊圈東西推轉窺衡南北低昂令太陽從衡孔透光圓正乃視四逰圈下周指時度表臨於天常赤道之某時刻分即太陽時刻於太陽出入地平時測得太陽出入時刻乃計距午正前後若干刻分倍之即得晝刻計距子正前後若干刻分倍之即得夜刻測凖太陽視窺衡下端指緯度表所指四逰圈右面距赤道度分即得太陽赤道緯度表指赤道北太陽緯度為在赤道南表指赤道南太陽緯度為在赤道北在赤道北與赤道髙五十度五分相加在赤道南與赤道髙五十度五分相减即午正太陽髙弧用恆星作距取近午正前後一恆星以其赤道經度之對冲用綰經度表於逰旋赤道綰定四逰圈又任設一時用綰時度表於其時刻之對冲綰定天常赤道乃將四逰圈𢃄定逰旋赤道用窺衡測凖距星隨之左旋候至所設時刻視綰時度表對於逰旋赤道之某宫度分即太陽赤道經度也測月星法於昏後曉前任設一時以本日太陽赤道經度與次日太陽赤道經度比例得本時太陽赤道經度用綰時度表於逰旋赤道綰定又以所設時刻之對冲於天常赤道綰定候至所設時刻用四逰窺衡
