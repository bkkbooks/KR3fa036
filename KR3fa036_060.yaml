body:
  text: 字架施螺旋以取平架之東西兩端各植龍柱龍口銜珠開孔以承天常赤道𫑗酉之兩軸依觀象臺測定南北真線將座架安定則平面之四方正又依京師北極出地三十九度五十五分自北極而上五十度五分即上應天頂自南極而下五十度五分即下對地心於天頂施小釘懸垂線而垂適當地心又適切於雙環之面不即不離則上下正立面之四方亦正而地平已在其中故不用地平圈也次其內即古之三辰儀而不用黃道圈其貫於二極之雙環為赤極經圈兩極各設軸孔以受天經之軸兩面皆刻周天三百六十度結於赤極經圈之中要與天常赤道平運者為逰旋赤道圈兩面皆刻周天三百六十度與天之赤道旋轉相應自經圈之南極作兩象限弧以承之使不傾墊測得三辰之赤道經緯度則黃道經緯可推且黃道與赤道之相距古遠今近縱或日乆有差而儀器無庸改制故不用黃道圈也其在內者即古之四逰儀貫於二極之雙環為四逰圈兩面皆刻三百六十度定於逰圈之兩極者為直距綰於直距之中心者為窺衡逰圈中要設直表以指經度及時窺衡右旁設直表以指緯度此古今所同無容
