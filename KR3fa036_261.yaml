body:
  text: 角於丁丙內减甲丁得原設丙甲設乙甲丙形有甲鈍角有角旁之甲丙邊及對角之乙丙邊求乙甲邊及餘二角法於丙角作垂弧至戊𥙷成正角先算虛形有戊正角甲外角甲丙邊可求諸數次虛實合形有戊正角丙戊邊乙丙邊可求原設乙角及諸數末以先得虛形减之得原設數設乙甲丙形有丙甲二角丙甲邊法於丙鋭角作垂弧至丁𥙷成正角丁丙甲虛形有丁正角甲外角丙甲邊可求諸數乙丙丁虛實合形有丁正角丙丁邊丙角可求原設乙丙邊乙角及乙甲邊設乙甲丙形有乙甲二角丙甲邊法於丙鋭角作垂弧至戊𥙷成正角甲戊丙虛形有戊正角丙甲邊甲外角可求諸數乙丙戊形有戊正角乙角丙戊邊可求丙角乙丙邊乙甲邊設乙甲丙形有乙鋭角甲鈍角丙乙邊法於丙鋭角作垂弧至戊𥙷成正角乙丙戊形有戊正角乙角乙丙邊可求諸數甲丙戊虛有戊正角甲外角甲戊邊可求諸數
