body:
  text: 無定故赤緯亦無定也欲定太隂之赤緯以求太隂之髙弧當先推太隂之黃經以定太隂之赤緯黃經之遷移由於交周之差赤緯之遠近亦由於交周之差法先隨時察太隂正交度分次察黃道經度次察黃道緯度次用黃赤經緯互推法推得赤道經度與赤道緯度既得赤道緯度則其出入地平之時刻與其距地平髙下之度分皆可以是推之今用丁亥首朔後交周赤緯為圖加以地平升度以求太隂之出入與其髙下悉可按圖而得此特舉一圖以見例至於交周既差赤緯亦移又當隨時察其赤緯而為圖以推之赤緯南行北行又分兩種此圖用由北向南之度若夫由南向北緯度又異大抵正交中交又當分為兩圖白道出入於黃道之內外而以赤道求之非兩圖無以𥁞其用也太隂赤緯晷圖太隂南行北行分為二晷盖南北大距之限雖等而限內每度之距不等南行時北緯與北行時南緯等南行時南緯與北行時北緯等而南行北行之加减不等以丁亥首朔後赤緯言之南北大距皆二十度四十分而南行北緯每度之限與南緯異北行北緯
