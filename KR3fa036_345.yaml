body:
  text: 法之理然也測量用之可以知一歲中日道發南斂北之行可以知寒暑進退之節可以知晝夜永短之故可以用太陽髙度測各處北極之出地即可用北極出地求各地逐日太陽之髙度其法密而其用尤宏也正弦線尺八線以正弦為主為用至廣平儀經度必用正弦分之緯度用矢線亦可用正弦分之作正弦線法于正弦表取數從樞心至各度分之又分圓線可當此線以分圓線兩度當正弦一度紀其號假如分圓六十度界即紀正弦三十凡正弦皆倍度分圓之半故分圓之一度即正弦之半度用法以赤道半徑為本線九十度之底定尺而於逐度距𫑗酉之數取其正弦于赤道作識又以各距等圈半徑為本線九十度之底定尺而取其正弦于各距等圈作識即成全儀經
  hash: sha256:2fed6f32a4a69b1c5fd72b38a3096abe692040ae0c68ffe97601fb913021ba5b
