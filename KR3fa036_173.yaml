body:
  text: 句股求弦術以丙戊股自乘四十一萬三千四百四十九尺丁戊句自乘一十三萬三千二百二十五尺併之得數五十四萬六千六百七十四尺為實平方開之得弦七百三十九尺為丁丙邊求丙角以丁丙邊比丁乙邊若乙角正弦與丙角正弦一丁丙邊二丁乙邊三乙角正弦四丙角正弦五九四四二得丙角三十六度二十九分求丁角併乙丙二角共六十度二十九分以減半周得餘一百一十九度三十一分為丁鈍角鈍角形有三邊求角假如乙丙丁鈍角形有乙丙邊三百七十五尺乙丁邊六百七尺丁丙邊三百尺自乙角作垂線至甲又引丁丙線遇于甲則成乙甲丁句股形又引橫線至辛使甲辛如丙甲成乙甲辛句股形則丁辛為兩句之總而丁丙邊為兩句之較又乙丁邊為大形乙甲丁之弦乙丙邊為小形乙甲辛即乙甲丙之弦兩弦相併為總相減為較乃以句較比弦較若弦總與句總一句較即丁丙邊二弦較即乙丁內減乙丙之餘二百三十二尺三弦總即乙丁乙丙二邊相併九百八十二尺四句總七百五十九尺四寸以句較
