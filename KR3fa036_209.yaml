body:
  text: 分截乙壬於癸未以心為心癸為界作圓分截甲乙于戊則乙戊為大分甲戊為小分又簡法以甲乙全線為半徑作半圓乙庚乙辛皆與甲乙等次平分辛乙線於巳次以己為心庚為界運規割甲乙線於戊戊己之度即同己庚則乙戊為大分甲戊為小分又用算約法設一百為全數為句半數五十為股求得一百一十一八三三九八為弦弦數內減半數五十餘六十一八三三九八為大分於全數內減大分餘三十八一九六六二為小分半圓容方半圓內容正方法以圓徑為三率丙丁理分中末之小分為二率庚辛理分中末全線加小分為首率丁辛為全線庚辛為小分共得為丁庚總線也二三相乘一率除之得四率丙乙即甲丁為全徑之小分以減全徑餘乙丁乃於乙作正十字線至圓界如己乙即以此線自乘作正方己甲如所求己乙即丙乙與丁乙之中率而丙乙既為丁乙全徑之小分則己乙即大分也而甲乙亦為大分甲
