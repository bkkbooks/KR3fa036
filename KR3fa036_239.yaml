body:
  text: 丙角第一層句股兑乙心形即乙角之壬丙辛也在乙角兩正弦交於丙在丙角兩正弦交於乙皆弦與股之比例而同弦不同股乙角丙角並以乙丙正弦為弦而乙角以丙甲正弦為股丙角以乙甲正弦為股皆正弦也而弦同股别丙角第二層句股女甲亢形即乙角之子甲丑也一角丙角並以一正弦一切線交於甲為句與股之例而所用相反乙角於乙甲用正弦於丙甲用切線丙角則於乙甲用切線於丙甲用正弦皆乙甲丙甲丙弧之正弦切線而所用逈别丙角第三層句股艮丙氐形即乙角之酉乙未也在乙角以兩切線聨於乙在丙角以兩切線聨於丙皆弦與句之比例而同弦不同句乙丙兩角並以乙丙切線為弦而乙角以乙甲切線為句丙角以丙甲切線為句皆切線也而弦同句别假如有乙丙黃道度有乙甲赤道同升度而求丙交角則為乙丙之正弦與乙甲之正弦若半徑與丙角之正弦也乙丙黃道四十五度乙甲赤道四十二度三十一分三十五秒求丙交角一率乙丙正弦七七一六八二率乙甲正弦六七五九二九六三率半徑全數一
