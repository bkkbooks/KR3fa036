body:
  text: 南半周圖匾渾天儀之黃赤宫度恒星位置天下之所同也而其出入地平之線則因各䖏北極出地之髙下而遲早各異焉兹用北極出地三十三度求得地平全規而分為南北二圖對面合之即成地平𥂟之全圖圖上分列赤道時刻為匾渾天儀之静𥂟用法觀黃道度之出入地平即知本地太陽出入時刻及本地晝夜長短刻數觀黃道內外月五星度之出入地平及各恒星出入地平並可得月星各出入之時刻及正中偏東偏西之度無不覽圖而了然也北地平上經緯虛線圖
  hash: sha256:6ec516bed4a12d341cd6c4f92d360e146c2e442d75dc63eba3eab4ac1fbbd93f
