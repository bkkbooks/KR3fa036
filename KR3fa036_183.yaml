body:
  text: 句股四倍積得容員全徑鋭角形鋭角形求容員徑用求積法以一邊為底求得中長線以乘底得數倍之為實合計三邊為法除之得容員徑是以全周除四倍積得容員徑也或以全周除倍積得容員半徑或以半周除積得容員半徑並同蓋鋭角鈍角並以周為法與句股形用弦和和同但必先求中長線耳又量法以中垂線為員半徑如求積法均分二角之度各作虛線其虛線相交處即容員之心從心儘一邊為界運規作員得員半徑即得全徑矣此容員心即三角形之心故以容員半徑乘半總即得積也此術亦句股及鋭鈍兩角通用三角容方句股形求容方依正方角而以容方之一徑切于弦其法以句股相乘得倍積為實以句股和為法除之得所求又依弦線而以容方之兩角切于句股其法以弦除倍積得對角線與弦相併為法倍積為實法除實得所求此以一邊為底中長線為髙也其容方即依此一邊而以兩方角切餘二邊句股形故以弦為底若鋭角形則任以一邊為底但依大邊則容方轉小亦如句股形依方角之容方必大于依弦線之
