body:
  text: 最髙平行一十二度一十五分二十二秒五十二𢕄正交平行六宫七度五十五分三十一秒三十五𢕄引數置木星平行减最髙平行得二宫一十度五十五分五十九秒四十七𢕄初均以引數宫度分察所對之初均得五度四分三十一秒其號為减中分又察所對之中分得一十七分三十七秒初實行置木星平行依號减初均數得二宫一十八度六分五十一秒三十九𢕄本日太陽實行八宫二度二十一分五十九秒五十三𢕄星距日次引置本日太陽實行减初實行得五宫一十四度一十五分八秒一十四𢕄次均以星距日次引宫度分察所對之次均得三度三十分三十四秒其號為加較分又察所對之較分得二十四分三十五秒加差以三千六百秒為一率較分化得一千四百七十五秒為二率中分化秒得一千五十七秒為三率求得四率四百三十三秒四十六𢕄以度分收之得七分一十三秒四十六𢕄實次均以加差與次均相加得三度三十七分四十七秒四十六𢕄本道實行置初實行依號加實次均得二宫二十一度四十四分三十九秒二十五𢕄距交實行置初實行减正交平行得八宫一十度一十一分二十秒四𢕄升度差以距交實行宫度察所對之升度得一十八秒其號為减黃道實行置本道實行依號减升度差得二宫二十一度四十四分二十一秒二十五𢕄星距黃道線以距交實行宫度察所對之星距黃道線得二一七七四六其號為南星距地心線以星距日次引宫度察所對之星距地得八一六二六九視緯以星距地心線為一率星距黃道線為二率半徑為三率求得四率二六六七五為視緯之
