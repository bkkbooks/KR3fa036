body:
  text: 少七星奎宿內天溷七星今少三星畢宿內九州殊口九星今少三星井宿內軍市十三星今少七星共少八十三星星宿內天稷五星張宿內天廟十四星翼宿內束甌五星軫宿內軍門二星土司空四星器府三十二星共六座六十二星今無又所增一千六百一十四星之中蓋又有古少而今多古無而今有者是則星官消長之實測也行夏之時注疏只言以建寅之月為正原無斗柄初昏四字惟月令鄭注云孟春者斗建寅之辰上有斗字亦無初昏二字孔疏云孟春者夏正建寅之月并斗字去之集注蓋沿月令鄭注之誤而未深考也夫孟春建寅是氣候之所至天干甲乙居東地支寅𫑗辰列東易大傳云帝出乎震春令自在東方也堯典仲春宅嵎夷仲春在正東為𫑗月則孟春必在東之北而為寅月也何待斗柄指寅而後謂之寅月乎且亦有寅年寅日寅時又以何星而謂之寅乎蓋此持以斗運中央而妄為之説不知斗亦恆星隨歲差移而無定位十二宫無不可指也沈括云古者正月斗杓建寅今則正月建丑是宋時己不建寅今推斗杓經度在辰
