body:
  text: 緯南四十四度五秒法以赤緯與大距相加為總弧六十七度二十九分五秒正弦九二三七七七五相减為較弧二十度三十一分五秒正弦三五五二六兩正弦相减餘五七三二七四九折半得二八六六三七四五為甲數甲數轉减縂弧正弦餘六三七一四一為乙數乙數减黃緯正弦八六六二五四餘二二八八八五三為中數法為甲數與中數若半徑與赤經餘弦用四率求得餘弦七九八五一八五檢表减象限得距春分赤經五十二度五十九分二十秒加象限得距春分赤經一百二十七度四十秒又設黃緯北六十度赤緯北四十四度諸數俱同但以所得餘弦檢表加三象限得距春分赤經三百七度四十秒减三象限得距春分赤經二百二十二度五十九分二十秒用赤經餘弦得度春分後减象限夏至後加象限秋分後减三象限冬至後加三象限皆命為距春分赤經
