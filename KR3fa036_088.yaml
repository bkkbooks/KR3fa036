body:
  text: 日在胃初度三十二分小滿日在昴三度三分仲夏日月會於鶉首鶉首未次之號東井南方木宿八星状如井字故謂之井廣三十四度今法鶉首初参七度四十七分終井二十七度九分芒種日在畢八度五十九分夏至日在参七度四十七分季夏日月會於鶉火鶉火午次之號柳南方土宿八星廣十四度今法鶉火初井二十七度十分終星五度九分小暑日在井十二度十分大暑日在井二十七度十分孟秋日月會於鶉尾鶉尾已次之號翼南方火宿二十二星為朱鳥之翼廣十九度今法鶉尾初星五度十分終翼八度四十分立秋日在柳七度九分處暑日在星五度十分仲秋日月會於夀星夀星辰次之號角東方木宿二星廣十二度今法夀星初翼八度四十一分終角八度三十六分白露日在張十一度四十五分秋分日在翼八度四十一分季秋日月會於大火大火𫑗次之號房東方陽宿四星直下𢕄曲廣六度今法大火初角八度三十七分終氐十七度二十分寒露日在軫六度四十三分霜降日在角八度三十七分孟冬日月會於析木析木寅次之號尾東方火宿九星如鈎乃蒼龍之尾廣十七度今法初氐
