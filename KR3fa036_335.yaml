body:
  text: 周髀云天象蓋笠其製必為圓坳曲抱之象或當為半渾圓而空其中肖乎髙明下覆之形體今將蓋笠之象竟展而平如圖中心為北極外周大圈為赤道內圈數層以漸而小是為緯度亦謂之距等圈其圈最大者距北極九十度其內小圈緯度漸近最小最近則與北極合為一㸃唐一行平圖只用平度與渾象不合今用切線分其䟱密近極者密遠極者疏其度即渾度也謂之距等圈者其圈與大圈相距皆等而其自相距亦等故曰距等大圈平分三百六十度距等圈亦皆平分三百六十度是為經度而近極者狹遠極者濶經度在天本穹然半圓今用正視皆成圓徑而弧線變為直線焉或以中心為南極亦同或以中心為黃極則外周為黃道又或以中心為天頂則外周為地平其經緯度數並同分圓線尺
  hash: sha256:d3ceb411c97126574982a88f42753a7dbbb292c5f08420c247fc7c984a95229e
