body:
  text: 上親下亦猶是也又安有斜立而傾跌者乎然後信曾子四角不掩之言蓋自格物窮理中得之而札馬魯丁及歐邏巴之説亦發明古人之義也第地體雖圓而有背有面中土者地面也故篤生神聖帝王以繼天立極而五倫之教人人與知亦如人身之有面為一身之精神所聚五藏之精並開竅于五官若夫西方之教雖言心性精𢕄之理而反忽君臣父子之大倫且語言惟中土為順西域則多倒語北邊南徼亦皆倒用其字又聞西士之言謂所厯多國土地有大於中土者而衣冠文物未有過焉亦其徵也豈得以四面皆人而隘視中土哉又按河南汝寧天中山是天下正中凡人頭骨皆八塊獨汝寧人頭骨九塊則汝寧又中土之中所謂天地欣合之處也
  hash: sha256:098658baadfbcc2a365a8597af997dc2cbdb435b5751346f5f4da5a9ce4af0ac
