body:
  text: 方塹堵儀以正方為底其上有赤道象限以立句股為兩和之牆其上有黃赤大距度以長方為斜面其上有黃道象限底與面一邊相連為底與斜面所同用乃黃赤道之半徑一邊相離即立面橫長方形為大距度之切線從斜面作對角線切至底分塹堵為兩則赤道為兩平分各得四十五度而黃道為不平分距春分四十七度二十九分弱距夏至四十二度三十一分強于是黃道切線與大距度割線等而方塹堵之形以成乃黃道求赤道用兩切線之所賴也自黃道四十七度二十九分以前用正切是立面句股比例黃道求赤道一率大距割線二率赤道半徑三率黃道正切四率赤道正切赤道轉求黃道反用其率自黃道四十七度二十九分以後用餘切是斜平面句股比例黃道求赤道一率黃道半徑二率大距割線三率黃道餘切四率赤道餘切赤道轉求黃道反用其率正切線亦可用於半象限以上餘切線亦可用於半象限以下此因塹堵之底正方則所用切線至方角而止故各用其所宜又正切法即句股
