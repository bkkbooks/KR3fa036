body:
  text: 距必於月距交九十度時古法大距弦望無殊故曰春秋致月今法日在兩交值兩弦時交角大日距交九十度值朔望時交角小故又必兼於冬夏至測之也又法推得月離黃道冬夏至時測月距赤道南北緯度若干與黃赤大距相減餘為月距黃道南北緯度此法凡見月即可測不必待分至弦望也星辰日月之變動天文之學總言之曰天文分言之則推步之學曰歷家占驗之學曰天文家學厯固儒者之事至於私習天文國有明禁讀周官者亦僅辨其名義而己變動先言星辰者知星辰然後可以測日月如日月食於某宿暈於某星必以𨇠離之地求之也如常者吉變則占靜者吉動則占日月之變動有無光者有變色者有暈珥者有反玦者有生芒角者有生齒足者有數日數月並出者其變動之著者曰食食分十二月分六十干支分二十八宿分十二方位占之五星之變動有變色者芒角者晝見者經天者相從者合鬪者相干犯者變五彗者恆星之變動有變色者動搖者晝見者夜不見者凡此皆謂之災異王者遇災而懼側身修省以答天戒固欽若之精意也古者日食
