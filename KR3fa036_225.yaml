body:
  text: 小邊為一大邊減半周之餘一種二大邊等而又並為小邊減半周之餘有二邊小而一大者內分四種一種二小邊等一種二小邊不等一種大邊為一小邊減半周之餘一種二小邊等而又並為大邊減半周之餘有三邊並大者內分三種一種三邊不等一種二邊等一種三邊俱等計斜弧之邊二十種斜弧三角形圖一計四種乾形三角並鈍又皆同度三邊並大又皆同度坤形角一鈍二鋭鋭同度其鋭角為鋭角減半周之餘邊一大二小小同度其大邊為小邊減半周之餘艮形三角並鋭又皆同度三邊並小又皆同度巽形角一鋭二鈍鈍同度又皆為鋭角減半周之餘邊一小二大大同度又皆為小邊減半周之餘以上斜弧形四種並三角三邊同度謂之三等邊形內有二等邊者其一邊為等邊減半周之餘與三等邊同法以同用正弦故斜弧三角形圖二計十二種子形二鋭角同度一鈍二小邊同度一足丑形三鈍角內同度者二二大邊同度一足寅形二鋭角一鈍內一鋭角為鈍角減半周之餘邊一足一大一小小邊為大邊減半周之餘
