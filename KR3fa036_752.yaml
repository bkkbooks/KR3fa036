body:
  text: 步月離假如道光丁亥距根三十二日求月離經緯法先求本日太陽實行年根距冬至三十九分五十三秒五十九𢕄最卑九度五十六分四十四秒一十二𢕄日數太陽平行一宫一度三十二分二十六秒三十二𢕄最卑五秒三十一𢕄平行太陽平行得一宫二夏一十二分二十秒三十一𢕄最卑九度五十六分四十九秒四十三𢕄引數初宫二十二度一十五分三十秒四十八𢕄實行以引數查均數得四十四分五十三秒號加以加平行得一宫二度五十七分一十三秒三十一𢕄次求太隂年根距冬至九宫十一度五十分三十三秒四𢕄最髙行五宫三度六分三十八秒一十𢕄正交行十宫二十一度二十七分二十九秒九𢕄日數三十二日平行二宫一度三十八分四十秒四十五𢕄最髙行三度三十三分五十四秒一十五𢕄正交行一度四十一分四十秒二十六𢕄太隂平行年根日數相加得十一宫一十三度二十九分一十三秒四十九𢕄最髙平行年根日數相加得五宫六度四十分三十二秒二十五𢕄正交平行年根日數相加得十宫二十三度九分九秒三十五𢕄一平均太隂平均用太陽引數二十二度十五分查得四分三十四秒號减最髙平均用日引查得七分四十二秒號加
