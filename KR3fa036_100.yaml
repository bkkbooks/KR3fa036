body:
  text: 隂春分日在婁秋分日在角而月弦于牽牛東井亦以其影知氣至否春秋冬夏氣皆至則是四時之敘正矣賈疏云春分日在婁月上弦在東井圓於角下弦于牽牛秋分日在角月上弦于牽牛圓于婁下弦于東井故注并言月弦上牽牛東井不言圓望義可知也按致日致月即虞書敬致之義也日行出入于赤道有南至北至月行出入于黃道有隂厯陽厯夫冬夏致日注義𥁞之矣而致月必于春秋何也蓋春秋二分當黃道赤道之交黃道與赤道同度於此測月可得隂陽厯之真度矣如春分日在婁而月上弦於東井秋分日在角而月下弦於東井則是月所行者夏至日道也其夜中之影宜與夏至之午影等又如春分日在婁而月下弦于牽牛秋分日在角而月上弦于牽牛則是月行冬至之日道也其夜中之影宜與冬至之午影等而徵之所測或等焉或不等焉其等者必月正當黃道也其短于午影者必入黃道北而為隂厯也其長於午影者必出黃道南而為陽歷也注敷言兩弦者以此若夫二分之望月在其衝此時日之過午也其髙度與赤道等則月亦宜然然而月之過午有時而髙於日度則知其在隂厯也有
