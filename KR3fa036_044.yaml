body:
  text: 時憲法第谷所定歲實較之授時又减萬分之三有竒今奈端所定歲實比第谷所定多萬分之一有竒是則今日現用之率以此推閏定時方凖乾䇿坤䇿𣋡景限乾坤之䇿凡三百有六十當期之日平分之各得一百八十而乾之䇿二百一十有六則多三十有六坤之䇿百四十有四則少三十有六蓋以地平線分周天之度為二各一百八十度日出入𣋡景昏旦各十八度共三十六度以加晝景一百八十度合二百一十有六則乾之䇿之數也以减夜漏一百八十度餘一百四十有四則坤之䇿之數也所謂𣋡景十八度者以地平緯度言之非以赤道經度言之也在赤道三度四十五分為一刻十八度當得四刻十二分而地平下之十八度則時刻多寡各異惟赤道正當天頂之處其春秋分之𣋡景恰得四刻十二分而冬夏二至亦必略長於春秋分之時其餘各處天頂去赤道遠近不同即地平𣋡景限所占之赤道度濶狹不同在順天則春秋分之𣋡景六刻五分冬至六刻十二分夏至八刻十二分在江南則春秋分之𣋡景五刻十一分冬至六刻七分夏至六刻十三分各處不
