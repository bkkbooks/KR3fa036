body:
  text: 秒當黃道南之角為四度五十五分三十二秒次輪心在兩交之中當黃道南北之角皆五度四十分夫五星之次輪面斜交本道其交角宜相等而輪心南北之角為交錯之角其度尤宜相等惟水星獨不等或因水星近日逼於陽光低昂不定亦未可知上三星視緯圖第谷測得次輪心在兩交之中星又在次輪最近其視緯極大土星北緯為二度四十八分南緯為二度四十九分木星北緯為一度三十八分南緯為一度
