body:
  text: 元形之截形同用丙角又庚正角與戊角等而丁角即己戊邊之餘度試引己戊至辛成象限則戊辛等壬甲皆丁角之度而又為巳戊之餘邊易角也假如有丙鋭角已鈍角偕戊正角求戊丙邊法為丙角正弦與己角餘弦即庚丁正弦若半徑與戊丙餘弦即丁丙正弦得數减半周為戊丙下同既得戊丙可求巳丙法為半徑與丙角餘弦若戊丙餘切即丁丙正切與己丙餘切即庚丙正切求己戊邊法為戊丙餘弦即丁丙正弦與半徑若己丙餘弦即庚丙正弦與已戊餘弦即丁角正弦以上三角求邊四乙丙戊形戊正乙丙並鈍戊乙戊丙並大乙丙小易為丁丙庚次形法曰引乙丙邊至庚滿象限得次形丙庚邊即乙丙之餘于丙戊截戊丁象限得次形丁丙邊為戊丙之餘而丁即為戊乙弧之極戊正角至丁九十度故知之從丁作弧至庚成次形庚丁邊為乙角之餘是角易為邊也又庚正角與戊等丙為外角丁角為乙戊邊之餘是邊易為角也假如三角求邊以丙角正弦為一率乙角餘弦為二率半徑為三率求得戊丙餘弦為四率以得數减半
