body:
  text: 宫二十五度一十分四十八秒緯度去北極三十九度四十七分五十九秒以北極為中心而求其所指之方位則立春之日正指子宫七度建寅之非闗斗柄明矣日月之食朔時日月同度月體掩日而日食望時日月對度闇虛掩月而月食闇虛即地影也夫每朔同度每望對度而有食有不食者經度同而緯度不同經度對而緯度不對也盖日𨇠惟一黃道終古不出其外月於黃道有時在南在北在南入陽歴為正交在北入隂歴為中交朔時若同緯度則月在二交之上乃能掩日日行黃道不出入內外地影正對於日亦恒在黃道上不出入內外焉望時緯度相對則月在二交之上適過地影之內故食正在二交之上則全失其光距交有遠近則食分有淺深授時法日食限隂歴八度陽歴六度月食限一十三度零五分以定法八千分除八度得隂食十分以定法六千分除六度得陽食十分以定法八千七百法除一十三度零五分得月食一十五分時憲法以倍半徑為一率十分為二率并徑减距為三率求得四率為食甚分秒日體十
