body:
  text: 有黃緯赤緯求黃經設黃緯北十度赤緯北二十度四十九分二十二秒轉求黃經則所得甲數乙數並同而四率不同以乙數减赤緯正弦得中數乃以甲數為一率中數為二率半徑為三率求得四率為黃經正弦檢表得黃經三十度又設黃緯北六十度赤緯北六十三度二十二分一十一秒轉求黃經則所得甲數乙數並同而四率不同以乙數减赤緯正弦得中數乃以甲數為一率中數為二率半徑為三率求得四率為黃經正弦檢表得黃經三十度又或黃緯南十度赤緯北二度七分三秒求黃經則以乙數加赤緯正弦為中數然後以甲數為一率中數為二率半徑為三率求得四率為黃經正弦檢表得三十度又或黃經南六十度赤緯南四十四度五秒求黃經則以赤緯正弦
  hash: sha256:f9cba3bd1718f5c0f1318c06ca9b87fd7247399be7439896e127937822f3673e
