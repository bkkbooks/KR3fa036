body:
  text: 或不常見者或朦黑者不與焉新法歴書南北兩極共得一千七百二十五星有名之星一千二百六十六餘則皆為無名之星康熈時南懷仁攷定星名與古同者縂二百五十九座一千一百二十九星又於有名常數之外增五百九十七星又多近南極星二十三座一百五十星乾隆時戴進賢累加測騐星名與古同者縂二百七十七座一千三百一十九星又於有名常數之外增一千六百一十四星其近南極星二十三座一百五十星仍依西測之舊共計恒星三百座三千八十三星古今星數所以不同者一由測星者之去取而意為增减如但取可見可状之星則數少並取𢕄小朦黑之星則數多也一由星氣之實有消長而有古多今少古少今多古有今無古無今有之異戴進賢所測角宿內柱十五星今少四星氐宿內亢池六星今少二星騎官二十七星今少十七星心宿內積卒十二星今少十星斗宿內天淵十星今少七星鼈十四星今少三星牛宿內天田九星今少五星九坎九星今少五星女宿內離珠五星今少一星危宿內天錢十星今少五星人五星今少一星室宿內八魁九星今少三星壁宿內天廏十星今
