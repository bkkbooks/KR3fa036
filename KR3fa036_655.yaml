body:
  text: 弦為二率半徑為三率以餘弦為一率除之得正切更之亦可以切求弦以餘弦半徑相乘以餘切除之得正弦以正弦半徑相乘以正切除之得餘弦又更之以正弦餘切相乘以半徑除之亦得餘弦以餘弦正切相乘以半徑除之亦得正弦設弧二十三度二十九分求得正弦三九八四八二三餘弦九一七一七六如求切線即以餘弦九一七一七六與半徑一千萬相乘得數九一七一七六為實以正弦三九八四八二三除之得數二二八三四七五八即設弧之餘切亦即餘弧六十六度三十一分之正切以正弦三九八四八二三與半徑一千萬相乘得數三九八四八二三為實以餘弦九一七一七六除之得數四三四四六六六即設弧之正切亦即餘弧六十六度三十
