body:
  text: 用恆星緯求北極出地圖象限儀九十度為測量緯度之用測日月星法並同但日月或取表影而測星必用窺菅法以窺管對星視垂線所到之度從外向內數之得星之髙度次檢恆星赤緯北减南加得赤道髙度與九十度相减得北極髙度假如測得心宿第二星髙三十度三十八分檢表得南緯二十六度一十二分與髙度相加得五十七度為赤道髙度與九十度相减得三十三度為北極髙度其餘諸恆星擇其一等二等之大星悉依此法求之
