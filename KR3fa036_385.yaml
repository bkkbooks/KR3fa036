body:
  text: 對天周以恒氣對定氣而𡻕實與日行皆得矣今時憲書春分至秋分之日數較秋分至春分多八日二十七刻半所由來也又所謂奧日者最髙也約舉其數在夏至後十度今當道光丁亥實過夏至後九度五十七分每年行一分零三秒至辛𫑗得十度零五十六秒六十年後則過十一度更宜加數用之句股錐求黃赤道度圖句股錐形因割圓諸線成平面句股形為底兩立面句股形為牆斜面句股形為面四面皆句股形平斜
