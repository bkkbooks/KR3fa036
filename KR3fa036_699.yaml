body:
  text: 以一黃經赤緯求一黃經赤緯設有已知之黃經三十度赤緯十一度二十九分三十三秒今黃經四十度求赤緯幾何法用正弦以己知之赤緯與黃經四十度之正弦相乘得數一二八六七八七八二四四以黃經三十度之正弦除之得二五六一三四檢表知在一十四度五十分二十秒三十秒之間用中比例求零秒與二十秒相加得一十四度五十分二十八秒為赤緯又或先有黃經四十度赤緯十四度五十分二十八秒今赤緯十一度二十九分三十三秒求黃經則以一二八六七八七八二四四為實以二五六一三四除之亦得五為黃經也又或用距至經度距極緯度但改正弦為餘弦算之亦同求距緯簡法有大距有黃道度求距緯本以大距正弦與黃道度
