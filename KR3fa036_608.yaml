body:
  text: 視相距最近之線不與白道成直角而與視行成直角故反覆推求務得太隂正當視行直角之點斯為兩心最近之處而食甚乃為確凖也是法也可以圖代算可以一圖而知各地見食之不同如圖太隂實引初宫八度四十七分三十一秒四本日地平髙下差五十三分四十九秒九以五寸三分八釐三毫為半徑作平圓本時日距赤道北二十一度三十八分一十二秒二食甚用時為午正二刻九分五十八秒九五用時赤經髙弧交角二十二度四十三分八秒三九日距天頂二十度九分四十八秒二七之髙下差一十八分三十三秒三四月實緯距黃道北二十三分二十八秒四五赤白交角一十五度六分一十五秒八六白經髙弧交角七度三十六分五十二秒五三兩心視相距五分三十八秒七四向後取未初初刻為設時設時赤經髙弧交角三十一度三十三分一秒七三日距天頂二十二度一十七分四十二秒二六之髙下差二十分二十五秒三五設時距用時二十分一秒五兩心實相距二十五分一十秒五八白經髙弧交角一十六度二十六分四十五秒八七兩心視相距五分六秒六五設時視行
