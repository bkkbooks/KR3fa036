body:
  text: 一率半徑一二率丙角六十度正弦八六六二五四三率甲丙邊四百尺四率甲丁中長線三百四十六尺四寸八釐次求丙丁邊即所分甲丁丙形之句而甲丙為之弦以半徑比丙角餘弦若甲丙邊與丙丁邊一率半徑一二率丙角六十度餘弦五三率甲丙邊四百尺四率甲丁邊二百尺次求乙丁邊以丙丁减丙乙餘六十一尺八分為乙丁邊次求丁甲乙分角即分形甲丁乙句股之甲角以甲丁中長線比乙丁分邊若半徑與甲分角切線一率甲丁中長線三百四十六尺四寸一分二率乙丁分邊六十一尺八分三率半徑一四率甲分角切線一七六三二二八得十一度缺五𢕄末求甲乙邊以半徑比甲分角割線若甲丁與甲乙邊
